<!doctype html>
<html><head><meta charset="utf-8"><title>Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-card);color:var(--fg-1)}
  .wrap{padding:20px 26px;display:flex;flex-direction:column;gap:8px}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--border-subtle);padding-bottom:6px}
  .row:last-child{border:0}
  .meta{font:500 11px/1 var(--font-mono);color:var(--fg-3);min-width:140px;letter-spacing:.04em}
  .meta b{color:var(--fg-1);font-weight:600}
</style></head>
<body>
<div class="wrap">
  <div class="row"><div class="meta"><b>H1</b> · 36 / 700</div><div class="cc-h1">Redes TETRA listas para producción</div></div>
  <div class="row"><div class="meta"><b>H2</b> · 28 / 600</div><div class="cc-h2">Cobertura nacional, soporte 24/7</div></div>
  <div class="row"><div class="meta"><b>H3</b> · 22 / 600</div><div class="cc-h3">Hytera HP78X · Radio portátil DMR Tier II</div></div>
  <div class="row"><div class="meta"><b>H4</b> · 18 / 600</div><div class="cc-h4">Especificaciones técnicas</div></div>
</div>
</body></html>
