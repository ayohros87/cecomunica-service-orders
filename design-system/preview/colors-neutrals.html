<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:var(--font-body);background:var(--surface-card)}
  .row{display:grid;grid-template-columns:repeat(10,1fr)}
  .sw{aspect-ratio:1/1.4;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font:600 10px/1.1 var(--font-mono);color:#fff}
  .sw.light{color:var(--fg-1)}
  .sw small{display:block;font:500 9px/1 var(--font-body);opacity:.8;margin-top:3px}
  .name{font:600 11px/1 var(--font-body);letter-spacing:.1em;text-transform:uppercase;padding:12px 12px 6px;color:var(--fg-3)}
</style></head>
<body>
<div class="name">Neutrals · cool gray scale</div>
<div class="row">
  <div class="sw light" style="background:var(--gray-0);box-shadow:inset 0 0 0 1px var(--border-subtle)">0<small>#FFFFFF</small></div>
  <div class="sw light" style="background:var(--gray-50)">50<small>#F7F9FB</small></div>
  <div class="sw light" style="background:var(--gray-100)">100<small>#EEF2F6</small></div>
  <div class="sw light" style="background:var(--gray-200)">200<small>#DDE4EB</small></div>
  <div class="sw light" style="background:var(--gray-300)">300<small>#C2CCD6</small></div>
  <div class="sw light" style="background:var(--gray-400)">400<small>#9AA7B4</small></div>
  <div class="sw" style="background:var(--gray-500)">500<small>#6B7884</small></div>
  <div class="sw" style="background:var(--gray-600)">600<small>#4A5560</small></div>
  <div class="sw" style="background:var(--gray-700)">700<small>#2F3942</small></div>
  <div class="sw" style="background:var(--gray-900)">900<small>#0E1418</small></div>
</div>
</body></html>
