<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Nuevo Contrato — Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../js/services/contratosService.js"></script>
  <script src="../js/services/mailService.js"></script>
  <script src="../js/services/clientesService.js"></script>
  <script src="../js/services/modelosService.js"></script>

  <style>
    /* Page-local — el resto vive en el kit */

    /* Badges de readiness por sección (JS asigna .pending / .ready / .info) */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 600; white-space: nowrap;
      border: 1px solid transparent;
    }
    .badge.pending { background: var(--surface-sunken); color: var(--fg-3); border-color: var(--border-default); }
    .badge.ready   { background:#ECFDF5; color:#065F46; border-color:#A7F3D0; }
    .badge.info    { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-line); }

    /* Resumen de info del cliente (debajo del combo) */
    #infoCliente {
      margin-top: var(--sp-2);
      padding: var(--sp-2) var(--sp-3);
      background: var(--surface-sunken);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-sm);
      font-size: 13px; line-height: 1.6; color: var(--fg-2);
    }
    #infoCliente:empty { display: none; }

    /* Caja de modalidad de renovación (alternativa visual al .disclosure-panel) */
    .renovacion-mode-box {
      background: var(--accent-soft);
      border: 1px solid var(--accent-line);
      border-radius: var(--radius-md);
      padding: var(--sp-3) var(--sp-4);
    }
    .renovacion-mode-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--sp-3); margin-bottom: var(--sp-2);
    }
    .renovacion-mode-title { margin: 0; font-size: 14px; font-weight: 700; color: var(--navy); }
    .renovacion-suboption {
      margin-top: var(--sp-2);
      padding: var(--sp-2) var(--sp-3);
      border: 1px dashed var(--accent-line);
      border-radius: var(--radius-sm);
      background: var(--surface-card);
    }

    /* Panel de totales (sticky cuando hay scroll largo, opcional) */
    .totals-panel {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: var(--sp-4) var(--sp-5);
      margin-top: var(--sp-4);
      box-shadow: var(--shadow-sm);
    }
    .totals-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: var(--sp-2) 0;
      font-size: 14px; color: var(--fg-2);
    }
    .totals-row + .totals-row { border-top: 1px solid var(--border-subtle); }
    .totals-row.total {
      font-size: 16px; font-weight: 700; color: var(--fg-1);
      border-top: 2px solid var(--border-default) !important;
    }

    /* Modal preview — layout custom (el kit cubre el shape) */
    #previewModal { max-width: 980px; max-height: 90vh; display: flex; flex-direction: column; }
    #previewBody { padding: var(--sp-4) var(--sp-5); overflow: auto; flex: 1; }
    .preview-card {
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: var(--sp-3); margin-bottom: var(--sp-3);
    }
    .preview-grid {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px; font-size: 13px;
    }
    .preview-table { width: 100%; border-collapse: collapse; }
    .preview-table th, .preview-table td {
      border-bottom: 1px solid var(--border-subtle);
      padding: 8px 6px; font-size: 13px;
    }
    .preview-table th { background: var(--surface-sunken); text-align: left; font-size: 11px; text-transform: uppercase; }
    .preview-totals { display: flex; justify-content: flex-end; }
    .preview-totals table { width: 280px; }
    .preview-note { font-size: 12px; color: var(--fg-3); margin-top: var(--sp-2); }
  </style>
</head>
<body>

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="file-plus"></i> Nuevo Contrato',
      actions: [],
      showHome: true, homeHref: '../index.html', showLogout: true
    });
  </script>

  <div class="app-wrap app-wrap--default">

    <form id="formContrato">

      <!-- Sección 1: Cliente -->
      <div class="form-section-header">
        <h3><i data-lucide="user"></i> Información del Cliente</h3>
        <span class="badge pending" id="badgeCliente">Pendiente</span>
      </div>
      <div class="app-card app-card-padded" style="margin-bottom:var(--sp-4);">
        <div class="form-field">
          <label class="form-label" for="clienteCombo">Cliente <span class="req">*</span></label>
          <div class="combobox">
            <input id="clienteCombo" class="form-input" type="text" placeholder="Escribe para buscar…" autocomplete="off">
            <input id="cliente" type="hidden" required>
            <div id="clienteList" class="combo-list" hidden></div>
            <div class="combo-actions">
              <button type="button" class="btn btn-secondary btn-icon btn-sm" onclick="window.open('../contratos/nuevo-cliente.html?redirect=true','_blank')" aria-label="Nuevo cliente"><i data-lucide="plus"></i></button>
              <button type="button" class="btn btn-secondary btn-icon btn-sm" id="btnEditarCliente" disabled aria-label="Editar cliente"><i data-lucide="pencil"></i></button>
              <button type="button" class="btn btn-ghost btn-icon btn-sm" id="btnClearCliente" title="Limpiar selección" aria-label="Limpiar"><i data-lucide="x"></i></button>
            </div>
          </div>
          <div id="infoCliente"></div>
        </div>
      </div>

      <!-- Sección 2: Detalles del contrato -->
      <div class="form-section-header">
        <h3><i data-lucide="file-text"></i> Detalles del Contrato</h3>
        <span class="badge pending" id="badgeDetalles">Pendiente</span>
      </div>
      <div class="app-card app-card-padded" style="margin-bottom:var(--sp-4);">
        <div class="form-grid-2">
          <div class="form-field">
            <label class="form-label" for="tipo_contrato">Tipo de contrato <span class="req">*</span></label>
            <select class="form-select" id="tipo_contrato" required>
              <option value="">Seleccione…</option>
              <option value="ALQ">Alquiler</option>
              <option value="PROP">Propio</option>
              <option value="REEMP">Reemplazo</option>
              <option value="DEMO">Demo</option>
              <option value="TEMP">Temporal</option>
            </select>
          </div>

          <div class="form-field">
            <label class="form-label" for="accion">Tipo de acción <span class="req">*</span></label>
            <select class="form-select" id="accion" required>
              <option value="">Seleccione…</option>
              <option value="Nuevo">Nuevo</option>
              <option value="Renovación">Renovación</option>
              <option value="Adición">Adición</option>
              <option value="No Aplica">No Aplica</option>
            </select>
          </div>

          <div class="form-field renovacion-mode-box" id="renovacionModeBox" style="display:none; grid-column:1/-1;">
            <div class="renovacion-mode-header">
              <p class="renovacion-mode-title">Modalidad de renovación</p>
              <span class="badge info" id="badgeRenovacionModo">Renovación con equipo</span>
            </div>
            <label class="form-check">
              <input type="checkbox" id="renovacion_sin_equipo">
              <span><span class="form-check-label">Marcar si es renovación sin equipo</span></span>
            </label>
            <div class="renovacion-suboption" id="renovacionRefurbishedBox" style="display:none;">
              <label class="form-check">
                <input type="checkbox" id="renovacion_refurbished_componentes">
                <span><span class="form-check-label">¿El contrato lleva refurbished de batería, antena, clip y piezas?</span></span>
              </label>
            </div>
          </div>

          <div class="form-field">
            <label class="form-label" for="duracion">Duración del contrato <span class="req">*</span></label>
            <select class="form-select" id="duracion" required onchange="NCForm.toggleOtraDuracion(this.value)">
              <option value="">Seleccione…</option>
              <option value="12 meses">12 meses</option>
              <option value="18 meses">18 meses</option>
              <option value="Otro">Otro (especificar)</option>
            </select>
          </div>

          <div class="form-field" id="otraDuracionLabel" style="display:none;">
            <label class="form-label" for="otra_duracion">Especificar duración (meses)</label>
            <input class="form-input" type="number" id="otra_duracion" min="1" placeholder="Ej. 24" style="max-width:140px">
          </div>

          <div class="form-field" style="grid-column:1/-1">
            <label class="form-label" for="observaciones">Observaciones</label>
            <textarea class="form-input form-textarea" id="observaciones"></textarea>
          </div>
        </div>
      </div>

      <!-- Sección 3: Equipos -->
      <div class="form-section-header">
        <h3><i data-lucide="package"></i> Equipos</h3>
        <span class="badge pending" id="badgeEquipos">Pendiente</span>
      </div>
      <div class="app-card" style="margin-bottom:var(--sp-4);">
        <div class="app-table-wrap" style="border:none; box-shadow:none; border-radius:0; overflow:visible;">
          <table id="tablaEquipos" class="app-table editable">
            <thead>
              <tr>
                <th>Modelo</th>
                <th>Descripción</th>
                <th style="width:80px;">Cantidad</th>
                <th style="width:120px;">Precio unitario</th>
                <th style="width:120px; text-align:right;">Total</th>
                <th style="width:48px;"></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="table-add-row">
          <button type="button" class="btn btn-ghost btn-sm" onclick="NCForm.agregarFilaEquipo()"><i data-lucide="plus"></i> Agregar equipo</button>
        </div>

        <!-- ITBMS y totales -->
        <div class="totals-panel">
          <div class="totals-row">
            <label class="form-label" for="itbms_aplica" style="margin:0;"><strong>ITBMS</strong></label>
            <select class="form-select" id="itbms_aplica" style="max-width:180px;">
              <option value="true" selected>Sí (7%)</option>
              <option value="false">EXENTO</option>
            </select>
          </div>

          <div class="totals-row subtotal">
            <span>Subtotal</span>
            <span id="subtotal_view">$0.00</span>
          </div>

          <div class="totals-row">
            <span id="itbms_label">ITBMS (7%)</span>
            <span id="itbms_view">$0.00</span>
          </div>

          <div class="totals-row total">
            <strong>Total</strong>
            <strong id="total_con_itbms_view">$0.00</strong>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-lg" id="btnGuardar"><i data-lucide="save"></i> Guardar Contrato</button>
        <button type="button" class="btn btn-ghost" onclick="window.location.href='index.html'">Cancelar</button>
      </div>

      <p id="mensaje" class="resumen"></p>
    </form>
  </div>

  <!-- Preview Modal -->
  <div id="previewOverlay" class="modal-backdrop" style="display:none;" role="dialog" aria-modal="true">
    <div class="modal" id="previewModal" style="max-width:980px;">
      <div class="modal-header">
        <div>
          <h3 class="modal-title">Vista previa del contrato</h3>
          <div id="previewSub" style="font-size:12px; color:var(--fg-3); margin-top:2px;"></div>
        </div>
        <button id="btnClosePreview" class="modal-close" aria-label="Cerrar"><i data-lucide="x" style="width:18px;height:18px;"></i></button>
      </div>
      <div id="previewBody"></div>
      <div class="modal-footer">
        <button id="btnEditPreview" class="btn btn-secondary">Editar</button>
        <button id="btnConfirmPreview" class="btn btn-primary">Confirmar y Guardar</button>
        <button class="btn btn-ghost" data-close-preview>Cerrar</button>
      </div>
    </div>
  </div>

  <script src="../js/domain/totales.js"></script>
  <script src="../js/ui/toast.js"></script>
  <script src="../js/ui/modal.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script src="../js/pages/nc-state.js"       defer></script>
  <script src="../js/pages/nc-form.js"        defer></script>
  <script src="../js/pages/nc-combo.js"       defer></script>
  <script src="../js/pages/nc-preview.js"     defer></script>
  <script src="../js/pages/nc-guardar.js"     defer></script>
  <script src="../js/pages/nuevo-contrato.js" defer></script>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
