<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Contrato</title>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../js/services/contratosService.js"></script>
<script src="../js/services/modelosService.js"></script>
  <style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f9f9f9;
    margin: 0;
    padding: 30px;
  }

  h2 {
    text-align: center;
    color: #333;
  }

  form {
    max-width: 960px;
    margin: 20px auto;
    background-color: #ffffff;
    padding: 24px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
  }

  fieldset {
    border: 1px solid #ccc;
    padding: 16px 20px;
    margin-bottom: 24px;
    border-radius: 8px;
    background-color: #fdfdfd;
  }

  legend {
    font-weight: bold;
    font-size: 16px;
    padding: 0 8px;
    color: #222;
  }

  label {
    display: flex;
    flex-direction: column;
    margin-bottom: 16px;
    font-size: 14px;
    color: #444;
  }

  input, select, textarea {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    box-sizing: border-box;
    margin-top: 4px;
  }

  textarea {
    resize: vertical;
    min-height: 60px;
  }

  button {
    padding: 10px 16px;
    font-size: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background-color: #007bff;
    color: white;
  }

  button:hover {
    background-color: #0056b3;
  }

  .inline-btn { margin-left: 8px; }
  .flex { display: flex; gap: 10px; }
  .align-end { display:flex; justify-content:flex-end; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
    background-color: white;
    border-radius: 6px;
    overflow: hidden;
  }

  th, td {
    border: 1px solid #ddd;
    padding: 8px;
    font-size: 14px;
  }

  th {
    background-color: #f4f4f4;
    text-align: left;
  }

  .total {
    font-weight: bold;
    text-align: right;
    margin-top: 10px;
    font-size: 16px;
  }

  #mensaje {
    margin-top: 10px;
    font-weight: bold;
  }

  .renovacion-box {
    background: #eff6ff;
    border: 2px solid #3b82f6;
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 8px;
  }

  .renovacion-box .title {
    margin: 0 0 8px 0;
    color: #1e3a8a;
    font-size: 14px;
    font-weight: 700;
  }

  .renovacion-badge {
    display: inline-block;
    background: #dbeafe;
    color: #1e3a8a;
    border: 1px solid #93c5fd;
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
  }
</style>

</head>
<body>
  <h2>Editar Contrato</h2>
<form id="formEditar">

  <fieldset>
    <legend>🧾 Información del Cliente</legend>
    <!-- mantenemos el campo como read-only para edición -->
    <label>Cliente:
      <input type="text" id="cliente_nombre" disabled>
    </label>
  </fieldset>

  <fieldset>
    <legend>📄 Detalles del Contrato</legend>

    <label>Tipo de contrato:
      <select id="tipo_contrato" required>
        <option value="ALQ">Alquiler</option>
        <option value="PROP">Propio</option>
        <option value="REEMP">Reemplazo</option>
        <option value="DEMO">Demo</option>
      </select>
    </label>

    <label>Tipo de acción:
      <select id="accion" required>
        <option value="Nuevo">Nuevo</option>
        <option value="Renovación">Renovación</option>
        <option value="Adición">Adición</option>
        <option value="No Aplica">No Aplica</option>
      </select>
    </label>

    <div id="renovacionBox" class="renovacion-box" style="display:none;">
      <p class="title">Modalidad de renovación</p>
      <div id="renovacionBadge" class="renovacion-badge">Renovación con equipo</div>
      <label>
        <input type="checkbox" id="renovacion_sin_equipo">
        Marcar si es renovación sin equipo
      </label>
      <label id="renovacionRefurbishedWrap" style="display:none; margin-top:8px;">
        <input type="checkbox" id="renovacion_refurbished_componentes">
        ¿El contrato lleva refurbished de batería, antena, clip y piezas?
      </label>
    </div>

<label>Duración del contrato:
  <select id="duracion" required onchange="toggleOtraDuracion(this.value)">
    <option value="">Seleccione…</option>
    <option value="12 meses">12 meses</option>
    <option value="18 meses">18 meses</option>
    <option value="Otro">Otro (especificar)</option>
  </select>
</label>

<label id="otraDuracionLabel" style="display:none;">
  Especificar duración (meses)
  <input type="number" id="otra_duracion" min="1" placeholder="Ej. 24">
</label>

    <label>Estado:
  <select id="estado" disabled>
    <option value="activo">Activo</option>
    <option value="pendiente_aprobacion">Pendiente Aprobación</option>
    <option value="vencido">Vencido</option>
  </select>
</label>


    <label>Observaciones:
      <textarea id="observaciones"></textarea>
    </label>
  </fieldset>

  <fieldset>
    <legend>📦 Equipos</legend>
    <table>
     <thead>
      <tr>
        <th>Modelo</th>
        <th>Descripción</th>
        <th>Cantidad</th>
        <th>Precio Unitario</th>
        <th>Total</th>
        <th>❌</th>
      </tr>
    </thead>
      <tbody id="tablaEquipos"></tbody>
    </table>
    <div class="align-end">
      <button type="button" onclick="agregarEquipo()">➕ Agregar Equipo</button>
    </div>
    <div class="total">Total: $<span id="total">0.00</span></div>
  </fieldset>

  <div class="flex">
    <button type="submit">💾 Guardar Cambios</button>
    <button type="button" onclick="window.location.href='index.html'">⬅️ Cancelar</button>
  </div>

  <p id="mensaje"></p>
</form>


  <script src="../js/pages/editar-contrato.js" defer></script>

</body>
</html>
