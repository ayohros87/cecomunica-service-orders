<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Nuevo Cliente</title>
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <style>
    /* ===================================
       UNIFIED DESIGN SYSTEM - NUEVO CLIENTE
       =================================== */

    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      background: #f8fafc;
      min-height: 100vh;
    }

    .page-wrap > h2 {
      margin: 0 0 20px 0;
      font-size: 26px;
      font-weight: 700;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0 0;
      padding: 12px 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-left: 4px solid #3b82f6;
      border-radius: 10px 10px 0 0;
    }

    .section-header h3 {
      margin: 0;
      font-size: 17px;
      font-weight: 650;
      color: #1e293b;
    }

    .section-shell {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-top: none;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
      padding: 20px;
      margin-bottom: 16px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-start;
      margin: 10px 0 20px;
    }

    .form-hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
      line-height: 1.4;
    }

    .form-field input,
    .form-field textarea {
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      transition: all 0.2s ease;
    }

    .form-field input:focus,
    .form-field textarea:focus {
      background: #fff;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
      outline: none;
    }

    /* Button Styles */
    .btn.primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      font-weight: 600;
      box-shadow: 0 1px 3px rgba(59, 130, 246, 0.3);
    }

    .btn.primary:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      box-shadow: 0 2px 6px rgba(59, 130, 246, 0.4);
    }

    .btn.ghost {
      background: transparent;
      color: #64748b;
      border: 1px solid #cbd5e1;
      font-weight: 500;
    }

    .btn.ghost:hover {
      background: #f8fafc;
      border-color: #94a3b8;
      color: #475569;
    }

    /* Toast System */
    .toast-wrap {
      position: fixed;
      right: 20px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 9999;
      max-width: 400px;
    }

    .toast {
      background: #0f172a;
      color: #fff;
      padding: 14px 16px;
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.20);
      font-size: 14px;
      line-height: 1.5;
      animation: slideInToast 0.3s ease;
    }

    @keyframes slideInToast {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast.ok {
      background: #166534;
      border-left: 4px solid #22c55e;
    }

    .toast.bad {
      background: #991b1b;
      border-left: 4px solid #ef4444;
    }

    #mensaje {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .page-wrap {
        padding: 12px;
      }

      .toast-wrap {
        left: 12px;
        right: 12px;
        max-width: none;
      }
    }
  </style>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>

</head>
<body>
  <div class="page-wrap">
    <h2 id="pageTitle">🧾 Registrar Nuevo Cliente</h2>

    <div class="top-actions">
      <button type="button" class="btn ghost" onclick="volverAContrato()">⬅️ Volver</button>
    </div>

    <form id="formCliente">
      <!-- ============================================
           SECCIÓN 1: IDENTIFICACIÓN FISCAL
           ============================================ -->
      <div class="section-header">
        <h3>📋 Identificación Fiscal</h3>
      </div>
      <div class="section-shell">
        <div class="form-grid cols-2">
          <div class="form-field" style="grid-column: 1/-1">
            <label class="req">Nombre del cliente</label>
            <input type="text" id="nombre" required>
          </div>

          <div class="form-field">
            <label class="req">RUC / Cédula</label>
            <input type="text" id="ruc" required>
            <div class="form-hint">Ej: 15567890 (sin DV)</div>
          </div>

          <div class="form-field">
            <label>DV</label>
            <input type="text" id="dv" inputmode="numeric" pattern="\d{1,2}" maxlength="2" placeholder="Ej. 55" title="1-2 dígitos">
            <div class="form-hint">Si aplica, ingresa 1–2 dígitos</div>
          </div>
        </div>
      </div>

      <!-- ============================================
           SECCIÓN 2: CONTACTO
           ============================================ -->
      <div class="section-header">
        <h3>📞 Contacto</h3>
      </div>
      <div class="section-shell">
        <div class="form-grid cols-2">
          <div class="form-field">
            <label>Teléfono</label>
            <input type="text" id="telefono">
          </div>

          <div class="form-field">
            <label>Email</label>
            <input type="email" id="email">
          </div>
        </div>
      </div>

      <!-- ============================================
           SECCIÓN 3: REPRESENTANTE LEGAL
           ============================================ -->
      <div class="section-header">
        <h3>👤 Representante Legal</h3>
      </div>
      <div class="section-shell">
        <div class="form-grid cols-2">
          <div class="form-field">
            <label>Representante Legal</label>
            <input type="text" id="representante">
          </div>

          <div class="form-field">
            <label>Cédula del Representante Legal</label>
            <input type="text" id="representante_cedula">
          </div>
        </div>
      </div>

      <!-- ============================================
           SECCIÓN 4: DIRECCIONES
           ============================================ -->
      <div class="section-header">
        <h3>📍 Direcciones</h3>
      </div>
      <div class="section-shell">
        <div class="form-grid cols-1">
          <div class="form-field">
            <label class="req">Dirección principal</label>
            <input type="text" id="direccion" required>
          </div>

          <div class="form-field">
            <label>Dirección de facturación</label>
            <input type="text" id="direccion_facturacion">
            <div class="form-hint">Opcional. Si se deja vacío, se usa la dirección principal.</div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn primary" data-accion="guardar">💾 Guardar</button>
        <button type="button" class="btn ghost" onclick="volverAContrato()">Cancelar</button>
      </div>

      <p id="mensaje" class="resumen"></p>
    </form>
  </div>

  <!-- Toast Container -->
  <div id="toasts" class="toast-wrap"></div>

  <script>
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      // Toast notification system
      function toast(msg, type = "") {
        const box = document.getElementById("toasts");
        if (!box) return;
        const el = document.createElement("div");
        el.className = "toast" + (type ? " " + type : "");
        el.textContent = msg;
        box.appendChild(el);
        setTimeout(() => {
          el.style.opacity = "0";
          el.style.transform = "translateX(400px)";
          setTimeout(() => el.remove(), 300);
        }, 3200);
      }

      function mostrarMensaje(texto, color = "green") {
        const msg = document.getElementById("mensaje");
        msg.textContent = texto;
        msg.style.color = color;
        msg.style.fontWeight = "bold";
        msg.style.marginTop = "10px";
        toast(texto, color === "green" ? "ok" : "bad");
      }

// Normaliza: minúsculas, sin acentos
function norm(s){
  return (s || "").toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .trim();
}
// Prefijos por palabra: "instituto" → in, ins, inst, ...
function tokensFrom(text){
  if(!text) return [];
  const parts = norm(text).split(/[^a-z0-9]+/).filter(Boolean);
  const toks = new Set();
  for(const p of parts){
    for(let i=2; i<=p.length; i++) toks.add(p.slice(0,i));
  }
  return Array.from(toks).slice(0, 200); // seguridad
}

function buildSearchTokens(cliente){
  const tokens = new Set([
    ...tokensFrom(cliente.nombre),
    ...tokensFrom(cliente.representante),
    ...tokensFrom(cliente.direccion),
  ]);
  // tags (si en el futuro las agregas)
  if (Array.isArray(cliente.tags)) {
    for (const t of cliente.tags) tokensFrom(t).forEach(x=>tokens.add(x));
  }
  // RUC solo dígitos
  if (cliente.ruc) tokens.add(cliente.ruc.replace(/\D/g,""));
  // RUC+DV normalizado (solo dígitos); ej: "1234567-55" → "1234567-55" y "123456755"
  if (cliente.rucdv_norm) {
    tokens.add(cliente.rucdv_norm);
    tokens.add(cliente.rucdv_norm.replace(/\D/g,""));
  }
  return Array.from(tokens);
}

document.getElementById("formCliente").addEventListener("submit", async e => {
  e.preventDefault();

  const accion = (e.submitter && e.submitter.dataset.accion) || "guardar";

  // 1) Construir objeto base
  const cliente = {
    nombre: document.getElementById("nombre").value.trim(),
    ruc: document.getElementById("ruc").value.trim(),
    dv: (document.getElementById("dv").value || "").trim(),
    direccion: document.getElementById("direccion").value.trim(),
    telefono: document.getElementById("telefono").value.trim(),
    email: document.getElementById("email").value.trim(),
    representante: document.getElementById("representante").value.trim(),
    representante_cedula: document.getElementById("representante_cedula").value.trim(),
    direccion_facturacion: document.getElementById("direccion_facturacion").value.trim()
  };

  // 2) Validaciones mínimas
  if (!cliente.nombre) {
    mostrarMensaje("⚠️ Debes ingresar un nombre", "red"); return;
  }
  // Solo bloquear "/" porque no puede estar en IDs
if (cliente.nombre.includes("/")) {
  mostrarMensaje("❌ El nombre no puede contener '/'", "red");
  return;
}
// DV: si se ingresa, debe ser 1–2 dígitos
if (cliente.dv && !/^\d{1,2}$/.test(cliente.dv)) {
  mostrarMensaje("❌ DV inválido. Debe tener 1–2 dígitos.", "red"); 
  return;
}

  // 3) Sanitizar y normalizar (ANTES de consultas)
  cliente.email = cliente.email.toLowerCase().trim();
  cliente.telefono = cliente.telefono.replace(/[^\d+]/g, ""); // deja dígitos y '+'

  // Email
  if (cliente.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(cliente.email)) {
    mostrarMensaje("❌ Email inválido.", "red"); return;
  }

  const user = firebase.auth().currentUser;
  const ahoraSrv = firebase.firestore.FieldValue.serverTimestamp();
  cliente.nombre_norm = cliente.nombre.toLowerCase().trim();
  cliente.ruc_norm = (cliente.ruc || "").replace(/\D/g, "");
  cliente.dv_norm = (cliente.dv || "").replace(/\D/g, "");
  cliente.rucdv_norm = cliente.ruc_norm + (cliente.dv_norm ? ("-" + cliente.dv_norm) : "");
  cliente.activo = true;
  cliente.updated_at = ahoraSrv;
  cliente.updated_by = user?.uid || null;
  cliente.searchTokens = buildSearchTokens(cliente);

  // 4) Deducción de contexto (crear vs editar)
  const params = new URLSearchParams(window.location.search);
  const clienteId = params.get("id");
// 5) Unicidad (SOLO al crear)
if (!clienteId) {
  // Prioridad: RUC+DV si hay DV
  if (cliente.rucdv_norm && cliente.dv_norm) {
    const dupRucDv = await db.collection("clientes")
      .where("rucdv_norm", "==", cliente.rucdv_norm).limit(1).get();
    if (!dupRucDv.empty) {
      mostrarMensaje("❌ Ya existe un cliente con ese RUC + DV.", "red"); return;
    }
  }

  // Compatibilidad: evitar duplicados por RUC base
  if (cliente.ruc_norm) {
    const dupRuc = await db.collection("clientes")
      .where("ruc_norm", "==", cliente.ruc_norm).limit(1).get();
    if (!dupRuc.empty) {
      mostrarMensaje("❌ Ya existe un cliente con ese RUC/Cédula.", "red"); return;
    }
  }

  // Nombre único
  const dupNom = await db.collection("clientes")
    .where("nombre_norm", "==", cliente.nombre_norm).limit(1).get();
  if (!dupNom.empty) {
    mostrarMensaje("❌ Ya existe un cliente con ese nombre.", "red"); return;
  }
}


  // 6) Guardar UNA sola vez (serverTimestamp)
  if (clienteId) {
    await db.collection("clientes").doc(clienteId).update(cliente);
  } else {
    cliente.created_at = ahoraSrv;
    cliente.created_by = user?.uid || null;
    cliente.vendedor_asignado = user?.uid || null;
    cliente.vendedor_email = user?.email || null;
    cliente.deleted = false; 
    const nuevoDoc = await db.collection("clientes").add(cliente);

    // Si es "guardar": redirige al contrato con el nuevo cliente_id
    mostrarMensaje("✅ Cliente guardado exitosamente", "green");
setTimeout(() => {
  if (params.has("from") && params.get("from") === "clientes") {
    window.location.href = "../clientes/index.html";
  } else {
    window.location.href = `nuevo-contrato.html?cliente_id=${nuevoDoc.id}`;
  }
}, 800);

    return;
  }

// 7) Flujos de salida (editar o crear con "guardar")
mostrarMensaje("✅ Cliente actualizado correctamente", "green");
setTimeout(() => {
  if (params.has("from") && params.get("from") === "clientes") {
    window.location.href = "../clientes/index.html";
  } else {
    window.location.href = `nuevo-contrato.html?cliente_id=${clienteId}`;
  }
}, 800);

});
    });

    window.addEventListener("DOMContentLoaded", async () => {
  const params = new URLSearchParams(window.location.search);
  const clienteId = params.get("id");

  // Update page title if editing
  if (clienteId) {
    document.getElementById("pageTitle").textContent = "🧾 Editar Cliente";
    
    const doc = await db.collection("clientes").doc(clienteId).get();
    if (!doc.exists) return;

    const d = doc.data();
    document.getElementById("nombre").value = d.nombre || "";
    document.getElementById("ruc").value = d.ruc || "";
    document.getElementById("dv").value = d.dv || "";
    document.getElementById("direccion").value = d.direccion || "";
    document.getElementById("telefono").value = d.telefono || "";
    document.getElementById("email").value = d.email || "";
    document.getElementById("representante").value = d.representante || "";
    document.getElementById("representante_cedula").value = d.representante_cedula || "";
    document.getElementById("direccion_facturacion").value = d.direccion_facturacion || "";
  }

  // Format RUC on the fly (remove spaces)
  document.getElementById("ruc").addEventListener("input", (e) => {
    e.target.value = (e.target.value || "").replace(/\s+/g, "");
  });

  // Auto-focus on nombre field
  document.getElementById("nombre").focus();
});
function volverAContrato() {
  const params = new URLSearchParams(window.location.search);

  if (params.has("from") && params.get("from") === "clientes") {
    // Si vino desde el módulo de clientes
    window.location.href = "../clientes/index.html";
    return;
  }

  // Caso por defecto: flujo de contratos
  const clienteId = params.get("id");
  if (clienteId) {
    window.location.href = `nuevo-contrato.html?cliente_id=${clienteId}`;
  } else {
    window.location.href = "nuevo-contrato.html";
  }
}


  </script>
</body>
</html>
