<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Nuevo Cliente</title>
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <style>
    /* ===================================
       UNIFIED DESIGN SYSTEM - NUEVO CLIENTE
       =================================== */

    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      background: #f8fafc;
      min-height: 100vh;
    }

    .page-wrap > h2 {
      margin: 0 0 20px 0;
      font-size: 26px;
      font-weight: 700;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0 0;
      padding: 12px 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-left: 4px solid #3b82f6;
      border-radius: 10px 10px 0 0;
    }

    .section-header h3 {
      margin: 0;
      font-size: 17px;
      font-weight: 650;
      color: #1e293b;
    }

    .section-shell {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-top: none;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
      padding: 20px;
      margin-bottom: 16px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-start;
      margin: 10px 0 20px;
    }

    .form-hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
      line-height: 1.4;
    }

    .form-field input,
    .form-field textarea {
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      transition: all 0.2s ease;
    }

    .form-field input:focus,
    .form-field textarea:focus {
      background: #fff;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
      outline: none;
    }

    /* Button Styles */
    .btn.primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      font-weight: 600;
      box-shadow: 0 1px 3px rgba(59, 130, 246, 0.3);
    }

    .btn.primary:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      box-shadow: 0 2px 6px rgba(59, 130, 246, 0.4);
    }

    .btn.ghost {
      background: transparent;
      color: #64748b;
      border: 1px solid #cbd5e1;
      font-weight: 500;
    }

    .btn.ghost:hover {
      background: #f8fafc;
      border-color: #94a3b8;
      color: #475569;
    }

    /* Toast System */
    .toast-wrap {
      position: fixed;
      right: 20px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 9999;
      max-width: 400px;
    }

    .toast {
      background: #0f172a;
      color: #fff;
      padding: 14px 16px;
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.20);
      font-size: 14px;
      line-height: 1.5;
      animation: slideInToast 0.3s ease;
    }

    @keyframes slideInToast {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast.ok {
      background: #166534;
      border-left: 4px solid #22c55e;
    }

    .toast.bad {
      background: #991b1b;
      border-left: 4px solid #ef4444;
    }

    #mensaje {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .page-wrap {
        padding: 12px;
      }

      .toast-wrap {
        left: 12px;
        right: 12px;
        max-width: none;
      }
    }
  </style>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/clientesService.js"></script>

</head>
<body>
  <div class="page-wrap">
    <h2 id="pageTitle">🧾 Registrar Nuevo Cliente</h2>

    <div class="top-actions">
      <button type="button" class="btn ghost" onclick="volverAContrato()">⬅️ Volver</button>
    </div>

    <form id="formCliente">
      <!-- ============================================
           SECCIÓN 1: IDENTIFICACIÓN FISCAL
           ============================================ -->
      <div class="section-header">
        <h3>📋 Identificación Fiscal</h3>
      </div>
      <div class="section-shell">
        <div class="form-grid cols-2">
          <div class="form-field" style="grid-column: 1/-1">
            <label class="req">Nombre del cliente</label>
            <input type="text" id="nombre" required>
          </div>

          <div class="form-field">
            <label class="req">RUC / Cédula</label>
            <input type="text" id="ruc" required>
            <div class="form-hint">Ej: 15567890 (sin DV)</div>
          </div>

          <div class="form-field">
            <label>DV</label>
            <input type="text" id="dv" inputmode="numeric" pattern="\d{1,2}" maxlength="2" placeholder="Ej. 55" title="1-2 dígitos">
            <div class="form-hint">Si aplica, ingresa 1–2 dígitos</div>
          </div>
        </div>
      </div>

      <!-- ============================================
           SECCIÓN 2: CONTACTO
           ============================================ -->
      <div class="section-header">
        <h3>📞 Contacto</h3>
      </div>
      <div class="section-shell">
        <div class="form-grid cols-2">
          <div class="form-field">
            <label>Teléfono</label>
            <input type="text" id="telefono">
          </div>

          <div class="form-field">
            <label>Email</label>
            <input type="email" id="email">
          </div>
        </div>
      </div>

      <!-- ============================================
           SECCIÓN 3: REPRESENTANTE LEGAL
           ============================================ -->
      <div class="section-header">
        <h3>👤 Representante Legal</h3>
      </div>
      <div class="section-shell">
        <div class="form-grid cols-2">
          <div class="form-field">
            <label>Representante Legal</label>
            <input type="text" id="representante">
          </div>

          <div class="form-field">
            <label>Cédula del Representante Legal</label>
            <input type="text" id="representante_cedula">
          </div>
        </div>
      </div>

      <!-- ============================================
           SECCIÓN 4: DIRECCIONES
           ============================================ -->
      <div class="section-header">
        <h3>📍 Direcciones</h3>
      </div>
      <div class="section-shell">
        <div class="form-grid cols-1">
          <div class="form-field">
            <label class="req">Dirección principal</label>
            <input type="text" id="direccion" required>
          </div>

          <div class="form-field">
            <label>Dirección de facturación</label>
            <input type="text" id="direccion_facturacion">
            <div class="form-hint">Opcional. Si se deja vacío, se usa la dirección principal.</div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn primary" data-accion="guardar">💾 Guardar</button>
        <button type="button" class="btn ghost" onclick="volverAContrato()">Cancelar</button>
      </div>

      <p id="mensaje" class="resumen"></p>
    </form>
  </div>

  <!-- Toast Container -->
  <div id="toasts" class="toast-wrap"></div>
<script src="../js/ui/toast.js"></script>

  <script src="../js/pages/nuevo-cliente.js" defer></script>
</body>
</html>
