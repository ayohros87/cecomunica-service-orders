<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Contratos – Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

<style>
/* ========================================
   UNIFIED DESIGN SYSTEM
   ======================================== */

html, body {
  margin: 0;
  padding: 0;
}

body {
  background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
  min-height: 100vh;
}

/* Unified Topbar */
.topbar {
  background: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  border-bottom: 3px solid var(--brand);
  width: 100%;
  box-sizing: border-box;
}

.topbar h1 {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text);
  font-size: 1.5rem;
}

/* Unified Content Area */
.app-wrap {
  max-width: none;
  margin: 0 auto;
  padding: 12px 20px;
  box-sizing: border-box;
}

/* Unified Filter Cards */
.card {
  background: white;
  border-radius: 8px;
  padding: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  margin-bottom: 12px;
}

/* Unified Table Styling */
.table-wrap {
  background: white;
  border-radius: 8px;
  padding: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  overflow: hidden;
  width: 100%;
  margin-top: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: auto;
}

table thead {
  background: linear-gradient(135deg, #f8fafc, #f1f5f9);
}

table th {
  font-weight: 600;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 12px 16px;
  color: var(--text);
  vertical-align: middle;
  border-bottom: 2px solid #e2e8f0;
}

table td {
  padding: 10px 16px;
  vertical-align: middle;
  font-size: 16px;
}

table tbody tr {
  transition: background 0.15s;
  border-bottom: 1px solid var(--line);
}

table tbody tr:hover {
  background: #f0f9ff;
}

/* Unified Button System */
.btn {
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 8px;
  transition: all 0.2s ease;
}

/* Equipos peek icon */
.equipos-peek {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  font-size: 18px;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.2s ease;
}

.equipos-peek:hover {
  background: #f0f9ff;
  transform: scale(1.1);
}

/* Tooltip floating */
#equiposTooltip {
  position: fixed;
  z-index: 9999;
  background: white;
  border: 1px solid var(--line);
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  padding: 12px;
  max-width: 420px;
  pointer-events: none;
}

#equiposTooltip .tooltip-line {
  font-size: 13px;
  margin: 4px 0;
  line-height: 1.4;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-storage-compat.js"></script>
<script src="../js/firebase-init.js"></script>
<script src="../js/core/roles.js"></script>
<script src="../js/core/formatting.js"></script>
<script src="../js/core/auth.js"></script>
<script src="../js/services/contratosService.js"></script>
<script src="../js/services/mailService.js"></script>
<script src="../js/services/ordenesService.js"></script>
<script src="../js/domain/totales.js"></script>
<script src="../js/ui/toast.js"></script>
<script src="../js/ui/modal.js"></script>
</head>
<body>
  <div class="topbar">
    <h1 style="margin: 0; font-size: 1.5rem; font-weight: 700;">📄 Contratos</h1>
    <div style="margin-left: auto; display: flex; gap: 10px; align-items: center;">
      <button id="btnNuevoContrato" class="btn primary" onclick="location.href='nuevo-contrato.html'" style="font-size: 14px;">➕ Nuevo Contrato</button>
      <button class="btn-top" onclick="window.location.href='../index.html'">🏠 Menú principal</button>
      <button class="btn danger" onclick="cerrarSesion()" style="background: var(--bad); border-color: var(--bad);">🚪 Salir</button>
    </div>
  </div>
  
  <div class="app-wrap">
    <p id="mensaje" class="resumen" style="min-height: 20px; margin-bottom: 8px;"></p>
    
<div class="card">
  <div class="toolbar">
    <div class="left" id="filtros">
      <input type="text" id="filtroCliente" placeholder="Filtrar por cliente">
    <select id="filtroEstado">
      <option value="">Todos</option>
      <option value="pendiente_aprobacion">Pendiente Aprobación</option>
      <option value="aprobado">Aprobado</option>
      <option value="activo">Activo</option>
      <option value="vencido">Vencido</option>
      <option value="anulado">Anulado</option>
      <option value="inactivo">Inactivo</option>
    </select>
      <button id="btnFiltrar" class="btn">🔍 Aplicar</button>
      <button id="btnLimpiarBusqueda" class="btn secondary">🧹 Limpiar búsqueda</button>
      <label style="margin-left:8px; font-size:14px;">
  <input type="checkbox" id="chkSoloPendientes">
  Solo pendientes
</label>
      <label style="margin-left:8px; font-size:14px;">
  <input type="checkbox" id="chkMostrarInactivos">
  Mostrar inactivos/anulados
</label>

    </div>
    <div class="right resumen" id="resumenContratos">
      <div class="loader" style="width: 24px; height: 24px; border-width: 3px;"></div>
    </div>
    <button id="btnBackfillEquipos" class="btn" style="display:none; margin-left:12px;" onclick="iniciarBackfillTodosContratos()" title="Solo para debugging - Cloud Functions sincronizan automáticamente">🔄 Re-sincronizar equipos (admin)</button>
    <button class="btn secondary" style="display:none; margin-left:8px;" onclick="limpiarCacheEquipos()" title="Solo para debugging - Limpiar caché del navegador">🧹 Limpiar caché</button>
  </div>
</div>

<input type="file" id="fileFirmado" accept="application/pdf,image/*" style="display:none">
<div id="uploadStatus" style="display:none; margin:8px 0; font-size:14px;">
  ⬆️ Subiendo contrato firmado… <strong id="uploadPct">0%</strong>
</div>
<div class="table-wrap mt-12">
  <table>
    <thead>
      <tr id="encabezadoContratos">
        <th class="sortable" onclick="ordenarPor('contrato_id')">ID</th>
        <th class="sortable" onclick="ordenarPor('cliente_nombre')">Cliente</th>
        <th>Tipo</th>
        <th>Acción</th>
        <th>Equipos</th>
        <th class="sortable" onclick="ordenarPor('estado')">Estado</th>
        <th class="sortable" onclick="ordenarPor('fecha_creacion')">Fecha creación</th>
        <th>Creado por</th>
        <th class="sortable" onclick="ordenarPor('total')">Total</th>
        <th class="acciones">Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaContratos">
      <!-- Skeleton loader rows -->
      <tr class="skeleton-row">
        <td colspan="10" style="padding: 0; border: none;">
          <div class="skeleton-table-row">
            <div class="skeleton-cell" style="width: 8%;"></div>
            <div class="skeleton-cell" style="width: 20%;"></div>
            <div class="skeleton-cell" style="width: 12%;"></div>
            <div class="skeleton-cell" style="width: 15%;"></div>
            <div class="skeleton-cell" style="width: 12%;"></div>
            <div class="skeleton-cell" style="width: 12%;"></div>
            <div class="skeleton-cell" style="width: 10%;"></div>
            <div class="skeleton-cell" style="width: 8%;"></div>
            <div class="skeleton-cell" style="width: 8%;"></div>
          </div>
        </td>
      </tr>
      <tr class="skeleton-row">
        <td colspan="9" style="padding: 0; border: none;">
          <div class="skeleton-table-row">
            <div class="skeleton-cell" style="width: 8%;"></div>
            <div class="skeleton-cell" style="width: 20%;"></div>
            <div class="skeleton-cell" style="width: 12%;"></div>
            <div class="skeleton-cell" style="width: 15%;"></div>
            <div class="skeleton-cell" style="width: 12%;"></div>
            <div class="skeleton-cell" style="width: 12%;"></div>
            <div class="skeleton-cell" style="width: 10%;"></div>
            <div class="skeleton-cell" style="width: 8%;"></div>
            <div class="skeleton-cell" style="width: 8%;"></div>
          </div>
        </td>
      </tr>
      <tr class="skeleton-row">
        <td colspan="9" style="padding: 0; border: none;">
          <div class="skeleton-table-row">
            <div class="skeleton-cell" style="width: 8%;"></div>
            <div class="skeleton-cell" style="width: 20%;"></div>
            <div class="skeleton-cell" style="width: 12%;"></div>
            <div class="skeleton-cell" style="width: 15%;"></div>
            <div class="skeleton-cell" style="width: 12%;"></div>
            <div class="skeleton-cell" style="width: 12%;"></div>
            <div class="skeleton-cell" style="width: 10%;"></div>
            <div class="skeleton-cell" style="width: 8%;"></div>
            <div class="skeleton-cell" style="width: 8%;"></div>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Mobile cards (shown only on small screens) -->
<div id="listaContratosMovil" class="cards-list" style="display:none"></div>

<div style="margin:12px 0; text-align:center;">
  <button class="btn" id="btnCargarMas">⬇️ Cargar más contratos</button>
</div>

  </div> <!-- app-wrap -->

  <script src="../js/pages/contratos-index.js" defer></script>

<div id="overlayAprobacion" class="overlay" style="display:none;"
     role="dialog" aria-modal="true" aria-labelledby="aprobacionTitulo">
  <div class="modal" id="sheetAprobacion">
    <div class="sheet-header">
      <span class="handle" aria-hidden="true"></span>
      <h3 id="aprobacionTitulo" class="sheet-title">Aprobación de contrato</h3>
      <button class="btn ghost close-x" onclick="cerrarOverlay()" aria-label="Cerrar">✕</button>
    </div>

    <div class="sheet-body">
      <fieldset style="border:1px solid var(--line); border-radius:8px; padding:16px; margin-bottom:12px;">
        <legend style="padding:0 10px; font-weight:bold;">📝 Detalles del Contrato</legend>
        <div id="detallesContrato" style="font-size:15px;"></div>
      </fieldset>

      <fieldset style="border: 1px solid var(--line); border-radius: 8px; padding: 12px;">
        <legend style="padding: 0 10px; font-weight: bold;">📦 Equipos Asociados</legend>
        <div class="table-scroll">
          <table style="width:100%; border-collapse:collapse; font-size:14px; min-width:520px;">
            <thead style="background:#f5f5f5;">
              <tr>
                <th style="border:1px solid var(--line); padding:6px;">Modelo</th>
                <th style="border:1px solid var(--line); padding:6px;">Cantidad</th>
                <th style="border:1px solid var(--line); padding:6px;">Precio</th>
                <th style="border:1px solid var(--line); padding:6px;">Total</th>
              </tr>
            </thead>
            <tbody id="tablaEquiposAprobacion"></tbody>
          </table>
        </div>
      </fieldset>
    </div>

    <div class="footer">
      <button class="btn secondary" onclick="cancelarAprobacion()">❌ Cancelar</button>
      <button class="btn ok" onclick="confirmarAprobacion()">✅ Aprobar Contrato</button>
    </div>
  </div>
</div>

<div id="overlayPanelTrabajo" class="overlay" style="display:none;" role="dialog" aria-modal="true">
  <div class="modal" style="max-width: 980px;">
    <div class="sheet-header">
      <span class="handle" aria-hidden="true"></span>
      <h3 class="sheet-title">🗂️ Panel de trabajo</h3>
      <button class="btn ghost close-x" onclick="cerrarPanelTrabajo()" aria-label="Cerrar">✕</button>
    </div>
    <div class="sheet-body" id="panelTrabajoBody">
      <!-- Contenido dinámico -->
    </div>
    <div class="footer">
      <button class="btn secondary" onclick="cerrarPanelTrabajo()">Cerrar</button>
    </div>
  </div>
</div>

<!-- Modal para equipos asociados al contrato -->
<div id="overlayEquiposContrato" class="overlay" style="display:none;" role="dialog" aria-modal="true">
  <div class="modal" style="max-width: 980px;">
    <div class="sheet-header">
      <span class="handle" aria-hidden="true"></span>
      <h3 class="sheet-title">📦 Equipos del contrato</h3>
      <button class="btn ghost close-x" onclick="cerrarModalEquiposContrato()" aria-label="Cerrar">✕</button>
    </div>
    <div class="sheet-body" id="modalEquiposBody">
      <!-- Contenido dinámico -->
    </div>
    <div class="footer">
      <button class="btn secondary" onclick="cerrarModalEquiposContrato()">Cerrar</button>
    </div>
  </div>
</div>
