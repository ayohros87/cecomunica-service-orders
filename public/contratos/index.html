    /* Page-local — kit primitives handle the rest */

    /* Hidden estado select drives filter-chips (preserves JS contract) */

    /* Resumen / counts inside the table footer */

      display: flex; gap: var(--sp-3); align-items: center;
      font-size: 13px; color: var(--fg-3); flex-wrap: wrap;
    }
    #resumenContratos strong { color: var(--fg-1); font-weight: 700; }
    #resumenContratos .badge {
      padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
      border: 1px solid var(--border-subtle);
      background: var(--surface-card); color: var(--fg-2);
    }
    #resumenContratos .badge.pendiente { background: var(--chip-diag-bg);     color: var(--chip-diag-fg);     border-color: var(--chip-diag-bd); }
    #resumenContratos .badge.aprobado  { background: var(--chip-aprobada-bg); color: var(--chip-aprobada-fg); border-color: var(--chip-aprobada-bd); }
    #resumenContratos .badge.completo  { background: var(--chip-lista-bg);    color: var(--chip-lista-fg);    border-color: var(--chip-lista-bd); }

    /* Action column — keep buttons inline and visible always (high density) */
    .app-table td.acciones {
      white-space: nowrap;
      text-align: right;
    }
    .app-table td.acciones .btn { margin-left: var(--sp-1); }
    /* The ⋯ overflow menu trigger sits flush after the inline CTA. */
    .app-table td.acciones .overflow-menu { margin-left: var(--sp-1); vertical-align: middle; }

    /* The overflow dropdown is position:absolute and must escape the table
       container; the kit default (.app-table-wrap { overflow-x:auto }) clips
       it. Mirror ordenes-index and make the wrap non-clipping. */
    .app-table-wrap { overflow: visible; }

    /* Zebra stripe + readability bump — mirrors ordenes/index. The kit
       default (13px on a 1-row band) felt tight here; bumping td font to
       15px and using a slightly darker tint (#f1f5f9 vs #f8fafc) gives
       the same "agrupado" feel as ordenes. */
    table.app-table tbody td { font-size: 15px; }
    table.app-table tbody tr:nth-child(even) { background: #f1f5f9; }
    table.app-table tbody tr:nth-child(even):hover { background: var(--brand-soft); }

    /* Equipos peek icon (inline emoji-style in table) */
    .equipos-peek {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--dur-fast);
    }
    .equipos-peek:hover { background: var(--accent-soft); }

    /* Tooltip floating: estilo vive en .tooltip-floating del kit
       (app-kit-extras.css). Aquí solo override de display por compatibilidad
       con el JS que toggle-ea style.display = 'block'/'none'. */
    #equiposTooltip[style*="display: block"] { display: block !important; }

    /* Toggle pill: definida en app-kit-extras.css del kit. */

    /* Upload status: alias del .alert-banner del kit por compatibilidad JS. */
    #uploadStatus { display: none; }
  </style>

  <!-- Filter-chip wiring: chips drive the hidden #filtroEstado select.
       Setting .value + dispatching 'change' lets contratos-list.js stay
       agnostic of the chip UI. -->
  <script>
    (function wireEstadoChips() {
      const chips = document.querySelectorAll('#filtroEstadoChips .filter-chip');
      const sel   = document.getElementById('filtroEstado');
      const chkPnd = document.getElementById('chkSoloPendientes');
      const chkIna = document.getElementById('chkMostrarInactivos');

      function activate(estado) {
        chips.forEach(c => c.classList.toggle('active', c.dataset.estado === estado));
      }

      chips.forEach(chip => {
        chip.addEventListener('click', () => {
          const estado = chip.dataset.estado;
          if (!sel) return;
          sel.value = estado;
          activate(estado);
          // Keep checkbox shortcut in sync
          if (chkPnd) chkPnd.checked = (estado === 'pendiente_aprobacion');
          // Trigger reload — contratos-list.js doesn't listen to #filtroEstado
          if (window.ContratosLista?.cargar) ContratosLista.cargar(true);
        });
      });

      // Mirror programmatic select changes back to chip state
      sel?.addEventListener('change', () => activate(sel.value || ''));

      // contratos-list.js sets sel.value when chkSoloPendientes changes but
      // doesn't dispatch 'change' on the select — mirror chip state here.
      chkPnd?.addEventListener('change', () => {
        activate(chkPnd.checked ? 'pendiente_aprobacion' : '');
      });

      // Initial sync from the hidden select
      activate(sel?.value || '');
    })();
  </script>
