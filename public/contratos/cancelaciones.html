<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8" />
  <title>Cancelaciones de equipos - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-storage-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/services/contratosService.js"></script>
  <script src="../js/services/cancelacionesService.js"></script>
  <script src="/js/vendor/lucide.min.js"></script>

  <style>
    .estado-pill { display:inline-flex; align-items:center; border-radius:999px; padding:1px 9px; font-size:12px; font-weight:600; }
    .e-pend { background:#FFFBEB; color:#92400E; border:1px solid #FDE68A; }
    .e-aprob{ background:#ECFDF5; color:#065F46; border:1px solid #A7F3D0; }
    .e-cerr { background:#EFF6FF; color:#1E40AF; border:1px solid #BFDBFE; }
    .e-rech { background:#FEF2F2; color:#991B1B; border:1px solid #FECACA; }
    .baja-card + .baja-card { margin-top: var(--sp-3); }
    .seg { display:inline-flex; border:1px solid var(--border-default); border-radius:var(--radius-pill); overflow:hidden; }
    .seg-btn { border:0; background:var(--surface-card); color:var(--fg-2); padding:5px 14px; font-size:13px; font-weight:600; cursor:pointer; }
    .seg-btn.is-on { background:var(--accent); color:#fff; }
    .seg-btn + .seg-btn { border-left:1px solid var(--border-default); }
  </style>
</head>
<body>

<div id="topbar-mount"></div>
<script>
  Layout.renderTopbar({ title: '<i data-lucide="file-minus-2"></i> Enmiendas y terminaciones', showHome: true, homeHref: '../index.html', showLogout: true,
    menu: [{ href: './index.html', label: '<i data-lucide="file-text"></i> Contratos' }] });
</script>

<div class="app-wrap">
  <!-- Solicitud (solo si llega ?contrato=) -->
  <div id="solicitudWrap" style="display:none; margin-bottom:var(--sp-5);">
    <div class="ds-card" style="padding:var(--sp-5);">
      <h3 style="margin:0 0 4px;"><i data-lucide="file-minus-2" style="width:18px;height:18px;"></i> Enmienda / terminación de contrato</h3>
      <p id="solSub" style="margin:0 0 var(--sp-4); color:var(--fg-3); font-size:13px;"></p>

      <div class="form-grid-2" style="margin-bottom:var(--sp-3);">
        <div class="form-field">
          <label class="form-label" for="tipo">Tipo de enmienda</label>
          <select class="form-select" id="tipo">
            <option value="baja_parcial">Baja parcial (devolución de unidades)</option>
            <option value="terminacion_total">Terminación total del contrato</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" for="motivoCodigo">Motivo</label>
          <select class="form-select" id="motivoCodigo"></select>
        </div>
      </div>

      <div id="solEquipos" style="margin-bottom:var(--sp-4);"></div>

      <div class="form-grid-2">
        <div class="form-field">
          <label class="form-label" for="termino">Término (fin de facturación)</label>
          <select class="form-select" id="termino">
            <option value="fin_mes">Hasta fin de mes</option>
            <option value="30_dias">30 días más</option>
            <option value="60_dias">60 días más</option>
            <option value="otro">Otro (elegir fecha)</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" for="fechaNota">Fecha de la nota del cliente</label>
          <input class="form-input" type="date" id="fechaNota">
        </div>
        <div class="form-field" id="otraFechaWrap" style="display:none;">
          <label class="form-label" for="fechaOtra">Fin de facturación (manual)</label>
          <input class="form-input" type="date" id="fechaOtra">
        </div>
        <div class="form-field">
          <label class="form-label" for="notaArchivo">Aviso del cliente (PDF/imagen)</label>
          <input class="form-input" type="file" id="notaArchivo" accept="image/*,application/pdf">
        </div>
      </div>

      <!-- Liquidación -->
      <div class="form-grid-2" style="margin-top:var(--sp-2);">
        <div class="form-field">
          <label class="form-label" style="display:flex; align-items:center; gap:8px;">
            <input type="checkbox" id="aplicaPenalidad" style="width:auto;"> Penalidad por terminación anticipada
          </label>
          <input class="form-input" type="number" id="penalidadMonto" min="0" step="any" placeholder="0.00" disabled>
        </div>
        <div class="form-field">
          <label class="form-label" for="depositoAccion">Depósito / garantía</label>
          <div style="display:flex; gap:8px;">
            <select class="form-select" id="depositoAccion" style="flex:1;">
              <option value="na">No aplica</option>
              <option value="devolver">Devolver</option>
              <option value="retener">Retener</option>
            </select>
            <input class="form-input" type="number" id="depositoMonto" min="0" step="any" placeholder="0.00" style="width:120px;" disabled>
          </div>
        </div>
        <div class="form-field" style="grid-column:1/-1;">
          <label class="form-label" for="motivoDetalle">Observaciones / detalle</label>
          <textarea class="form-input form-textarea" id="motivoDetalle" placeholder="(opcional)"></textarea>
        </div>
      </div>

      <p id="finPreview" style="margin:8px 0 0; font-size:13px; color:var(--fg-2);"></p>

      <div style="display:flex; gap:8px; margin-top:var(--sp-4);">
        <button class="btn btn-primary" id="btnEnviar"><i data-lucide="send"></i> Enviar solicitud</button>
        <a class="btn btn-ghost" href="./index.html">Cancelar</a>
      </div>
    </div>
  </div>

  <!-- Cola / historial -->
  <div class="ds-card" style="padding:0;">
    <div style="padding:var(--sp-3) var(--sp-4); display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
      <div class="seg" role="tablist">
        <button type="button" class="seg-btn is-on" data-estado="pendiente" onclick="Cancelaciones.setFiltro('pendiente')">Pendientes</button>
        <button type="button" class="seg-btn" data-estado="aprobada" onclick="Cancelaciones.setFiltro('aprobada')">Aprobadas</button>
        <button type="button" class="seg-btn" data-estado="cerrada" onclick="Cancelaciones.setFiltro('cerrada')">Cerradas</button>
        <button type="button" class="seg-btn" data-estado="rechazada" onclick="Cancelaciones.setFiltro('rechazada')">Rechazadas</button>
        <button type="button" class="seg-btn" data-estado="" onclick="Cancelaciones.setFiltro('')">Todas</button>
      </div>
      <span id="colaResumen" style="font-size:13px; color:var(--fg-3);"></span>
    </div>
    <div id="colaLista" style="padding:var(--sp-4);"></div>
  </div>
</div>

<script src="../js/ui/toast.js"></script>
<script src="../js/pages/cancelaciones.js" defer></script>
<script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
