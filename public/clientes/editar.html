<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Redirigiendo…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    // Esta página fue consolidada con contratos/nuevo-cliente.html (form único).
    // Se preserva como redirect para bookmarks o links históricos.
    (function(){
      var p = new URLSearchParams(location.search);
      var id = p.get('id');
      var target = '../contratos/nuevo-cliente.html?from=clientes' + (id ? ('&id=' + encodeURIComponent(id)) : '');
      location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirigiendo al formulario de cliente…</p>
</body>
</html>
