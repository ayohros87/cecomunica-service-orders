<!-- public/clientes/editar.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Editar cliente – Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/services/clientesService.js"></script>

  <link rel="stylesheet" href="../css/ceco-ui.css">
  <script src="../js/core/layout.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="topbar-mount"></div>
<script>
  Layout.renderTopbarFor('edit', {
    title: '<span id="title">Nuevo cliente</span>',
    back:  { href: './index.html' }
  });
</script>

<div class="app-wrap app-wrap--default">

  <div class="app-card app-card-padded">
    <div class="form-section-header">
      <h3><i data-lucide="building-2"></i> Datos del cliente</h3>
    </div>
    <div class="form-section-body">
      <div class="form-grid-2">

        <div class="form-field">
          <label class="form-label" for="nombre">Nombre <span class="req">*</span></label>
          <input class="form-input" id="nombre" type="text" placeholder="Ej: Constructora XYZ" required>
          <span class="form-hint">Campo obligatorio.</span>
        </div>

        <div class="form-field">
          <label class="form-label" for="representante">Representante</label>
          <input class="form-input" id="representante" type="text" placeholder="Nombre del representante legal">
        </div>

        <div class="form-field">
          <label class="form-label" for="cedula_representante">Cédula del representante</label>
          <input class="form-input" id="cedula_representante" type="text" placeholder="Cédula del representante legal">
        </div>

        <div class="form-field">
          <label class="form-label" for="ruc">RUC</label>
          <input class="form-input" id="ruc" type="text" placeholder="RUC / NIT" style="font-family:var(--font-mono);">
        </div>

        <div class="form-field">
          <label class="form-label" for="telefono">Teléfono</label>
          <div class="form-input-wrap">
            <span class="form-input-prefix"><i data-lucide="phone" style="width:15px;height:15px;"></i></span>
            <input class="form-input" id="telefono" type="tel" placeholder="+507 ...">
          </div>
        </div>

        <div class="form-field">
          <label class="form-label" for="email">Email</label>
          <div class="form-input-wrap">
            <span class="form-input-prefix"><i data-lucide="mail" style="width:15px;height:15px;"></i></span>
            <input class="form-input" id="email" type="email" placeholder="correo@empresa.com">
          </div>
        </div>

        <div class="form-field" style="grid-column: 1 / -1;">
          <label class="form-label" for="direccion">Dirección</label>
          <textarea class="form-input form-textarea" id="direccion" rows="3" placeholder="Dirección fiscal / de facturación"></textarea>
        </div>

        <div class="form-field">
          <label class="form-label" for="vendedor_asignado">Vendedor asignado</label>
          <select class="form-select" id="vendedor_asignado"></select>
        </div>

        <div class="form-field">
          <label class="form-label">Estado</label>
          <label class="form-check">
            <input id="activo" type="checkbox" checked>
            <span>
              <span class="form-check-label">Cliente activo</span>
              <span class="form-check-desc form-hint">Desmarcar para ocultar de listados.</span>
            </span>
          </label>
        </div>

        <div class="form-field" style="grid-column: 1 / -1;">
          <label class="form-label" for="tags">Tags <span class="optional">(separados por coma)</span></label>
          <input class="form-input" id="tags" type="text" placeholder="educacion, escuela, gobierno">
          <span class="form-hint">Usa palabras clave para mejorar la búsqueda.</span>
        </div>
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button id="guardar" class="btn btn-primary btn-lg"><i data-lucide="save"></i> Guardar</button>
    <button type="button" class="btn btn-ghost" onclick="location.href='./index.html'">Cancelar</button>
  </div>

</div>


<script>
(function(){
  const auth = firebase.auth();

  const $ = (id)=>document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  function tokensFrom(text){
    if(!text) return [];
    const parts = text
      .toLowerCase()
      .normalize("NFD").replace(/[̀-ͯ]/g,"")
      .split(/[^a-z0-9]+/).filter(Boolean);
    const toks = new Set();
    for(const p of parts){
      for(let i=2;i<=p.length;i++){ toks.add(p.slice(0,i)); }
    }
    return Array.from(toks).slice(0,200);
  }

  auth.onAuthStateChanged(async (user)=>{
    if(!user){ location.href = '../index.html'; return; }
    if(id){ await cargar(); }
    if (window.lucide) lucide.createIcons();
  });

  async function cargar(){
    const c = await ClientesService.getCliente(id);
    if(!c){ alert('Cliente no encontrado'); location.href='./index.html'; return; }
    // Cargar lista de vendedores
    const vendedores = await UsuariosService.getVendedores();
    const $vend = document.getElementById('vendedor_asignado');
    $vend.innerHTML = '<option value="">— Sin asignar —</option>';
    vendedores.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id;
      if (d.nombre) {
        opt.textContent = `${d.nombre} (${d.email || ''})`;
      } else {
        opt.textContent = d.email || d.id;
      }
      if (c.vendedor_asignado === d.id) opt.selected = true;
      $vend.appendChild(opt);
    });

    $('title').textContent = 'Editar cliente';
    $('nombre').value = c.nombre||'';
    $('representante').value = c.representante||'';
    $('cedula_representante').value = c.cedula_representante||'';
    $('ruc').value = c.ruc||'';
    $('telefono').value = c.telefono||'';
    $('email').value = c.email||'';
    $('direccion').value = c.direccion||'';
    $('activo').checked = !!c.activo;
    $('tags').value = (c.tags||[]).join(', ');
  }

$('guardar').onclick = async ()=> {
  const payload = {
    nombre: $('nombre').value.trim(),
    representante: $('representante').value.trim()||null,
    cedula_representante: $('cedula_representante').value.trim()||null,
    ruc: $('ruc').value.trim()||null,
    telefono: $('telefono').value.trim()||null,
    email: $('email').value.trim()||null,
    direccion: $('direccion').value.trim()||null,
    activo: $('activo').checked,
    tags: $('tags').value.split(',').map(x=>x.trim()).filter(Boolean)
  };

  // vendedor asignado
  const vendSel = document.getElementById('vendedor_asignado');
  payload.vendedor_asignado = vendSel.value || null;
  if (vendSel.value) {
    const opt = vendSel.options[vendSel.selectedIndex].textContent;
    payload.vendedor_email = opt.match(/\((.*?)\)/)?.[1] || null;
  } else {
    payload.vendedor_email = null;
  }

  if(!payload.nombre){ alert('El nombre es obligatorio'); return; }

  // derivados
  payload.nombreLower = payload.nombre.toLowerCase();
  const toks = new Set([
    ...tokensFrom(payload.nombre),
    ...tokensFrom(payload.representante||''),
    ...payload.tags.map(t=>t.toLowerCase())
  ]);
  payload.searchTokens = Array.from(toks);

  try {
    if(id){
      await ClientesService.updateCliente(id, payload);
    } else {
      payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      payload.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
      await ClientesService.createCliente(payload);
    }
    alert('Guardado');
    location.href = './index.html';
  } catch(e){
    alert('Error al guardar: '+e.message);
  }
};

})();
</script>
</body>
</html>
