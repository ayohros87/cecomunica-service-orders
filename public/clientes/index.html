<!-- public/clientes/index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Clientes – Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script src="../js/services/clientesService.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/core/auth.js"></script>

 <link rel="stylesheet" href="../css/ceco-ui.css">
 <style>
  /* Ancho completo para esta vista */
  .topbar, .app-wrap { max-width: 100% !important; }
  /* Que las celdas de texto aprovechen el ancho */
  .table-wrap td input.table-input { width: 100%; }
  /* Permitir scroll horizontal si hay muchas columnas */
  .table-wrap { overflow-x: auto; }
</style>
</head>
<body>
  <div class="topbar">
  <h1>Clientes</h1>
  <div style="margin-left:auto; display:flex; gap:8px;">
    <button onclick="location.href='../index.html'" class="btn-top">← Volver</button>
    <button id="btnNuevo" class="btn-top">+ Nuevo cliente</button>
  </div>
</div>


<div class="app-wrap">
  <div class="section">
    <div class="toolbar">
      <div class="app-search">
        <input id="q" type="text" placeholder="Buscar por nombre o representante..." class="table-input sm"/>
        <label class="input-row fit">
          <input type="checkbox" id="soloActivos" />
          <span class="form-hint">Solo activos</span>
        </label>
      </div>
      <div class="input-row fit">
        <button id="btnBuscar" class="btn primary">Buscar</button>
        <button id="btnLimpiar" class="btn">Limpiar</button>
      </div>
    </div>
    <div id="resumen" class="resumen">0 resultados</div>
  </div>
<div id="bulkBar" class="muted" style="display:none; margin-top:8px">
  <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap">
    <div><strong id="bulkCount">0</strong> seleccionado(s)</div>
    <button id="bulkActivar" class="btn ok">Activar</button>
    <button id="bulkDesactivar" class="btn danger">Desactivar</button>
    <input id="bulkTag" class="table-input sm" type="text" placeholder="Agregar tag…">
    <button id="bulkAddTag" class="btn">Agregar tag</button>
  </div>
</div>
  <div class="table-wrap compact">
    <table id="tabla">
<thead>
  <tr>
    <th style="width:34px; text-align:center">
      <input id="selectAll" type="checkbox">
    </th>
    <th style="width:16%">Nombre</th>
    <th style="width:12%">RUC</th>
    <th style="width:8%">DV</th>
    <th style="width:14%">Representante</th>
    <th style="width:12%">Cédula Rep. Legal</th>
    <th style="width:12%">Teléfono</th>
    <th style="width:16%">Email</th>
    <th style="width:16%">Dirección</th>
    <th style="width:14%">Vendedor</th>
    <th style="width:10%">Tags</th>
    <th style="width:8%">Activo</th>
    <th class="actions" style="width:60px; text-align:center">Acciones</th>
  </tr>
</thead>



      <tbody id="tbody"></tbody>
    </table>
  </div>

    <div style="margin-top:12px; display:flex; gap:8px; align-items:center;">
    <button id="btnMas" class="btn">Cargar más</button>
    <button id="btnTodo" class="btn">Mostrar todo</button>
    </div>
<!-- Paginador por páginas -->
<div id="pagerBar" class="toolbar center" style="margin-top:12px">
  <button id="btnPrev" class="btn">← Anterior</button>
  <div class="input-row fit">
    <span>Página</span>
    <input id="pageInput" type="number" min="1" class="table-input sm" style="width:80px">
    <span id="pageTotal" class="resumen">/ —</span>
  </div>
  <button id="btnNext" class="btn">Siguiente →</button>
</div>
</div>
<!-- Modal de confirmación genérico -->
<div id="overlay" class="overlay">
  <div class="modal" id="confirmModal" role="dialog" aria-modal="true">
    <h3 id="confirmTitle" style="margin-top:0">Confirmar eliminación</h3>
    <div class="alert">Vas a <strong>eliminar (soft-delete)</strong> este cliente. No se pierde información,
      pero dejará de mostrarse en listados.</div>
    <p id="confirmMsg" class="resumen" style="margin:8px 0 0 0"></p>
    <div class="footer">
      <button class="btn" id="btnCancel">Cancelar</button>
      <button class="btn danger" id="btnOk">Eliminar</button>
    </div>
  </div>
</div>

<script src="../js/pages/clientes-index.js" defer></script>
</body>
</html>
