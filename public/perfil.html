<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Mi Perfil - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/ceco-ui.css">
  <!-- Rediseño Command Center F5: rail lateral (híbrido). PLAN_REDISENO_COMMAND_CENTER.md -->
  <link rel="stylesheet" href="css/ceco-rail.css?v=cc5">

  <!-- Firebase -->
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script defer src="js/firebase-init.js"></script>
  <script src="js/core/modulos.js"></script>
  <script src="js/core/layout.js?v=cc5"></script>
  <script src="/js/vendor/lucide.min.js"></script>
</head>
<body>
  <div class="cc-app">
  <div id="rail-mount"></div>
  <div class="cc-work">

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbarFor('edit', {
      title: '<i data-lucide="user"></i> Mi Perfil',
      back:  { href: 'index.html' }
    });
  </script>

  <div class="app-wrap app-wrap--narrow">

    <div class="ds-card ds-card-padded">
      <p class="form-section-title" style="margin-bottom:var(--sp-3);"><i data-lucide="user-circle"></i> Datos del usuario</p>
      <div class="form-grid-2">
        <div class="form-field" style="grid-column:1/-1;">
          <label class="form-label" for="perfil-nombre">Nombre</label>
          <input class="form-input" id="perfil-nombre" type="text" readonly>
        </div>
        <div class="form-field">
          <label class="form-label" for="perfil-correo">Correo electrónico</label>
          <div class="form-input-wrap">
            <span class="form-input-prefix"><i data-lucide="mail" style="width:15px;height:15px;"></i></span>
            <input class="form-input" id="perfil-correo" type="text" readonly>
          </div>
        </div>
        <div class="form-field">
          <label class="form-label" for="perfil-rol">Rol</label>
          <input class="form-input" id="perfil-rol" type="text" readonly>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Los scripts de Firebase cargan con defer: registrar tras DOMContentLoaded.
    document.addEventListener('DOMContentLoaded', () => {
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) { location.href = "login.html"; return; }

      document.getElementById("perfil-correo").value = user.email || "";

      try {
        const snap = await firebase.firestore().collection("usuarios").doc(user.uid).get();
        if (snap.exists) {
          const data = snap.data();
          document.getElementById("perfil-nombre").value = data.nombre || "";
          document.getElementById("perfil-rol").value = data.rol || "";
        }
      } catch (e) {
        console.error("Error al cargar perfil:", e);
      }
    });
    });

    function cerrarSesion() {
      firebase.auth().signOut().then(() => { location.href = "login.html"; });
    }
  </script>
  </div> <!-- /cc-work -->
  </div> <!-- /cc-app -->
  <script>
    // Rail Command Center (F5) — espera auth (scripts defer) y pinta el rail del rol efectivo.
    document.addEventListener('DOMContentLoaded', () => Layout.initRail(''));
  </script>
</body>
</html>
