<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Perfil - Cecomunica</title>
  <link rel="stylesheet" href="css/ceco-ui.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/core/layout.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbarFor('edit', {
      title: '<i data-lucide="user"></i> Mi Perfil',
      back:  { href: 'index.html' }
    });
  </script>

  <div class="app-wrap app-wrap--narrow">
    <div class="section">
      <div class="form-grid">
        <div class="form-field">
          <label>Nombre</label>
          <input id="perfil-nombre" type="text" readonly>
        </div>
        <div class="form-field">
          <label>Correo electrónico</label>
          <input id="perfil-correo" type="text" readonly>
        </div>
        <div class="form-field">
          <label>Rol</label>
          <input id="perfil-rol" type="text" readonly>
        </div>
      </div>
    </div>
  </div>

<script>
  firebase.auth().onAuthStateChanged(async (user) => {
    if (!user) {
      location.href = "login.html";
      return;
    }

    document.getElementById("perfil-correo").value = user.email || "";

    // Buscar datos de Firestore (colección usuarios)
    try {
      const snap = await firebase.firestore().collection("usuarios").doc(user.uid).get();
      if (snap.exists) {
        const data = snap.data();
        document.getElementById("perfil-nombre").value = data.nombre || "";
        document.getElementById("perfil-rol").value = data.rol || "";
      }
    } catch (e) {
      console.error("Error al cargar perfil:", e);
    }
  });

  function cerrarSesion() {
    firebase.auth().signOut().then(() => {
      location.href = "login.html";
    });
  }
</script>
</body>
</html>
