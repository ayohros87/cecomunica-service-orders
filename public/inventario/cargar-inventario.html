<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cargar Inventario - Último Registro</title>
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/services/modelosService.js"></script>
  <script src="../js/services/inventarioService.js"></script>
  <script src="../js/ui/toast.js"></script>

  <script src="../js/pages/cargar-inventario.js" defer></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="toolbar">
  <div class="left">
    <h2 style="margin:8px 0;"><i data-lucide="calendar"></i> Cargar Inventario</h2>
  </div>
  <div class="right">
    <button class="btn btn-primary" onclick="guardarSemana()"><i data-lucide="save"></i> Guardar inventario</button>
    <button class="btn" onclick="window.location.href='./index.html'"><i data-lucide="package"></i> Ver Inventario</button>
    <button class="btn" onclick="window.location.href='../index.html'"><i data-lucide="home"></i> Menú principal</button>
  </div>
</div>
<div class="card">
  <div class="toolbar">
    <div class="left">
      <input type="text" id="filtroMarca" placeholder="Buscar por marca">
      <input type="text" id="filtroModelo" placeholder="Buscar por modelo">
      <button class="btn" onclick="filtrar()"><i data-lucide="search"></i> Buscar</button>
      <button class="btn btn-secondary" onclick="limpiarFiltro()"><i data-lucide="refresh-cw"></i> Limpiar</button>
    </div>
    <div class="right resumen" id="resumenCargar">Cargando modelos…</div>
  </div>
</div>
<div class="app-table-wrap mt-12">
  <table class="app-table">
    <thead id="headerModelos"></thead>
    <tbody id="tablaModelos"></tbody>
  </table>
</div>

<script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
