<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8" />
  <title>Modelos de Radios - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-functions-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/services/modelosService.js"></script>

  <!-- XLSX (exportación) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    /* Page-local — el resto vive en el kit */

    /* Density toggle */
    .app-table-wrap[data-density="dense"] table { font-size: 12.5px; }
    .app-table-wrap[data-density="dense"] th,
    .app-table-wrap[data-density="dense"] td { padding: 6px 8px; }
    .app-table-wrap[data-density="roomy"] table { font-size: 14.5px; }
    .app-table-wrap[data-density="roomy"] th,
    .app-table-wrap[data-density="roomy"] td { padding: 10px 12px; }

    /* Sortable column header */
    th[data-sort] { cursor: pointer; user-select: none; }
    th .sort { font-size: 12px; opacity: .6; margin-left: 4px; }

    /* Helper para ocultar columnas vía menú */
    .hidden-col { display: none; }

    /* Stock badges */
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 999px; padding: 0 8px; height: 22px;
      font-size: 12px; font-weight: 600; border: 1px solid transparent;
    }
    .badge.completo  { background:#ECFDF5; color:#065F46; border-color:#A7F3D0; }
    .badge.pendiente { background:#FFFBEB; color:#92400E; border-color:#FDE68A; }
    .badge.danger    { background:#FEF2F2; color:#991B1B; border-color:#FECACA; }

    /* Acciones inline en celda */
    .table-actions { display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    /* Fila inactiva */
    tr.inactivo td { opacity: 0.55; }

    /* Modal overlay — alias .show con el shape del kit */
    #overlay.modal-backdrop.show { display: flex; }
  </style>
</head>
<body>

<div id="topbar-mount"></div>
<script>
  Layout.renderTopbarFor('index', {
    title: '<i data-lucide="book-open"></i> Modelos de Radios',
    leftSlot: `
      <div class="filter-search" style="max-width:320px;">
        <span class="search-icon"><i data-lucide="search"></i></span>
        <input id="q" type="search" placeholder="Buscar marca, modelo o tipo…" aria-label="Buscar modelos">
      </div>`,
    actions: [
      { label: '<i data-lucide="plus"></i> Nuevo modelo', cls: 'primary', onclick: "abrirModal()" }
    ],
    menu: [
      { href: './index.html',   label: '<i data-lucide="package"></i> Inventario' },
      { href: './piezas.html',  label: '<i data-lucide="layers"></i> Piezas' },
      { onclick: 'exportarExcel()', label: '<i data-lucide="download"></i> Excel' },
      { divider: true },
      { html: '<label class="overflow-menu-item"><input type="checkbox" checked id="col-CHK-estado"> Columna “Estado”</label>' },
      { html: '<label class="overflow-menu-item"><input type="checkbox" checked id="col-CHK-alto"> Columna “Alto mov.”</label>' },
      { html: '<label class="overflow-menu-item"><input type="checkbox" checked id="col-CHK-minimo"> Columna “Mínimo”</label>' },
      { html: '<label class="overflow-menu-item"><input type="checkbox" checked id="col-CHK-activo"> Columna “Activo”</label>' },
      { divider: true },
      { html: '<label class="overflow-menu-item"><input type="checkbox" checked id="chk-inactivos"> Mostrar inactivos</label>' },
      { onclick: 'toggleDensity()', label: '<i data-lucide="arrow-up-down"></i> Alternar densidad' }
    ]
  });
</script>

<div class="app-wrap app-wrap--full">
  <div class="app-card">
    <div class="app-table-footer" style="border-top:0; padding:var(--sp-3) var(--sp-4);">
      <p id="resumenModelos" class="resumen" style="margin:0;">Cargando modelos…</p>
    </div>
    <div class="app-table-wrap" id="wrapTabla" data-density="roomy" style="border:none; box-shadow:none; border-radius:0;">
      <table class="app-table">
        <thead id="headerModelos"></thead>
        <tbody id="tablaModelos"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal nuevo / editar modelo -->
<div id="overlay" class="modal-backdrop" style="display:none;" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:680px;">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Nuevo modelo</h3>
      <button class="modal-close" onclick="cerrarModal()" aria-label="Cerrar"><i data-lucide="x" style="width:18px;height:18px;"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid-2">
        <div class="form-field">
          <label class="form-label" for="f-marca">Marca <span class="req">*</span></label>
          <input class="form-input" id="f-marca" placeholder="Ej. Hytera">
        </div>
        <div class="form-field">
          <label class="form-label" for="f-modelo">Modelo <span class="req">*</span></label>
          <input class="form-input" id="f-modelo" placeholder="Ej. PD786">
        </div>

        <div class="form-field">
          <label class="form-label" for="f-tipo">Tipo</label>
          <select class="form-select" id="f-tipo">
            <option value="P">Portátil</option>
            <option value="B">Base</option>
            <option value="C">Cámara</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" for="f-estado">Estado</label>
          <select class="form-select" id="f-estado">
            <option value="N">Nuevo</option>
            <option value="R">Reuso</option>
          </select>
        </div>

        <div class="form-field">
          <label class="form-label" for="f-minimo">Mínimo (alerta)</label>
          <input class="form-input" id="f-minimo" type="number" step="1" min="0" placeholder="5">
        </div>

        <div class="form-field">
          <label class="form-label">Flags</label>
          <div style="display:flex; gap:18px; flex-wrap:wrap;">
            <label class="form-check">
              <input type="checkbox" id="f-alto">
              <span><span class="form-check-label">Alto movimiento</span></span>
            </label>
            <label class="form-check">
              <input type="checkbox" id="f-activo" checked>
              <span><span class="form-check-label">Activo</span></span>
            </label>
          </div>
        </div>

        <div class="form-field" style="grid-column:1 / -1;">
          <label class="form-label" for="f-notas">Notas</label>
          <textarea class="form-input form-textarea" id="f-notas" placeholder="(opcional)"></textarea>
        </div>

        <div class="form-field" style="grid-column:1 / -1; margin-top:6px; border-top:1px solid #e5e7eb; padding-top:12px;">
          <div class="form-label" style="font-weight:600;">Facturación (QuickBooks)</div>
          <p style="margin:.25rem 0 0; color:#666; font-size:.8rem;">
            Tarifas fijas por unidad para el desglose de la mensualidad. El mantenimiento
            se calcula como el resto (mensualidad − alquiler − frecuencia).
          </p>
        </div>
        <div class="form-field">
          <label class="form-label" for="f-precio-alquiler">Alquiler ($/mes por unidad)</label>
          <input class="form-input" id="f-precio-alquiler" type="number" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="form-field">
          <label class="form-label" for="f-precio-frecuencia">Frecuencia ($/mes por unidad)</label>
          <input class="form-input" id="f-precio-frecuencia" type="number" step="0.01" min="0" placeholder="0.00 (si aplica)">
        </div>
        <div class="form-field">
          <label class="form-label" for="f-qbo-item-alquiler">Item QBO "Alquiler"</label>
          <select class="form-select" id="f-qbo-item-alquiler"><option value="">— ninguno —</option></select>
        </div>
        <div class="form-field">
          <label class="form-label" for="f-qbo-bundle">Bundle QBO "Mensualidad"</label>
          <select class="form-select" id="f-qbo-bundle"><option value="">— ninguno —</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardar" onclick="guardarModelo()"><i data-lucide="save"></i> Guardar</button>
    </div>
  </div>
</div>

<script src="../js/ui/toast.js"></script>
<script src="../js/pages/inventario-modelos.js" defer></script>
<script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
