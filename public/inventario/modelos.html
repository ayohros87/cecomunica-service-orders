<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8" />
  <title>Modelos y Tarifas - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-functions-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/services/modelosService.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    /* ── Hoja de cálculo de Modelos y Tarifas ─────────────────────────────
       Celdas .td-input/.td-select del DS (borde invisible hasta hover/focus):
       se lee como datos, no como un muro de formularios. Auto-guarda por fila. */
    #tabla td { padding: 2px 6px; vertical-align: middle; }
    #tabla .td-input, #tabla .td-select { height: 28px; }
    #tabla .td-num { text-align: left; font-family: var(--font-mono); width: 90px; }
    #tabla tbody tr:nth-child(even) { background: var(--surface-sunken); }
    #tabla tbody tr:hover { background: var(--brand-soft); }
    #tabla tbody tr:focus-within { background: #eaf4ff; }

    /* Columna Modelo congelada al hacer scroll horizontal (los selects son anchos) */
    #tabla th.sticky-col, #tabla td.sticky-col { position: sticky; left: 0; z-index: 5; }
    #tabla thead th.sticky-col { z-index: 12; background: var(--surface-sunken); }
    #tabla tbody td.sticky-col { background: var(--surface-card); box-shadow: 1px 0 0 var(--border-subtle); }
    #tabla tbody tr:nth-child(even) td.sticky-col { background: var(--surface-sunken); }
    #tabla tbody tr:hover td.sticky-col { background: var(--brand-soft); }
    #tabla tbody tr:focus-within td.sticky-col { background: #eaf4ff; }

    /* .toggle-switch es un <label> (inline); fuera de un flex, width/height no
       aplican y colapsa (solo se ve el thumb = mancha blanca). Lo hacemos
       inline-block para que el track/thumb se dibujen bien en la celda. */
    #tabla .toggle-switch { display: inline-block; vertical-align: middle; }

    .modelo-cell { position: relative; padding-left: 16px !important; font-weight: 600; white-space: nowrap; }
    .modelo-sub  { display:block; font-weight:400; font-size:11px; color: var(--fg-4); }

    /* Indicador de guardado por fila */
    .row-status {
      position: absolute; left: 4px; top: 50%; transform: translateY(-50%);
      width: 6px; height: 6px; border-radius: 50%; background: transparent;
      transition: background var(--dur-fast);
    }
    .row-status.saving { background: var(--status-warning); animation: rowPulse 1s ease-in-out infinite; }
    .row-status.saved  { background: var(--status-online); }
    .row-status.error  { background: var(--status-critical); }
    @keyframes rowPulse { 0%,100%{ opacity:1 } 50%{ opacity:.3 } }

    /* Badge de estado de mapeo */
    .map-badge { display:inline-flex; align-items:center; gap:4px; border-radius:999px; padding:1px 8px; font-size:11px; font-weight:600; border:1px solid transparent; white-space:nowrap; }
    .map-ok   { background:#ECFDF5; color:#065F46; border-color:#A7F3D0; }
    .map-warn { background:#FFFBEB; color:#92400E; border-color:#FDE68A; }
    .map-none { color: var(--fg-4); }

    .md-stats { display:flex; align-items:center; gap:var(--sp-3); font-size:13px; color:var(--fg-3); }
    .md-stats b { font-family:var(--font-mono); color:var(--fg-1); }

    /* Segmento visible De alquiler / Todos */
    .seg { display:inline-flex; border:1px solid var(--border-default); border-radius:var(--radius-pill); overflow:hidden; }
    .seg-btn { border:0; background:var(--surface-card); color:var(--fg-2); padding:5px 14px; font-size:13px; font-weight:600; cursor:pointer; }
    .seg-btn.is-on { background:var(--accent); color:#fff; }
    .seg-btn + .seg-btn { border-left:1px solid var(--border-default); }
  </style>
</head>
<body>

<div id="topbar-mount"></div>
<script>
  Layout.renderTopbarFor('index', {
    title: '<i data-lucide="book-open"></i> Modelos y Tarifas',
    leftSlot: `
      <div class="filter-search" style="max-width:300px;">
        <span class="search-icon"><i data-lucide="search"></i></span>
        <input id="q" type="search" placeholder="Buscar marca o modelo…" aria-label="Buscar modelos">
      </div>`,
    actions: [
      { label: '<i data-lucide="plus"></i> Nuevo modelo', cls: 'primary', onclick: "abrirModal()" }
    ],
    menu: [
      { href: '../facturacion/index.html', label: '<i data-lucide="calculator"></i> Facturación (inicio)' },
      { href: './cargos.html', label: '<i data-lucide="receipt"></i> Cargos de facturación' },
      { divider: true },
      { html: '<label class="overflow-menu-item"><input type="checkbox" id="chk-solo-config"> Solo sin configurar</label>' },
      { html: '<label class="overflow-menu-item"><input type="checkbox" id="chk-inactivos"> Mostrar inactivos</label>' },
      { divider: true },
      { onclick: 'exportarExcel()', label: '<i data-lucide="download"></i> Excel' }
    ]
  });
</script>

<div class="app-wrap app-wrap--full">
  <div class="ds-card" style="padding:0;">
    <div style="padding:var(--sp-3) var(--sp-4); display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <div class="seg" role="tablist">
          <button type="button" id="seg-alq" class="seg-btn is-on" onclick="setFiltroAlquiler(true)">De alquiler</button>
          <button type="button" id="seg-all" class="seg-btn" onclick="setFiltroAlquiler(false)">Todos</button>
        </div>
        <p id="resumenModelos" class="md-stats" style="margin:0;">Cargando…</p>
      </div>
      <p id="qboHint" style="margin:0; font-size:12px; color:var(--fg-4);"></p>
    </div>
    <div class="app-table-wrap" id="wrapTabla" style="border:none; box-shadow:none; border-radius:0; overflow:auto;">
      <table class="app-table" id="tabla">
        <thead>
          <tr>
            <th class="sticky-col">Modelo</th>
            <th>Tipo</th>
            <th style="text-align:center">¿Alquiler?</th>
            <th>Alquiler $</th>
            <th>Frecuencia $</th>
            <th>Item QBO "Alquiler"</th>
            <th>Bundle QBO "Mensualidad"</th>
            <th>Mapeo</th>
            <th style="text-align:center">Activo</th>
            <th style="text-align:center">Editar</th>
          </tr>
        </thead>
        <tbody id="tablaModelos"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal nuevo / editar IDENTIDAD del modelo (las tarifas se editan en la grilla) -->
<div id="overlay" class="modal-backdrop" style="display:none;" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Nuevo modelo</h3>
      <button class="modal-close" onclick="cerrarModal()" aria-label="Cerrar"><i data-lucide="x" style="width:18px;height:18px;"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid-2">
        <div class="form-field">
          <label class="form-label" for="f-marca">Marca <span class="req">*</span></label>
          <input class="form-input" id="f-marca" placeholder="Ej. Hytera">
        </div>
        <div class="form-field">
          <label class="form-label" for="f-modelo">Modelo <span class="req">*</span></label>
          <input class="form-input" id="f-modelo" placeholder="Ej. PD786">
        </div>
        <div class="form-field">
          <label class="form-label" for="f-tipo">Tipo</label>
          <select class="form-select" id="f-tipo">
            <option value="P">Portátil</option>
            <option value="B">Base</option>
            <option value="C">Cámara</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" for="f-estado">Estado</label>
          <select class="form-select" id="f-estado">
            <option value="N">Nuevo</option>
            <option value="R">Reuso</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" for="f-minimo">Mínimo (alerta inventario)</label>
          <input class="form-input" id="f-minimo" type="number" step="1" min="0" placeholder="5">
        </div>
        <div class="form-field">
          <label class="form-label">Flags</label>
          <div style="display:flex; gap:18px; flex-wrap:wrap; align-items:center; min-height:38px;">
            <label class="form-check"><input type="checkbox" id="f-es-alquiler"><span><span class="form-check-label">Se alquila (aparece en tarifas)</span></span></label>
            <label class="form-check"><input type="checkbox" id="f-alto"><span><span class="form-check-label">Alto movimiento</span></span></label>
            <label class="form-check"><input type="checkbox" id="f-activo" checked><span><span class="form-check-label">Activo</span></span></label>
          </div>
        </div>
        <div class="form-field" style="grid-column:1 / -1;">
          <label class="form-label" for="f-notas">Notas</label>
          <textarea class="form-input form-textarea" id="f-notas" placeholder="(opcional)"></textarea>
        </div>
      </div>
      <p style="margin:12px 0 0; font-size:12px; color:var(--fg-4);">
        Las tarifas (alquiler/frecuencia) y el mapeo a QuickBooks se editan directo en la tabla.
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardar" onclick="guardarModelo()"><i data-lucide="save"></i> Guardar</button>
    </div>
  </div>
</div>

<script src="../js/ui/toast.js"></script>
<script src="../js/pages/inventario-modelos.js" defer></script>
<script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
