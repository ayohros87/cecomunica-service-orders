<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Inventario de Radios - Cecomunica</title>
  <link rel="stylesheet" href="../css/ceco-ui.css">

<style>
/* ========================================
   UNIFIED DESIGN SYSTEM
   ======================================== */

html, body {
  margin: 0;
  padding: 0;
}

body {
  background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
  min-height: 100vh;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 20px;
  flex: 1;
}

.topbar-left h1 {
  margin: 0;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.app-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #f8fafc;
  border-radius: 8px;
  padding: 6px 10px;
  border: 2px solid var(--line);
  transition: all 0.2s;
}

.app-search:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0, 145, 215, 0.14);
}

.app-search input {
  border: none;
  background: transparent;
  outline: none;
  font-size: 14px;
  min-width: 280px;
}

/* Unified Content Area */
.app-wrap {
  padding: 12px 20px;
}

/* Unified Table Styling */
.table-wrap {
  background: white;
  border-radius: 8px;
  padding: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  overflow: hidden;
  width: 100%;
  margin-top: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: auto;
}

table thead {
  background: linear-gradient(135deg, #f8fafc, #f1f5f9);
}

table th {
  font-weight: 600;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 12px 16px;
  color: var(--text);
  vertical-align: middle;
  border-bottom: 2px solid var(--line);
}

table td {
  padding: 10px 16px;
  vertical-align: middle;
  font-size: 16px;
  border-bottom: 1px solid var(--line);
}

table tbody tr {
  transition: background 0.15s;
}

table tbody tr:hover {
  background: #f0f9ff;
}

/* Unified Button System */
.btn {
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 8px;
  transition: all 0.2s ease;
}

th[data-sort] {
  cursor: pointer;
  user-select: none;
}

.sort {
  font-size: 12px;
  opacity: 0.6;
  margin-left: 4px;
}

/* === PAGE-SPECIFIC STYLES === */
.app-search {
  transition: var(--transition);
}
.app-search:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0, 145, 215, 0.14);
}
.app-search input {
  border: none;
  background: transparent;
  outline: none;
  width: 300px;
  font-size: 15px;
  padding: 4px 6px;
}
.app-search .btn.icon {
  background: transparent;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: nowrap;
}

/* === DROPDOWN === */
.dropdown {
  position: relative;
}
.dropdown .menu {
  display: none;
  position: absolute;
  right: 0;
  top: calc(100% + 6px);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
  padding: 8px;
  min-width: 220px;
  animation: slideDown 0.2s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.dropdown.open .menu,
.dropdown:hover .menu {
  display: block;
}
.dropdown .menu .menu-item {
  font-size: 14px;
  margin: 4px 0;
}
.dropdown .menu hr {
  margin: 6px 0;
  border: none;
  border-top: 1px solid var(--line);
}

/* === APP WRAP & TABLE === */
.app-wrap {
  margin: 32px auto;
  padding: 32px 48px;
  background: var(--surface);
  border-radius: 16px;
  box-shadow: var(--shadow);
  transition: var(--transition);
}

.resumen {
  text-align: right;
  color: #6b7280;
  font-size: 14px;
  margin-bottom: 8px;
}

.table-wrap {
  width: 100%;
  overflow-x: auto;
  border-radius: 16px;
  background: var(--surface);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
}

/* === TABLE & SORT === */
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  text-align: left;
  border-bottom: 1px solid var(--line);
}
th[data-sort] {
  cursor: pointer;
  user-select: none;
}
th .sort {
  font-size: 12px;
  opacity: .6;
  margin-left: 4px;
}

/* === DENSITY === */
.table-wrap[data-density="dense"] table {
  font-size: 12.5px;
}
.table-wrap[data-density="dense"] th,
.table-wrap[data-density="dense"] td {
  padding: 6px 8px;
}
.table-wrap[data-density="roomy"] table {
  font-size: 14.5px;
}
.table-wrap[data-density="roomy"] th,
.table-wrap[data-density="roomy"] td {
  padding: 10px 12px;
}

/* === BADGES === */
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  padding: 0 8px;
  height: 22px;
  font-size: 12px;
  font-weight: 500;
}
.badge.completo {
  background: #e6f4ea;
  color: #1e7d32;
}
.badge.pendiente {
  background: #fff4e6;
  color: #b45309;
}
.badge.danger {
  background: #fde8e8;
  color: #b91c1c;
}

/* === HIDDEN COLS === */
.hidden-col {
  display: none;
}

/* === SKELETON === */
.skeleton {
  background: linear-gradient(90deg,#f2f4f7 25%,#e9edf3 37%,#f2f4f7 63%);
  background-size: 400% 100%;
  animation: shimmer 1.2s ease-in-out infinite;
  height: 12px;
  border-radius: 4px;
}
@keyframes shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}

/* === TOASTS === */
/* Toast styles retired by R4 — page uses the DS .toast-region rules in ceco-ui.css. */

/* === RESPONSIVE === */
@media (max-width: 900px) {
  .topbar {
    flex-wrap: wrap;
    padding: 14px 20px;
  }
  .app-search input {
    width: 100%;
    max-width: none;
  }
  .app-wrap {
    padding: 20px;
  }
}
</style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/services/modelosService.js"></script>
  <script src="../js/services/inventarioService.js"></script>
<script src="../js/ui/toast.js"></script>



  <script src="../js/pages/inventario-index.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="topbar-mount"></div>
<script>
  Layout.renderTopbarFor('index', {
    title: '<i data-lucide="package"></i> Inventario de Radios',
    leftSlot: `
      <div class="app-search">
        <input id="buscador" placeholder="Buscar marca, modelo o tipo..." />
        <button class="btn icon" onclick="aplicarFiltroRapido()"><i data-lucide="search"></i></button>
      </div>`,
    actions: [
      { label: '<i data-lucide="plus"></i> Cargar inventario',
        cls: 'primary',
        onclick: "window.location.href='./cargar-inventario.html'" }
    ],
    menu: [
      { href: './modelos.html',      label: '<i data-lucide="book-open"></i> Modelos' },
      { href: './piezas.html',       label: '<i data-lucide="layers"></i> Piezas' },
      { html: '<a href="./vista-correo.html" target="_blank" class="overflow-menu-item"><i data-lucide="mail"></i> Vista correo</a>' },
      { onclick: 'exportarExcel()',  label: '<i data-lucide="download"></i> Excel' },
      { divider: true },
      { html: '<label class="overflow-menu-item"><input type="checkbox" checked id="col-CHK-anterior"> Cant. anterior</label>' },
      { html: '<label class="overflow-menu-item"><input type="checkbox" checked id="col-CHK-penultima"> Penúltima actualización</label>' },
      { divider: true },
      { onclick: 'toggleDensity()', label: '<i data-lucide="arrow-up-down"></i> Alternar densidad' }
    ]
  });
</script>
<div id="loader" style="display:none;" class="loader-center">
  <div class="loader"></div>
</div>

<div class="app-wrap app-wrap--full">
  <p id="resumenInv" class="resumen"></p>
  <div class="app-table-wrap" id="wrapTabla" data-density="roomy">
    <table class="app-table">
      <thead id="headerInventario"></thead>
      <tbody id="inventarioTable"></tbody>
    </table>
  </div>
</div>

  <p id="contadorInventario"></p>
  <script>
    function cerrarSesion() {
      firebase.auth().signOut().then(() => { window.location.href = '../login.html'; });
    }
    if (typeof lucide !== 'undefined') lucide.createIcons();
    // Layout.renderTopbar auto-wires the overflow-menu toggle.
  </script>
</body>
</html>
