<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventario para Envío - Cecomunica</title>
  <style>
    /* Estilos INTENCIONALMENTE INLINE — esta vista se copia/pega a correos
       (Outlook, Gmail) y necesita su propia tipografía y bordes para que
       sobreviva fuera del sitio. No reemplazar por clases del kit. */
    body { font-family: Arial, sans-serif; margin: 20px; color: #111; }
    h2 { font-family: Arial, sans-serif; margin: 0 0 16px; }
    table { border-collapse: collapse; width: 100%; font-size: 14px; }
    th, td { padding: 6px 10px; border: 1px solid #ccc; text-align: center; }
    th { background-color: #f0f0f0; }
  </style>

  <!-- Firebase -->
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="../js/firebase-init.js"></script>
  <script defer src="../js/services/modelosService.js"></script>
  <script defer src="../js/services/inventarioService.js"></script>
  <script defer src="../js/services/equiposPoolService.js"></script>

  <script>
    window.onload = async () => {
  const tabla = document.getElementById("tablaCorreo");

  const modelosList = await ModelosService.getModelos();
  const modelosMap = {};
  modelosList.forEach(m => modelosMap[m.id] = m);

  // Principal = seriales del pool en bodega; el conteo físico es la
  // verificación manual (mismo criterio que Inventario de Radios).
  const [inventario, poolMap] = await Promise.all([
    InventarioService.getInventarioActual(),
    EquiposPoolService.contarBodegaPorModelo().catch(() => new Map()),
  ]);
  if (inventario.length === 0 && poolMap.size === 0) {
    tabla.innerHTML = "<tr><td colspan='9'>No hay datos</td></tr>";
    return;
  }

  const poolPorId = new Map(), poolPorLabel = new Map();
  poolMap.forEach(g => {
    if (g.modelo_id) poolPorId.set(g.modelo_id, g);
    const tl = EquiposPoolService._tightLabel(g.modelo_label);
    if (tl && !poolPorLabel.has(tl)) poolPorLabel.set(tl, g);
  });

  const datos = [];
  const usados = new Set();
  inventario.forEach(data => {
    const modelo = modelosMap[data.modelo_id] || {};
    const g = poolPorId.get(data.modelo_id)
      || poolPorLabel.get(EquiposPoolService._tightLabel(modelo.modelo || '')) || null;
    if (g) usados.add(g);
    datos.push({ modelo, data, seriales: g ? g.n : 0 });
  });
  poolMap.forEach(g => {
    if (usados.has(g)) return;
    const modelo = (g.modelo_id && modelosMap[g.modelo_id]) || { modelo: g.modelo_label || '(sin modelo)' };
    datos.push({ modelo, data: { cantidad: null }, seriales: g.n });
  });

  datos.sort((a, b) => {
  const amA = a.modelo.alto_movimiento ? 1 : 0;
  const amB = b.modelo.alto_movimiento ? 1 : 0;
  if (amA !== amB) return amB - amA; // true first

  const marcaA = (a.modelo.marca || "").toLowerCase();
  const marcaB = (b.modelo.marca || "").toLowerCase();
  if (marcaA !== marcaB) return marcaA.localeCompare(marcaB);

  const tipoA = (a.modelo.tipo || "").toLowerCase();
  const tipoB = (b.modelo.tipo || "").toLowerCase();
  if (tipoA !== tipoB) return tipoA.localeCompare(tipoB);

  const modeloA = (a.modelo.modelo || "").toLowerCase();
  const modeloB = (b.modelo.modelo || "").toLowerCase();
  return modeloA.localeCompare(modeloB);
});


datos.forEach(({ modelo, data, seriales }) => {
  // Convertir tipo y estado a nombres completos
  let tipoTexto = "-";
  if (modelo.tipo === "P") tipoTexto = "Portátil";
  else if (modelo.tipo === "C") tipoTexto = "Cámara";
  else if (modelo.tipo === "B") tipoTexto = "Base";

  let estadoTexto = "-";
  if (modelo.estado === "N") estadoTexto = "Nuevo";
  else if (modelo.estado === "R") estadoTexto = "Reuso";

  const n = Number(seriales ?? 0);
  const tieneConteo = data.cantidad != null;
  const dif = tieneConteo ? n - Number(data.cantidad) : null;
  // Inline styles a propósito: deben sobrevivir el copy-paste a Outlook/Gmail.
  const difTxt = !tieneConteo ? "-"
    : dif === 0 ? "0"
    : `<span style="color:${dif > 0 ? '#92400e' : '#b91c1c'};font-weight:bold;">${dif > 0 ? '+' : ''}${dif}</span>`;

  tabla.innerHTML += `
    <tr>
      <td>${modelo.marca || "-"}</td>
      <td>${modelo.modelo || "-"}</td>
      <td>${tipoTexto}</td>
      <td>${estadoTexto}</td>
      <td>${modelo.alto_movimiento ? "Sí" : "No"}</td>
      <td style="font-weight:bold;">${n}</td>
      <td>${data.cantidad ?? "-"}</td>
      <td>${difTxt}</td>
      <td>${data.ultima_actualizacion?.toDate().toLocaleString() ?? "-"}</td>
    </tr>`;
});

};

  </script>
  <script src="/js/vendor/lucide.min.js"></script>
</head>
<body>
  <h2><i data-lucide="file-text"></i> Inventario de radios para envío por correo</h2>
  <p style="font-size:13px;color:#555;margin:4px 0 10px;">Unidades = seriales en bodega (pool de equipos, reporte principal) · Conteo físico = verificación manual · Dif. = seriales − conteo (meta 0).</p>
  <table>
    <thead>
      <tr>
        <th>Marca</th>
        <th>Modelo</th>
        <th>Tipo</th>
        <th>Estado</th>
        <th>Alto Movimiento</th>
        <th>Unidades (seriales)</th>
        <th>Conteo físico</th>
        <th>Dif.</th>
        <th>Último conteo</th>
      </tr>
    </thead>
    <tbody id="tablaCorreo"></tbody>
  </table>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
