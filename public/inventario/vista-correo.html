<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventario para Envío - Cecomunica</title>
  <style>
    /* Estilos INTENCIONALMENTE INLINE — esta vista se copia/pega a correos
       (Outlook, Gmail) y necesita su propia tipografía y bordes para que
       sobreviva fuera del sitio. No reemplazar por clases del kit. */
    body { font-family: Arial, sans-serif; margin: 20px; color: #111; }
    h2 { font-family: Arial, sans-serif; margin: 0 0 16px; }
    table { border-collapse: collapse; width: 100%; font-size: 14px; }
    th, td { padding: 6px 10px; border: 1px solid #ccc; text-align: center; }
    th { background-color: #f0f0f0; }
  </style>

  <!-- Firebase -->
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="../js/firebase-init.js"></script>
  <script defer src="../js/services/modelosService.js"></script>
  <script defer src="../js/services/inventarioService.js"></script>

  <script>
    window.onload = async () => {
  const tabla = document.getElementById("tablaCorreo");

  const modelosList = await ModelosService.getModelos();
  const modelosMap = {};
  modelosList.forEach(m => modelosMap[m.id] = m);

  const inventario = await InventarioService.getInventarioActual();
  if (inventario.length === 0) {
    tabla.innerHTML = "<tr><td colspan='9'>No hay datos</td></tr>";
    return;
  }

  const datos = [];
  inventario.forEach(data => {
    const modelo = modelosMap[data.modelo_id] || {};
    datos.push({ modelo, data });
  });

  datos.sort((a, b) => {
  const amA = a.modelo.alto_movimiento ? 1 : 0;
  const amB = b.modelo.alto_movimiento ? 1 : 0;
  if (amA !== amB) return amB - amA; // true first

  const marcaA = (a.modelo.marca || "").toLowerCase();
  const marcaB = (b.modelo.marca || "").toLowerCase();
  if (marcaA !== marcaB) return marcaA.localeCompare(marcaB);

  const tipoA = (a.modelo.tipo || "").toLowerCase();
  const tipoB = (b.modelo.tipo || "").toLowerCase();
  if (tipoA !== tipoB) return tipoA.localeCompare(tipoB);

  const modeloA = (a.modelo.modelo || "").toLowerCase();
  const modeloB = (b.modelo.modelo || "").toLowerCase();
  return modeloA.localeCompare(modeloB);
});


datos.forEach(({ modelo, data }) => {
  // Convertir tipo y estado a nombres completos
  let tipoTexto = "-";
  if (modelo.tipo === "P") tipoTexto = "Portátil";
  else if (modelo.tipo === "C") tipoTexto = "Cámara";
  else if (modelo.tipo === "B") tipoTexto = "Base";

  let estadoTexto = "-";
  if (modelo.estado === "N") estadoTexto = "Nuevo";
  else if (modelo.estado === "R") estadoTexto = "Reuso";

  tabla.innerHTML += `
    <tr>
      <td>${modelo.marca || "-"}</td>
      <td>${modelo.modelo || "-"}</td>
      <td>${tipoTexto}</td>
      <td>${estadoTexto}</td>
      <td>${modelo.alto_movimiento ? "Sí" : "No"}</td>
      <td>${data.cantidad ?? "-"}</td>
      <td>${data.ultima_actualizacion?.toDate().toLocaleString() ?? "-"}</td>
    </tr>`;
});

};

  </script>
  <script src="/js/vendor/lucide.min.js"></script>
</head>
<body>
  <h2><i data-lucide="file-text"></i> Inventario para envío por correo</h2>
  <table>
    <thead>
      <tr>
        <th>Marca</th>
        <th>Modelo</th>
        <th>Tipo</th>
        <th>Estado</th>
        <th>Alto Movimiento</th>
        <th>Cantidad</th>
        <th>Última actualización</th>
      </tr>
    </thead>
    <tbody id="tablaCorreo"></tbody>
  </table>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
