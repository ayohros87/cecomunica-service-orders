<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Hoja de Programación - C COMUNICA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <style>
    /* Page-local: layout específico para impresión */
    body { background: var(--surface-page); }

    .print-page {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--surface-card);
      padding: 40px;
      box-shadow: var(--shadow-md);
      border-radius: var(--radius-lg);
    }

    .print-header-block {
      text-align: center;
      border-bottom: 4px solid var(--accent);
      padding-bottom: 20px;
      margin-bottom: 24px;
    }
    .print-header-block h1 {
      margin: 0; font-size: 28px; color: var(--fg-1); font-weight: 700;
    }
    .print-header-block h2 {
      margin: 8px 0 0 0; font-size: 20px; color: var(--fg-3); font-weight: 600;
    }

    .info-section {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 16px; padding: 20px;
      background: var(--surface-sunken);
      border-radius: var(--radius-md);
      margin-bottom: 24px;
      border-left: 4px solid var(--accent);
    }
    .info-item { display: flex; flex-direction: column; gap: 4px; }
    .info-label {
      font-weight: 600; font-size: 12px; color: var(--fg-3);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .info-value { font-size: 16px; color: var(--fg-1); font-weight: 600; }

    /* Print table — anclado con bordes para impresión */
    table.print-equipos { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
    table.print-equipos thead {
      background: linear-gradient(135deg, var(--surface-sunken), var(--surface-page));
    }
    table.print-equipos th {
      border: 1px solid var(--border-default); padding: 12px 8px;
      text-align: center; vertical-align: middle;
      font-weight: 600; color: var(--fg-1);
      text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;
    }
    table.print-equipos td {
      border: 1px solid var(--border-default); padding: 10px 8px;
      text-align: center; vertical-align: middle;
    }
    table.print-equipos tbody tr:nth-child(even) { background: var(--surface-sunken); }

    .print-toolbar {
      max-width: 1200px;
      margin: 0 auto 20px auto;
      display: flex; gap: 12px; justify-content: flex-end;
    }

    @media print {
      body { padding: 0; background: white; }
      .print-page { box-shadow: none; border-radius: 0; padding: 20px; }
      .print-toolbar { display: none !important; }
      table.print-equipos { font-size: 10px; }
      table.print-equipos th, table.print-equipos td { padding: 6px 4px; }
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/pocService.js"></script>
  <script src="../js/services/clientesService.js"></script>
  <script src="../js/services/modelosService.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <div class="print-toolbar">
    <button class="btn btn-primary" onclick="window.print()"><i data-lucide="printer"></i> Imprimir</button>
    <button class="btn btn-secondary" onclick="window.close()"><i data-lucide="x"></i> Cerrar</button>
  </div>

  <div class="print-page">
    <div class="print-header-block">
      <h1>C COMUNICA, S.A.</h1>
      <h2>HOJA DE PROGRAMACIÓN DE EQUIPOS</h2>
    </div>

    <div class="info-section">
      <div class="info-item">
        <span class="info-label"><i data-lucide="calendar"></i> Fecha de impresión</span>
        <span class="info-value" id="fechaHoy"></span>
      </div>
      <div class="info-item">
        <span class="info-label"><i data-lucide="package"></i> Total equipos</span>
        <span class="info-value" id="cantidadEquipos">0</span>
      </div>
    </div>

    <table id="tablaEquipos" class="print-equipos">
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Serial</th>
          <th>Operador</th>
          <th>IP</th>
          <th>GPS</th>
          <th>Activo</th>
          <th>Unit ID</th>
          <th>Nombre del Radio</th>
          <th>Modelo</th>
          <th>Grupos</th>
          <th>Notas</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla"></tbody>
    </table>
  </div>

  <script>
    // Mapa: cliente_id -> nombre
    let clientesMap = {};
    let modelosMap = {};

    async function cargarClientesPara(equipos) {
      const ids = [...new Set(equipos.map(x => x.cliente_id).filter(Boolean))];
      clientesMap = {};
      await Promise.all(ids.map(async (cid) => {
        try {
          const c = await ClientesService.getCliente(cid);
          if (c) clientesMap[cid] = c.nombre || cid;
        } catch (e) {}
      }));
    }

    async function cargarModelosPara(equipos) {
      const ids = [...new Set(equipos
        .map(x => x.modelo_id || x.modeloId || x.model_id || x.modelId)
        .filter(Boolean))];

      modelosMap = {};
      await Promise.all(ids.map(async (mid) => {
        try {
          const m = await ModelosService.getModelo(mid);
          if (m) {
            const label = `${(m.marca || "").toString().trim()} ${(m.modelo || "").toString().trim()}`.trim();
            modelosMap[mid] = label || m.modelo || m.marca || mid;
          }
        } catch (e) {}
      }));
    }

    function nombreClienteDe(d) {
      return d.cliente || (d.cliente_id && clientesMap[d.cliente_id]) || "";
    }

    function modeloDe(d) {
      return (d.modelo_id && modelosMap[d.modelo_id])
        || (d.modeloId && modelosMap[d.modeloId])
        || (d.model_id && modelosMap[d.model_id])
        || (d.modelId && modelosMap[d.modelId])
        || d.modelo_label
        || d.modeloLabel
        || d.Modelo
        || d.modelo
        || d.model_label
        || d.modelLabel
        || d.model
        || "";
    }

    const params = new URLSearchParams(window.location.search);
    const ids = JSON.parse(params.get("ids") || "[]");
    const cuerpoTabla = document.getElementById("cuerpoTabla");

    async function cargarEquipos() {
      const datos = [];

      for (const id of ids) {
        const doc = await PocService.getPocDevice(id, { source: 'server' });
        if (doc) datos.push(doc);
      }

      datos.sort((a, b) => {
        const ua = (a.unit_id || "").toString().padStart(10, '0');
        const ub = (b.unit_id || "").toString().padStart(10, '0');
        return ua.localeCompare(ub, undefined, { numeric: true });
      });

      await cargarClientesPara(datos);
      await cargarModelosPara(datos);

      document.getElementById("fechaHoy").textContent = new Date().toLocaleDateString("es-PA");
      document.getElementById("cantidadEquipos").textContent = datos.length;

      for (const d of datos) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${nombreClienteDe(d)}</td>
          <td>${d.serial || ""}</td>
          <td>${d.operador || ""}</td>
          <td>${d.ip || ""}</td>
          <td>${d.gps ? "Sí" : "No"}</td>
          <td>${d.activo ? "Activo" : "Inactivo"}</td>
          <td>${d.unit_id || ""}</td>
          <td>${d.radio_name || ""}</td>
          <td>${modeloDe(d)}</td>
          <td>${(d.grupos || []).join(", ")}</td>
          <td>${d.notas || ""}</td>
        `;
        cuerpoTabla.appendChild(tr);
      }
    }

    firebase.auth().onAuthStateChanged(user => {
      if (user) cargarEquipos();
      else window.location.href = "/login.html";
    });
  </script>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
