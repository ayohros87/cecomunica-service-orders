<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nuevo Batch de Equipos PoC - Cecomunica</title>
<link rel="stylesheet" href="../css/ceco-ui.css">
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
      padding: 24px;
      min-height: 100vh;
    }
    
    .page-header {
      max-width: 1000px;
      margin: 0 auto 32px auto;
      text-align: center;
    }
    
    .page-header h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 8px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    
    .page-header p {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }
    
    .form-container {
      max-width: 1000px;
      margin: 0 auto;
    }
    
    #batchForm {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    
    .section.form {
      padding: 32px;
      border-bottom: 2px solid var(--line);
    }
    
    .section.form:last-of-type {
      border-bottom: none;
    }
    
    .form-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 24px 0;
      padding-bottom: 12px;
      border-bottom: 3px solid var(--brand);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .form-field label {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .form-field input,
    .form-field select,
    .form-field textarea {
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      transition: all 0.2s;
      background: white;
    }
    
    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      outline: none;
    }
    
    .form-field textarea.mono {
      font-family: 'Courier New', monospace;
      min-height: 180px;
    }
    
    .form-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
    
    .form-hint ul {
      list-style: none;
      padding: 0;
      margin: 4px 0;
    }
    
    .form-hint li {
      padding: 4px 0;
      font-size: 11px;
      color: var(--muted);
    }
    
    .input-row {
      display: flex;
      gap: 8px;
    }
    
    .input-row select {
      flex: 1;
    }
    
    .btn-pill {
      width: 44px;
      height: 44px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border-radius: 8px;
    }
    
    .form-actions {
      padding: 24px 32px;
      background: #f8fafc;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      border-top: 2px solid var(--line);
    }
    
    .form-actions .btn {
      font-size: 15px;
      padding: 12px 24px;
      font-weight: 600;
    }
    
    .file-preview {
      margin-top: 16px;
      padding: 16px;
      background: #f0f9ff;
      border: 2px solid #3b82f6;
      border-radius: 8px;
    }
    
    .file-preview table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 12px;
    }
    
    .file-preview th {
      background: white;
      padding: 8px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--line);
    }
    
    .file-preview td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--line);
    }
    
    @media (max-width: 768px) {
      body {
        padding: 12px;
      }
      
      .page-header h1 {
        font-size: 24px;
      }
      
      .section.form {
        padding: 20px;
      }
      
      .form-actions {
        padding: 16px 20px;
        flex-direction: column;
      }
      
      .form-actions .btn {
        width: 100%;
      }
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/pocService.js"></script>
  <script src="../js/services/clientesService.js"></script>
  <script src="../js/services/empresaService.js"></script>
</head>
<body>
  <div class="page-header">
    <h1><span style="font-size: 36px;">📦</span> Registrar Nuevo Batch de Equipos PoC</h1>
    <p>Carga múltiples equipos de forma rápida usando seriales consecutivos</p>
  </div>
  
  <div class="form-container">
  <form id="batchForm">
  <div class="section form">
  <h3 class="form-title">🔢 Datos del Batch</h3>
  <div class="form-grid cols-2">
    <div class="form-field" style="grid-column:1/-1">
      <label class="req">Seriales (uno por línea)</label>
      <textarea id="seriales" required class="mono"></textarea>
    </div>

    <div class="form-field">
      <label>📂 Cargar archivo JSON del vendedor</label>
      <input type="file" class="file" accept=".json" onchange="cargarDesdeJSON(this)">
      <div id="previewVendedor" class="form-hint"></div>
    </div>

    <div class="form-field">
      <label class="req">Unit ID Inicial</label>
      <input type="number" id="unit_id_inicial" required placeholder="Ejemplo: 5001">
      <div class="form-hint">
        Últimos Unit IDs asignados:
        <ul id="ultimosUnitIDs" style="margin-top:6px;"></ul>
      </div>
    </div>
  </div>
</div>

<div class="section form">
  <h3 class="form-title">📦 Datos Generales</h3>
  <div class="form-grid cols-2">
    <div class="form-field" style="grid-column:1/-1">
      <label class="req">Cliente</label>
      <div class="input-row">
        <select id="cliente" required></select>
        <button type="button" id="addCliente" class="btn btn-pill fit">➕</button>
      </div>
    </div>

    <div class="form-field" style="grid-column:1/-1">
      <label class="req">IP</label>
      <div class="input-row">
        <select id="ip" required></select>
        <button type="button" id="addIP" class="btn btn-pill fit">➕</button>
      </div>
    </div>

    <div class="form-field" style="grid-column:1/-1">
      <label>Notas</label>
      <textarea id="notas"></textarea>
    </div>
  </div>
</div>

<div class="form-actions">
  <button type="submit" class="btn primary">💾 Crear Equipos</button>
  <button type="button" class="btn" onclick="window.location.href='index.html'">⬅️ Cancelar</button>
</div>
</form>
</div>

  <script src="../js/pages/nuevo-batch.js" defer></script>
</body>
</html>
