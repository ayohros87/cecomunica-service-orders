<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Nuevo Equipo PoC - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <style>
    /* Page-local */
    .grupo-container { display: flex; gap: var(--sp-2); margin-bottom: var(--sp-2); }
    .grupo-container .grupo-input { flex: 1; }
    #mensaje { color: var(--status-online); text-align: center; font-weight: 600; margin-top: var(--sp-4); }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="../js/services/pocService.js"></script>
  <script src="../js/services/empresaService.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="package-plus"></i> Nuevo Equipo PoC',
      back: { label: '<i data-lucide="arrow-left"></i> Volver', href: 'index.html' },
      showHome: true, homeHref: '../index.html', showLogout: true
    });
  </script>

  <div class="app-wrap app-wrap--default">

    <form id="equipoForm">

      <!-- Información del Equipo -->
      <div class="form-section-header">
        <h3><i data-lucide="package"></i> Información del Equipo</h3>
      </div>
      <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
        <div class="form-grid-2">
          <div class="form-field" style="grid-column:1/-1;">
            <label class="form-label" for="cliente">Cliente <span class="req">*</span></label>
            <div style="display:flex; gap:var(--sp-2);">
              <select class="form-select" id="cliente" required style="flex:1;"></select>
              <button type="button" id="addCliente" class="btn btn-secondary btn-icon" aria-label="Crear cliente"><i data-lucide="plus"></i></button>
            </div>
          </div>

          <div class="form-field" style="grid-column:1/-1;">
            <label class="form-label" for="operador">Operador <span class="req">*</span></label>
            <div style="display:flex; gap:var(--sp-2);">
              <select class="form-select" id="operador" required style="flex:1;"></select>
              <button type="button" id="addOperador" class="btn btn-secondary btn-icon" aria-label="Crear operador"><i data-lucide="plus"></i></button>
            </div>
          </div>

          <div class="form-field">
            <label class="form-label" for="sim_number"># SIMCARD <span class="req">*</span></label>
            <input class="form-input" id="sim_number" type="text" required style="font-family:var(--font-mono);">
          </div>

          <div class="form-field">
            <label class="form-label" for="sim_phone"># Teléfono SIMCARD <span class="req">*</span></label>
            <input class="form-input" id="sim_phone" type="text" required style="font-family:var(--font-mono);">
          </div>

          <div class="form-field">
            <label class="form-label" for="serial">Serial <span class="req">*</span></label>
            <input class="form-input" id="serial" type="text" required style="font-family:var(--font-mono);">
          </div>

          <div class="form-field">
            <label class="form-label" for="unit_id">Unit ID <span class="req">*</span></label>
            <input class="form-input" id="unit_id" type="text" required style="font-family:var(--font-mono);">
          </div>

          <div class="form-field">
            <label class="form-label" for="radio_name">Nombre del Radio</label>
            <input class="form-input" id="radio_name" type="text">
          </div>

          <div class="form-field">
            <label class="form-label" for="ip">IP</label>
            <div style="display:flex; gap:var(--sp-2);">
              <select class="form-select" id="ip" style="flex:1;"></select>
              <button type="button" id="addIP" class="btn btn-secondary btn-icon" aria-label="Crear bloque IP"><i data-lucide="plus"></i></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Configuración y Estado -->
      <div class="form-section-header">
        <h3><i data-lucide="settings"></i> Configuración y Estado</h3>
      </div>
      <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
        <div style="display:flex; gap:var(--sp-5); flex-wrap:wrap; margin-bottom:var(--sp-4);">
          <label class="form-check">
            <input type="checkbox" id="gps">
            <span><span class="form-check-label">GPS habilitado</span></span>
          </label>
          <label class="form-check">
            <input type="checkbox" id="activo">
            <span><span class="form-check-label">Equipo activo</span></span>
          </label>
        </div>

        <div class="form-field">
          <label class="form-label">Grupos</label>
          <div id="gruposContainer"></div>
          <button type="button" id="addGrupo" class="btn btn-ghost btn-sm"><i data-lucide="plus"></i> Agregar grupo</button>
        </div>
      </div>

      <!-- Notas -->
      <div class="form-section-header">
        <h3><i data-lucide="file-text"></i> Notas</h3>
      </div>
      <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
        <div class="form-field">
          <label class="form-label" for="notas">Notas</label>
          <textarea class="form-input form-textarea" id="notas" rows="3"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-lg"><i data-lucide="save"></i> Guardar equipo</button>
        <button type="button" class="btn btn-ghost" onclick="window.location.href='index.html'"><i data-lucide="arrow-left"></i> Cancelar</button>
      </div>
    </form>

    <p id="mensaje"></p>
  </div>

  <script src="../js/pages/nuevo-equipo.js" defer></script>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
