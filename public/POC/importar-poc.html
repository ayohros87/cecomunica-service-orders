<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Importar Dispositivos POC - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <!-- Rediseño Command Center F5: rail lateral (híbrido). PLAN_REDISENO_COMMAND_CENTER.md -->
  <link rel="stylesheet" href="../css/ceco-rail.css?v=cc5">

  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="../js/firebase-init.js"></script>
  <script defer src="../js/services/pocService.js"></script>
  <script defer src="../js/services/simCardsService.js"></script>
  <script src="../js/core/modulos.js"></script>
  <script src="../js/core/layout.js?v=cc5"></script>
  <script src="/js/vendor/lucide.min.js"></script>
</head>
<body>
  <div class="cc-app">
  <div id="rail-mount"></div>
  <div class="cc-work">

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbarFor('child', {
      title: '<i data-lucide="upload"></i> Importar Dispositivos POC',
      back:  { href: 'index.html' }
    });
  </script>

  <div class="app-wrap app-wrap--default">

    <!-- Importar desde Excel -->
    <div class="form-section-header">
      <h3><i data-lucide="upload"></i> Importar desde Excel</h3>
    </div>
    <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
      <div class="form-field">
        <label class="form-label" for="archivoExcel">Selecciona archivo Excel (.xlsx)</label>
        <label class="form-file-zone" tabindex="0" role="button">
          <input type="file" id="archivoExcel" accept=".xlsx">
          <div class="form-file-zone-icon"><i data-lucide="file-spreadsheet" style="width:32px;height:32px;"></i></div>
          <p><strong>Arrastra tu archivo aquí</strong> o haz clic para seleccionar</p>
          <span>XLSX · hoja "BD" con columnas SERIAL, CLIENTE, OPERADOR, etc.</span>
        </label>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" onclick="importarExcelAFirestore()"><i data-lucide="upload"></i> Importar dispositivos</button>
      </div>

      <div id="estadoImportacion" class="alert-banner" style="display:none; margin-top:var(--sp-3);">
        <span class="alert-banner-icon"><i data-lucide="info"></i></span>
        <div class="alert-banner-body" id="estadoImportacionBody"></div>
      </div>
    </div>

    <!-- Exportar dispositivos actuales -->
    <div class="form-section-header">
      <h3><i data-lucide="download"></i> Exportar dispositivos actuales</h3>
    </div>
    <div class="ds-card ds-card-padded">
      <p style="font-size:13px; color:var(--fg-3); margin:0 0 var(--sp-3);">
        Descarga un Excel con todos los dispositivos PoC registrados, listo para edición masiva.
      </p>
      <button class="btn btn-secondary" onclick="exportarDispositivos()"><i data-lucide="file-text"></i> Exportar a Excel</button>
    </div>

  </div>

<script>
function setEstado(mensaje, tipo = 'info') {
  const el = document.getElementById('estadoImportacion');
  const body = document.getElementById('estadoImportacionBody');
  el.className = `alert-banner alert-${tipo}`;
  body.textContent = mensaje;
  el.style.display = '';
}

async function importarExcelAFirestore() {
  const archivoInput = document.getElementById('archivoExcel');
  const archivo = archivoInput.files[0];

  if (!archivo) {
    setEstado("Selecciona un archivo .xlsx primero.", "warning");
    return;
  }

  setEstado("Importando, por favor espera…", "info");

  const data = await archivo.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets["BD"];
  const jsonData = XLSX.utils.sheet_to_json(sheet);

  let contador = 0;

  for (let fila of jsonData) {
    const serialValue = fila["SERIAL"] && fila["SERIAL"].toString().trim() !== "" ? fila["SERIAL"] : "N/D";

    const grupos = Object.keys(fila)
      .filter(k => k.startsWith("GRUPO ") && fila[k])
      .map(k => fila[k].toString().trim())
      .filter(g => g.length > 0);

    const nuevoRef = await PocService.addPocDevice({
      cliente: fila["CLIENTE"] || "",
      operador: fila["OPERADOR"] || "",
      sim_number: fila["# SIMCARD"] || "",
      sim_phone: fila["# TEL SIMCARD"] || "",
      serial: serialValue,
      gps: (fila["GPS"] || '').toString().toLowerCase().includes("true"),
      activo: (fila["ACTIVO"] || '').toString().toUpperCase() !== "NO",
      ip: fila["IP del Servidor"] || "",
      unit_id: fila["UNIT ID"] || "",
      radio_name: fila["Nombre del Radio"] || "",
      grupos,
      notas: fila["DAÑOS"] || "",
      deleted: false,
      created_at: firebase.firestore.FieldValue.serverTimestamp(),
      updated_at: firebase.firestore.FieldValue.serverTimestamp()
    });

    // Si el SIM importado existe disponible en el pool, marcarlo asignado
    // (consistencia con POC → SIM cards). Best-effort, no frena el import.
    if (fila["# SIMCARD"]) {
      SimCardsService.marcarAsignadoSiExiste(fila["# SIMCARD"], {
        id: nuevoRef.id, serial: serialValue, cliente_nombre: fila["CLIENTE"] || "",
      }, firebase.auth().currentUser);
    }

    contador++;
    setEstado(`Dispositivos importados: ${contador}`, "info");
  }

  setEstado(`Importación completada. Total: ${contador}`, "success");
}

async function exportarDispositivos() {
  setEstado("Exportando dispositivos…", "info");
  try {
    const datos = await PocService.getPocDevices();
    const ws = XLSX.utils.json_to_sheet(datos);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Dispositivos");
    XLSX.writeFile(wb, "poc_dispositivos.xlsx");
    setEstado("Exportación completada.", "success");
  } catch (error) {
    console.error("Error al exportar:", error);
    setEstado("Error al exportar.", "error");
  }
}
</script>
<script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
  </div> <!-- /cc-work -->
  </div> <!-- /cc-app -->
  <script>
    // Rail Command Center (F5) — espera auth (scripts defer) y pinta el rail del rol efectivo.
    document.addEventListener('DOMContentLoaded', () => Layout.initRail('poc'));
  </script>
</body>
</html>
