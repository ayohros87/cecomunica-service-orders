<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8" />
  <title>Activación de facturación - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <!-- Rediseño Command Center F5: rail lateral (híbrido). PLAN_REDISENO_COMMAND_CENTER.md -->
  <link rel="stylesheet" href="../css/ceco-rail.css?v=cc5">
  <link rel="stylesheet" href="../css/app-kit-extras.css">

  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-functions-compat.js"></script>
  <script defer src="../js/firebase-init.js"></script>
  <script src="../js/core/modulos.js"></script>
  <script src="../js/core/layout.js?v=cc5"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script defer src="../js/services/usuariosService.js"></script>
  <script defer src="../js/services/contratosService.js"></script>
  <script defer src="../js/services/modelosService.js"></script>
  <script src="/js/vendor/lucide.min.js"></script>

  <style>
    /* Chips de verificación compactos en la celda de checklist */
    .r-chips { display:flex; gap:5px; flex-wrap:wrap; }
    #tablaActivacion td { vertical-align:middle; }
  </style>
</head>
<body>
  <div class="cc-app">
  <div id="rail-mount"></div>
  <div class="cc-work">

<div id="topbar-mount"></div>
<script>
  Layout.renderTopbarFor('index', {
    back: { href: './index.html', label: '<i data-lucide="arrow-left"></i> Facturación' },
    title: '<i data-lucide="play-circle"></i> Activación de facturación',
  });
</script>

<div class="app-wrap app-wrap--full">
  <p style="color:var(--fg-3); margin:0 0 var(--sp-3); font-size:13px;">
    Requeridos para activar: <b>contrato vigente</b> + <b>mapeo QuickBooks</b>. Entrega, seriales y firmado son recomendados (no bloquean).
    La facturación no se emite todavía — esto solo marca qué contratos están listos.
  </p>

  <div id="kpis" class="fact-kpis" style="margin:0 0 var(--sp-3);"></div>

  <div class="ds-card" style="padding:0;">
    <div style="padding:var(--sp-3) var(--sp-4); border-bottom:1px solid var(--border-subtle); display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
      <div class="seg" role="tablist">
        <button type="button" class="seg-btn is-on" data-v="pendientes" onclick="setVista('pendientes')">Pendientes <span id="cnt-pendientes">0</span></button>
        <button type="button" class="seg-btn" data-v="listos" onclick="setVista('listos')">Listos <span id="cnt-listos">0</span></button>
        <button type="button" class="seg-btn" data-v="activos" onclick="setVista('activos')">Activos <span id="cnt-activos">0</span></button>
        <button type="button" class="seg-btn" data-v="en_espera" onclick="setVista('en_espera')">En espera <span id="cnt-en_espera">0</span></button>
        <button type="button" class="seg-btn" data-v="no_facturables" onclick="setVista('no_facturables')">No facturables <span id="cnt-no_facturables">0</span></button>
      </div>
      <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
        <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--fg-2); cursor:pointer; white-space:nowrap;" title="Apaga los correos de alerta (fuga / falso arranque) hasta que estén facturando.">
          <input type="checkbox" id="alertasCorreo" onchange="toggleAlertas(this.checked)"> Alertas por correo
        </label>
        <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--fg-2); cursor:pointer; white-space:nowrap;" title="Si está activo, la corrida diaria (7:00 AM) activa solo los contratos Listos.">
          <input type="checkbox" id="autoActivar" onchange="toggleAuto(this.checked)"> Auto-activar contratos listos
        </label>
      </div>
    </div>
    <div id="lista" style="padding:var(--sp-4);"><p style="color:var(--fg-3);">Cargando…</p></div>
  </div>
</div>

<!-- Vista previa de factura (cálculo de validación, sin escribir a QBO) -->
<div id="overlayFactura" class="modal-backdrop" style="display:none;" role="dialog" aria-modal="true">
  <div class="modal modal-lg" style="max-width:820px;">
    <div class="modal-header">
      <h3 class="modal-title"><i data-lucide="file-text"></i> Vista previa de factura</h3>
      <button class="modal-close" onclick="cerrarFactura()" aria-label="Cerrar"><i data-lucide="x" style="width:18px;height:18px;"></i></button>
    </div>
    <div class="modal-body" id="facturaBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarFactura()">Cerrar</button>
    </div>
  </div>
</div>

<script defer src="../js/ui/toast.js"></script>
<script src="../js/pages/facturacion-activacion.js" defer></script>
<script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
  </div> <!-- /cc-work -->
  </div> <!-- /cc-app -->
  <script>
    // Rail Command Center (F5) — espera auth (scripts defer) y pinta el rail del rol efectivo.
    document.addEventListener('DOMContentLoaded', () => Layout.initRail('facturacion'));
  </script>
</body>
</html>
