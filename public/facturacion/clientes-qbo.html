<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8" />
  <title>Clientes ↔ QuickBooks - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <!-- Rediseño Command Center F5: rail lateral (híbrido). PLAN_REDISENO_COMMAND_CENTER.md -->
  <link rel="stylesheet" href="../css/ceco-rail.css?v=cc5">
  <link rel="stylesheet" href="../css/app-kit-extras.css">

  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-functions-compat.js"></script>
  <script defer src="../js/firebase-init.js"></script>
  <script src="../js/core/modulos.js"></script>
  <script src="../js/core/layout.js?v=cc5"></script>
  <script src="../js/core/roles.js"></script>
  <script defer src="../js/services/usuariosService.js"></script>
  <script defer src="../js/services/clientesService.js"></script>
  <script src="/js/vendor/lucide.min.js"></script>

</head>
<body>
  <div class="cc-app">
  <div id="rail-mount"></div>
  <div class="cc-work">

<div id="topbar-mount"></div>
<script>
  Layout.renderTopbarFor('index', {
    back: { href: './index.html', label: '<i data-lucide="arrow-left"></i> Facturación' },
    title: '<i data-lucide="link"></i> Clientes ↔ QuickBooks',
  });
</script>

<div class="app-wrap app-wrap--full">
  <p id="qboResumen" style="color:var(--fg-3); margin:0 0 var(--sp-3); font-size:13px;">Cargando…</p>

  <div class="ds-card" style="padding:0;">
    <div style="padding:var(--sp-3) var(--sp-4); border-bottom:1px solid var(--border-subtle);">
      <div class="seg" role="tablist">
        <button type="button" class="seg-btn is-on" data-v="sugeridos" onclick="setVista('sugeridos')">Sugeridos <span id="cnt-sugeridos">0</span></button>
        <button type="button" class="seg-btn" data-v="multiples" onclick="setVista('multiples')">Múltiples <span id="cnt-multiples">0</span></button>
        <button type="button" class="seg-btn" data-v="sin_match" onclick="setVista('sin_match')">Sin match <span id="cnt-sin_match">0</span></button>
        <button type="button" class="seg-btn" data-v="vinculados" onclick="setVista('vinculados')">Vinculados <span id="cnt-vinculados">0</span></button>
        <button type="button" class="seg-btn" data-v="dupes" onclick="setVista('dupes')">Duplicados QBO <span id="cnt-dupes">0</span></button>
      </div>
    </div>
    <div id="lista" style="padding:var(--sp-4);"><p style="color:var(--fg-3);">Cargando…</p></div>
  </div>
</div>

<script defer src="../js/ui/toast.js"></script>
<script src="../js/pages/facturacion-clientes-qbo.js" defer></script>
<script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
  </div> <!-- /cc-work -->
  </div> <!-- /cc-app -->
  <script>
    // Rail Command Center (F5) — espera auth (scripts defer) y pinta el rail del rol efectivo.
    document.addEventListener('DOMContentLoaded', () => Layout.initRail('facturacion'));
  </script>
</body>
</html>
