  <path d="M30 16 H22 a13 13 0 0 0 0 32 H30" stroke="url(#apWhite)" stroke-width="5.6" fill="none" stroke-linecap="round"></path>
  <path d="M34 16 H42 a13 13 0 0 1 0 32 H34" stroke="url(#apCyan)" stroke-width="5.6" fill="none" stroke-linecap="round"></path>
