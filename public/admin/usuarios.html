<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Usuarios — Cecomunica</title>

  <link rel="stylesheet" href="../css/ceco-ui.css">
  <link rel="stylesheet" href="../css/admin-panel.css">

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-functions-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../js/ui/toast.js"></script>
  <script src="../js/ui/modal.js"></script>
  <script src="../js/services/usuariosAdminService.js"></script>
  <script src="../js/pages/admin-usuarios.js" defer></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script>
    function cerrarSesion() {
      firebase.auth().signOut().then(() => { window.location.href = "../login.html"; });
    }
  </script>
</head>
<body>
  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="users-round"></i> Usuarios',
      back: { href: 'index.html', label: '<i data-lucide="arrow-left"></i> Panel' },
      showHome: true, homeHref: '../index.html', showLogout: true
    });
  </script>

  <div class="app-wrap app-wrap--wide">

    <div class="admin-toolbar">
      <button id="btnNuevo" class="btn btn-primary btn-sm">
        <i data-lucide="user-plus"></i> Nuevo usuario
      </button>
      <button id="btnRefresh" class="btn btn-ghost btn-sm">
        <i data-lucide="refresh-cw"></i> Refrescar
      </button>
      <span class="spacer"></span>
      <span id="countShowing" class="ts">—</span>
      <span class="spacer"></span>
      <span id="lastUpdate" class="ts">—</span>
    </div>

    <div class="alert-banner alert-info" style="margin-bottom:var(--sp-4);">
      <i data-lucide="info"></i>
      <div>
        Gestión de usuarios — alta, cambio de rol, desactivación y reset de contraseña.
        Las operaciones requieren rol <code>administrador</code> y quedan registradas en
        <code>usuarios_audit</code>. No puedes desactivarte a ti mismo ni quitarte el rol admin;
        tampoco puedes dejar al sistema sin administradores activos.
      </div>
    </div>

    <div class="audit-toolbar" style="margin-bottom:var(--sp-3);">
      <select id="filterRol" class="search-input" style="flex:0 0 auto;min-width:180px;"></select>
      <input type="search" id="searchInput" class="search-input" placeholder="Buscar por nombre, email o UID…">
    </div>

    <div class="ds-card" style="padding:0;">
      <div id="tblUsuarios">
        <div class="empty-state-hint" style="padding:var(--sp-4);text-align:center;color:var(--fg-3);">
          Cargando…
        </div>
      </div>
    </div>

  </div>

  <script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
  </script>
</body>
</html>
