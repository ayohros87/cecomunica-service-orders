<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fotos de Taller - Cecomunica</title>
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-storage-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script src="../js/core/auth.js"></script>

  <style>
    :root {
      --ft-brand: #2563eb;
      --ft-bg: #f3f6fb;
      --ft-card: #ffffff;
      --ft-text: #0f172a;
      --ft-muted: #64748b;
      --ft-line: #dbe4ee;
      --ft-danger: #dc2626;
      --ft-ok: #16a34a;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(140deg, #eef4fb 0%, #f8fbff 100%);
      color: var(--ft-text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      min-height: 100%;
    }

    .ft-header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: #fff;
      border-bottom: 1px solid var(--ft-line);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      padding: 10px 12px;
    }

    .ft-header-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .ft-back {
      border: 1px solid var(--ft-line);
      background: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      color: #1e293b;
      min-height: 42px;
      cursor: pointer;
    }

    .ft-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.2px;
      margin: 0;
    }

    .ft-order-meta {
      display: grid;
      gap: 6px;
      font-size: 13px;
    }

    .ft-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .ft-chip {
      background: #eef2ff;
      color: #1e3a8a;
      border: 1px solid #c7d2fe;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .ft-main {
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .ft-card {
      background: var(--ft-card);
      border: 1px solid var(--ft-line);
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(2, 6, 23, 0.05);
      padding: 12px;
    }

    .ft-card-title {
      margin: 0 0 10px 0;
      font-size: 14px;
      font-weight: 800;
      color: #334155;
    }

    .capture-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .capture-btn {
      min-height: 52px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(30, 64, 175, 0.25);
    }

    .capture-btn.antes { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
    .capture-btn.despues { background: linear-gradient(135deg, #0ea5e9, #0284c7); }
    .capture-btn.detalle { background: linear-gradient(135deg, #14b8a6, #0f766e); }

    .hidden-input { display: none; }

    .preview-card {
      display: none;
      gap: 10px;
    }

    .preview-card.show {
      display: grid;
    }

    .preview-thumb {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--ft-line);
      background: #e2e8f0;
    }

    .label {
      font-size: 12px;
      font-weight: 700;
      color: #475569;
      margin-bottom: 4px;
      display: inline-block;
    }

    .input, .select, .textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
      background: #fff;
    }

    .textarea {
      min-height: 86px;
      resize: vertical;
    }

    .preview-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-touch {
      min-height: 46px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-upload { background: var(--ft-ok); color: #fff; }
    .btn-cancel { background: #eef2f7; color: #334155; border: 1px solid #cbd5e1; }

    .gallery-section {
      display: grid;
      gap: 10px;
    }

    .gallery-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .photo-item {
      background: #fff;
      border: 1px solid var(--ft-line);
      border-radius: 12px;
      overflow: hidden;
      display: grid;
    }

    .photo-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #e2e8f0;
      cursor: pointer;
    }

    .photo-body {
      padding: 8px;
      display: grid;
      gap: 5px;
    }

    .photo-meta {
      font-size: 12px;
      color: #334155;
      line-height: 1.3;
      word-break: break-word;
    }

    .photo-note {
      font-size: 12px;
      color: var(--ft-muted);
      line-height: 1.3;
      word-break: break-word;
    }

    .photo-delete {
      border: 1px solid #fecaca;
      color: #b91c1c;
      background: #fff1f2;
      border-radius: 9px;
      min-height: 36px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .empty-state {
      text-align: center;
      color: #64748b;
      padding: 20px 12px;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      background: #f8fafc;
      font-size: 14px;
    }

    .status-msg {
      font-size: 13px;
      color: #475569;
      min-height: 18px;
    }

    .viewer {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.9);
      display: none;
      z-index: 200;
      padding: 14px;
      box-sizing: border-box;
    }

    .viewer.show {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }

    .viewer-top {
      display: flex;
      justify-content: flex-end;
    }

    .viewer-close {
      min-height: 40px;
      min-width: 40px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      cursor: pointer;
    }

    .viewer-img-wrap {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .viewer-img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
      object-fit: contain;
    }

    .viewer-meta {
      color: #e2e8f0;
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
    }

    @media (min-width: 840px) {
      .ft-main {
        max-width: 980px;
        margin: 0 auto;
      }

      .capture-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .gallery-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <header class="ft-header">
    <div class="ft-header-top">
      <button class="ft-back" id="btnBack" type="button">← Volver</button>
      <h1 class="ft-title">📸 Fotos de Taller</h1>
    </div>

    <div class="ft-order-meta">
      <div class="ft-meta-row">
        <span class="ft-chip" id="metaOrden">Orden: —</span>
        <span class="ft-chip" id="metaEstado">Estado: —</span>
      </div>
      <div class="ft-meta-row" id="metaCliente">Cliente: —</div>
    </div>
  </header>

  <main class="ft-main">
    <section class="ft-card">
      <h2 class="ft-card-title">Captura rápida</h2>
      <div class="capture-grid">
        <button class="capture-btn antes" type="button" data-tipo="antes">📸 Tomar foto Antes</button>
        <button class="capture-btn despues" type="button" data-tipo="despues">📸 Tomar foto Después</button>
        <button class="capture-btn detalle" type="button" data-tipo="detalle">📸 Tomar foto Detalle</button>
      </div>

      <input id="inputAntes" class="hidden-input" type="file" accept="image/*" capture="environment" data-tipo="antes">
      <input id="inputDespues" class="hidden-input" type="file" accept="image/*" capture="environment" data-tipo="despues">
      <input id="inputDetalle" class="hidden-input" type="file" accept="image/*" capture="environment" data-tipo="detalle">

      <p id="statusMsg" class="status-msg"></p>
    </section>

    <section class="ft-card preview-card" id="previewCard">
      <h2 class="ft-card-title">Confirmar foto</h2>
      <img id="previewImg" class="preview-thumb" alt="Vista previa">
      <div>
        <span class="label">Tipo</span>
        <div><span class="ft-chip" id="previewTipo">—</span></div>
      </div>
      <div>
        <label class="label" for="equipoSerial">Equipo/Serial (opcional)</label>
        <select id="equipoSerial" class="select">
          <option value="">Sin serial</option>
        </select>
      </div>
      <div>
        <label class="label" for="fotoNota">Nota (opcional)</label>
        <textarea id="fotoNota" class="textarea" placeholder="Ej: Golpe en carcasa, estado de antena, etc."></textarea>
      </div>
      <div class="preview-actions">
        <button class="btn-touch btn-upload" id="btnSubirFoto" type="button">Subir foto</button>
        <button class="btn-touch btn-cancel" id="btnCancelarFoto" type="button">Cancelar</button>
      </div>
    </section>

    <section class="ft-card" id="galleryCard">
      <h2 class="ft-card-title">Galería</h2>
      <div id="emptyState" class="empty-state">Aún no hay fotos registradas.</div>

      <div class="gallery-section" id="sectionAntes" style="display:none;">
        <h3 class="gallery-title">Antes <span id="countAntes">0</span></h3>
        <div class="gallery-grid" id="gridAntes"></div>
      </div>

      <div class="gallery-section" id="sectionDespues" style="display:none;">
        <h3 class="gallery-title">Después <span id="countDespues">0</span></h3>
        <div class="gallery-grid" id="gridDespues"></div>
      </div>

      <div class="gallery-section" id="sectionDetalle" style="display:none;">
        <h3 class="gallery-title">Detalle <span id="countDetalle">0</span></h3>
        <div class="gallery-grid" id="gridDetalle"></div>
      </div>
    </section>
  </main>

  <div class="viewer" id="viewer">
    <div class="viewer-top">
      <button class="viewer-close" id="btnViewerClose" type="button">×</button>
    </div>
    <div class="viewer-img-wrap">
      <img id="viewerImg" class="viewer-img" alt="Foto ampliada">
    </div>
    <div id="viewerMeta" class="viewer-meta"></div>
  </div>

  <script src="../js/pages/fotos-taller.js" defer></script>
</body>
</html>
