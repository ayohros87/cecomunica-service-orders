<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Agregar Equipo - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../js/services/contratosService.js"></script>
  <script src="../js/services/modelosService.js"></script>
  <script src="../js/services/ordenesService.js"></script>
  <script src="../js/services/clientesService.js"></script>
  <script src="../js/domain/equipoNormalize.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="../js/pages/agregar-equipo.js" defer></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script>
    function cerrarSesion() {
      firebase.auth().signOut().then(() => { window.location.href = "login.html"; });
    }
  </script>
</head>
<body>

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="monitor"></i> Agregar Equipos a Orden',
      back: { label: '<i data-lucide="arrow-left"></i> Volver', href: 'index.html' },
      showHome: false, showLogout: true
    });
  </script>

  <div class="app-wrap app-wrap--default">

    <form id="formEquipos">

      <!-- Datos de la Orden -->
      <div class="form-section-header">
        <h3><i data-lucide="clipboard"></i> Datos de la orden</h3>
      </div>
      <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
        <div class="form-grid-3">
          <div class="form-field">
            <label class="form-label" for="orden_id">Número de orden</label>
            <input class="form-input" type="text" id="orden_id" readonly style="font-family:var(--font-mono);">
          </div>
          <div class="form-field">
            <label class="form-label" for="cliente">Cliente</label>
            <input class="form-input" type="text" id="cliente" readonly>
          </div>
          <div class="form-field">
            <label class="form-label" for="tipo">Tipo de servicio</label>
            <input class="form-input" type="text" id="tipo" readonly>
          </div>
        </div>
      </div>

      <!-- Equipos -->
      <div class="form-section-header">
        <h3><i data-lucide="monitor"></i> Equipos</h3>
      </div>
      <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
        <div id="equiposContainer"></div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="agregarEquipo()"><i data-lucide="plus"></i> Agregar equipo</button>
          <button type="button" class="btn btn-ghost" onclick="duplicarMultiplesEquipos()"><i data-lucide="repeat"></i> Duplicar múltiples</button>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-lg"><i data-lucide="save"></i> Guardar todos</button>
        <button type="button" class="btn btn-ghost" onclick="window.location.href='index.html'"><i data-lucide="arrow-left"></i> Cancelar</button>
      </div>
    </form>

    <p id="mensaje" class="resumen"></p>

  </div>

  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
