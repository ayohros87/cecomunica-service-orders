<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agregar Equipo - Cecomunica</title>
<link rel="stylesheet" href="../css/ceco-ui.css">

</head>
<body>
  <h2>Agregar Equipos a Orden</h2>
  <form id="formEquipos" class="card form">
  <div class="section form">
    <h3 class="form-title">📋 Datos de la Orden</h3>
    <div class="form-grid cols-2">
      <div class="form-field">
        <label>Número de Orden</label>
        <input type="text" id="orden_id" readonly>
      </div>
      <div class="form-field">
        <label>Cliente</label>
        <input type="text" id="cliente" readonly>
      </div>
      <div class="form-field">
        <label>Tipo de Servicio</label>
        <input type="text" id="tipo" readonly>
      </div>
    </div>
  </div>

  <div class="section form">
    <h3 class="form-title">🖥️ Equipos</h3>
    <div id="equiposContainer"></div>
    <div class="form-actions">
      <button type="button" class="btn" onclick="agregarEquipo()">➕ Agregar equipo</button>
      <button type="button" class="btn" onclick="duplicarMultiplesEquipos()">🔁 Duplicar múltiples</button>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn primary">💾 Guardar todos</button>
    <button type="button" class="btn" onclick="window.location.href='index.html'">⬅️ Cancelar y volver</button>
  </div>
</form>
<p id="mensaje" class="resumen"></p>


  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../js/services/contratosService.js"></script>
  <script src="../js/services/modelosService.js"></script>
  <script src="../js/services/ordenesService.js"></script>
  <script src="../js/services/clientesService.js"></script>
  <script src="../js/pages/agregar-equipo.js" defer></script>
</body>
</html>
