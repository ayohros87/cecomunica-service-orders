<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orden de Servicio - Cecomunica</title>
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <link rel="stylesheet" href="../css/print-base.css">
  <style>
    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px 8px;
      padding: 6px;
      margin-bottom: 8px;
      border: 1px solid var(--line);
    }

    .info-item {
      display: block;
      font-size: 10px;
      line-height: 1.5;
    }

    .info-item.full {
      grid-column: 1 / -1;
    }

    .info-label {
      font-weight: 700;
      color: var(--text);
    }

    .info-value {
      font-weight: 400;
      color: var(--text);
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      margin: 8px 0 4px 0;
      padding-bottom: 2px;
      border-bottom: 1px solid var(--line);
    }

    .equipos-table {
      width: 100%;
      border-collapse: collapse;
      margin: 4px 0;
      font-size: 10px;
    }

    .equipos-table thead {
      background: #f8fafc;
    }

    .equipos-table th {
      padding: 6px 4px;
      text-align: center;
      font-weight: 600;
      font-size: 9px;
      border: 1px solid var(--line);
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.2px;
    }

    .equipos-table td {
      padding: 5px 4px;
      text-align: center;
      border: 1px solid var(--line);
    }

    .equipos-table tbody tr:nth-child(even) {
      background: #fafafa;
    }

    .firma-section {
      margin-top: 20px;
      padding: 10px;
      font-size: 10px;
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .firma-item {
      display: inline-block;
    }

    .firma-label {
      font-weight: 700;
      margin-right: 4px;
    }

    .firma-line {
      display: inline-block;
      border-bottom: 1px solid #000;
      width: 200px;
      height: 16px;
    }

    .footer-info {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
      font-size: 9px;
      color: var(--muted);
      text-align: center;
    }

    .alert-box {
      background: #fef3c7;
      border: 1px solid #fbbf24;
      border-radius: 8px;
      padding: 12px;
      margin: 16px 0;
      font-size: 12px;
      color: #92400e;
    }

    @media (max-width: 760px) {
      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="print-toolbar no-print">
    <button class="btn btn-secondary" onclick="window.print()">
      <i data-lucide="printer"></i> Imprimir
    </button>
    <button class="btn btn-ghost" onclick="window.close()">
      <i data-lucide="x"></i> Cerrar
    </button>
  </div>

  <div class="print-page">
    <div class="print-brand-header">
      <img src="../logo_cecomunica.png" alt="CeComunica" class="brand-logo">
      <div class="brand-info">
        <strong>C COMUNICA, S.A.</strong>
        RUC: 32977-27-249966 DV 39 · Tel: 279-5570<br>
        CC. Bal Harbour, Via Italia, Paitilla, Panamá
      </div>
      <div class="brand-doc-type" id="documentTitle">Orden de Servicio</div>
    </div>

    <div id="infoContainer"></div>

    <h3 class="section-title">
      <span id="tituloEquipos">Equipos Asociados</span>
    </h3>

    <div id="tablaContainer"></div>

    <div class="firma-section">
      <div class="firma-item">
        <span class="firma-label">Firma del Técnico:</span>
        <span class="firma-line"></span>
      </div>
      <div class="firma-item">
        <span class="firma-label">Fecha:</span>
        <span class="firma-line"></span>
      </div>
    </div>

    <div class="footer-info">
      <p>Documento generado: <span id="fechaGeneracion"></span></p>
      <p>C COMUNICA, S.A. — Sistema de Órdenes de Servicio</p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/clientesService.js"></script>
  <script src="../js/services/ordenesService.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../js/pages/imprimir-orden.js" defer></script>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
