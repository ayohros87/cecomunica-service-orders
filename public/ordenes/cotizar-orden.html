<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Cotizar Orden – Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <link rel="stylesheet" href="../css/cotizaciones-kit.css">

  <style>
    /* Page-local: tarjeta de equipo + intervención + líneas de pieza */
    .co-equipo { border:1px solid var(--border-subtle, #e5e7eb); border-radius:var(--radius-md, 10px);
      padding:var(--sp-3, 12px); margin-bottom:var(--sp-3, 12px); background:var(--surface-card, #fff); }
    .co-equipo-hd { display:flex; flex-wrap:wrap; gap:8px 16px; align-items:baseline; margin-bottom:6px; }
    .co-equipo-hd .serie { font-weight:600; }
    .co-equipo-hd .modelo { color:var(--fg-3, #6b7280); font-size:13px; }
    .co-interv { font-size:12.5px; color:#374151; background:var(--accent-soft, #eef6ff);
      border:1px solid var(--accent-line, #cfe3f7); border-radius:6px; padding:6px 8px; margin:4px 0 10px; }
    .co-interv.vacia { color:#9ca3af; font-style:italic; background:#fafafa; border-color:#eee; }
    .co-lineas { width:100%; border-collapse:collapse; font-size:13px; }
    .co-lineas th, .co-lineas td { padding:5px 6px; text-align:left; vertical-align:top; }
    .co-lineas th { font-size:11px; text-transform:uppercase; letter-spacing:.3px; color:var(--fg-3,#6b7280); border-bottom:1px solid var(--border-subtle,#e5e7eb); }
    .co-lineas td { border-bottom:1px solid #f1f3f5; }
    .co-lineas .num { text-align:right; }
    .co-cell-rel { position:relative; }
    .co-pza-pop { position:absolute; z-index:30; left:0; right:0; top:100%; background:#fff;
      border:1px solid var(--border-subtle,#e5e7eb); border-radius:8px; box-shadow:var(--shadow, 0 8px 24px rgba(0,0,0,.12));
      max-height:240px; overflow:auto; margin-top:2px; }
    .co-pza-item { padding:7px 10px; cursor:pointer; display:flex; justify-content:space-between; gap:10px; }
    .co-pza-item:hover, .co-pza-item.active { background:var(--accent-soft, #eef6ff); }
    .co-pza-item .meta { color:var(--fg-3,#6b7280); font-size:12px; white-space:nowrap; }
    .co-w-sku { width:130px; } .co-w-cant { width:64px; } .co-w-precio { width:96px; }
    .co-w-total { width:90px; } .co-w-acc { width:36px; }
    .co-empty { color:var(--fg-3,#6b7280); font-style:italic; padding:8px 0; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="../js/ui/toast.js"></script>
  <script src="../js/ui/modal.js"></script>
  <script src="../js/services/ordenesService.js"></script>
  <script src="../js/services/clientesService.js"></script>
  <script src="../js/services/modelosService.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/services/empresaService.js"></script>
  <script src="../js/services/piezasService.js"></script>
  <script src="../js/services/cotizacionesService.js"></script>
  <script src="../js/services/mailService.js"></script>
  <script src="../js/domain/cotizacionesTotales.js"></script>
  <script src="../js/pages/cot-editor-state.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="receipt"></i> Cotizar orden',
      back: { label: '<i data-lucide="arrow-left"></i> Órdenes', href: 'index.html' },
      showHome: false, showLogout: true,
    });
  </script>

  <div class="app-body">
    <div id="cotizarMount"></div>
  </div>

  <script src="../js/pages/cotizar-orden.js" defer></script>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
