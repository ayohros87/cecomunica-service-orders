<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Cotizar Orden – Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <!-- Rediseño Command Center F5: rail lateral (híbrido). PLAN_REDISENO_COMMAND_CENTER.md -->
  <link rel="stylesheet" href="../css/ceco-rail.css?v=cc5">
  <link rel="stylesheet" href="../css/cotizaciones-kit.css">

  <style>
    /* Page-local: tarjeta de equipo + intervención + líneas de pieza */
    .co-equipo { border:1px solid var(--border-subtle, #e5e7eb); border-radius:var(--radius-md, 10px);
      padding:var(--sp-3, 12px); margin-bottom:var(--sp-3, 12px); background:var(--surface-card, #fff); }
    .co-equipo-hd { display:flex; flex-wrap:wrap; gap:8px 16px; align-items:baseline; margin-bottom:6px; }
    .co-equipo-hd .serie { font-weight:600; }
    .co-equipo-hd .modelo { color:var(--fg-3, #6b7280); font-size:13px; }
    .co-interv { font-size:12.5px; color:#374151; background:var(--accent-soft, #eef6ff);
      border:1px solid var(--accent-line, #cfe3f7); border-radius:6px; padding:6px 8px; margin:4px 0 10px; }
    .co-interv.vacia { color:#9ca3af; font-style:italic; background:#fafafa; border-color:#eee; }
    .co-lineas { width:100%; border-collapse:collapse; font-size:13px; }
    .co-lineas th, .co-lineas td { padding:5px 6px; text-align:left; vertical-align:top; }
    .co-lineas th { font-size:11px; text-transform:uppercase; letter-spacing:.3px; color:var(--fg-3,#6b7280); border-bottom:1px solid var(--border-subtle,#e5e7eb); }
    .co-lineas td { border-bottom:1px solid #f1f3f5; }
    .co-lineas .num { text-align:right; }
    .co-cell-rel { position:relative; }
    .co-pza-pop { position:absolute; z-index:30; left:0; right:0; top:100%; background:#fff;
      border:1px solid var(--border-subtle,#e5e7eb); border-radius:8px; box-shadow:var(--shadow, 0 8px 24px rgba(0,0,0,.12));
      max-height:240px; overflow:auto; margin-top:2px; }
    .co-pza-item { padding:7px 10px; cursor:pointer; display:flex; justify-content:space-between; gap:10px; }
    .co-pza-item:hover, .co-pza-item.active { background:var(--accent-soft, #eef6ff); }
    .co-pza-item .meta { color:var(--fg-3,#6b7280); font-size:12px; white-space:nowrap; }
    .co-w-sku { width:130px; } .co-w-cant { width:64px; } .co-w-precio { width:96px; }
    .co-w-total { width:90px; } .co-w-acc { width:36px; }
    .co-empty { color:var(--fg-3,#6b7280); font-style:italic; padding:8px 0; }

    /* Piezas registradas por el técnico (consumos) */
    .co-consumos { border:1px dashed var(--accent-line,#cfe3f7); background:#f8fbff; border-radius:8px; padding:8px 10px; margin:0 0 10px; }
    .co-consumos-hd { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px; font-size:12.5px; }
    .co-consumos-hd i { width:14px; height:14px; vertical-align:-2px; }
    .co-consumos-list { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:4px; }
    .co-consumos-list li { display:flex; align-items:center; gap:8px; font-size:12.5px; }
    .co-cons-main { flex:1; }
    .co-cons-meta { color:var(--fg-3,#6b7280); white-space:nowrap; display:flex; gap:6px; align-items:center; }
    .co-cons-tipo { font-size:10px; text-transform:uppercase; letter-spacing:.3px; padding:1px 5px; border-radius:999px; background:#e5e7eb; color:#374151; }
    .co-cons-tipo.tipo-cobro { background:#dcfce7; color:#166534; }
    .co-cons-tipo.tipo-garantia { background:#fef9c3; color:#854d0e; }
    .co-cons-tipo.tipo-interno { background:#e0e7ff; color:#3730a3; }

    /* Drop target al arrastrar una pieza del catálogo */
    .co-equipo.co-drop { outline:2px dashed var(--accent,#0B6BCB); outline-offset:2px; background:var(--accent-soft,#eef6ff); }

    /* Drawer del catálogo de piezas — el contenedor deja pasar el puntero para
       poder arrastrar piezas sobre los equipos; solo el panel es interactivo. */
    .co-cat-drawer[hidden] { display:none; }
    .co-cat-drawer { position:fixed; inset:0; z-index:1000; pointer-events:none; }
    .co-cat-overlay { position:absolute; inset:0; background:rgba(0,0,0,.18); pointer-events:none; }
    .co-cat-panel { position:absolute; top:0; right:0; height:100%; width:min(420px,92vw); background:#fff;
      box-shadow:-8px 0 28px rgba(0,0,0,.18); display:flex; flex-direction:column; pointer-events:auto; }
    .co-cat-head { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; padding:14px 16px; border-bottom:1px solid var(--border-subtle,#e5e7eb); }
    .co-cat-search { padding:12px 16px 8px; }
    .co-cat-search input { width:100%; }
    .co-cat-list { flex:1; overflow:auto; padding:0 8px; }
    .co-cat-item { display:flex; align-items:center; gap:8px; padding:8px 8px; border-bottom:1px solid #f1f3f5; cursor:grab; }
    .co-cat-item:active { cursor:grabbing; }
    .co-cat-item:hover { background:var(--accent-soft,#eef6ff); }
    .co-cat-item-main { flex:1; min-width:0; display:flex; flex-direction:column; }
    /* Nombres largos legibles en iPad: máx. 2 líneas + corte de palabra;
       el nombre completo va en el title del ítem. Solo presentación. */
    .co-cat-item-name { font-size:13px; overflow-wrap:anywhere; word-break:break-word;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .co-cat-item-meta { font-size:11.5px; color:var(--fg-3,#6b7280); }
    .co-cat-empty { color:var(--fg-3,#6b7280); font-style:italic; padding:16px 8px; }
    .co-cat-hint { font-size:11px; color:var(--fg-3,#6b7280); padding:8px 16px; margin:0; border-top:1px solid var(--border-subtle,#e5e7eb); }
    /* Encabezados de grupo (categoría) y sección "Sugeridas para el modelo" */
    .co-cat-group { display:flex; align-items:center; justify-content:space-between; gap:8px; width:100%;
      padding:8px; margin:0; background:#f8fafc; border:0; border-bottom:1px solid #e5e7eb;
      font:600 12px Arial,sans-serif; color:#374151; cursor:pointer; text-align:left; position:sticky; top:0; }
    .co-cat-group .co-cat-group-n { font-weight:400; color:var(--fg-3,#6b7280); }
    .co-cat-group-body.collapsed { display:none; }
    .co-cat-sugeridas-hd { padding:8px; background:#eef6ff; border-bottom:1px solid #dbeafe;
      font:600 12px Arial,sans-serif; color:#1d4ed8; }
    /* iPad (≤1024px): panel más contenido y con tope al viewport */
    @media (max-width:1024px) {
      .co-cat-panel { width:min(380px, 88vw); }
      .co-cat-item-name { font-size:12.5px; }
    }
    /* Autocompletar: que el nombre también corte en pantallas angostas */
    .co-pza-item span:first-child { overflow-wrap:anywhere; min-width:0; }

    /* Vista previa */
    .co-preview-ov { position:fixed; inset:0; z-index:1100; background:rgba(0,0,0,.45); display:flex; align-items:flex-start; justify-content:center; overflow:auto; padding:24px; }
    .co-preview-card { background:#fff; border-radius:12px; width:min(760px,100%); box-shadow:0 16px 48px rgba(0,0,0,.25); }
    .co-preview-head { position:sticky; top:0; background:#fff; display:flex; align-items:center; justify-content:space-between; gap:8px; padding:14px 18px; border-bottom:1px solid var(--border-subtle,#e5e7eb); border-radius:12px 12px 0 0; }
    .co-preview-body { padding:18px; }
    .cv-meta { font-size:13px; line-height:1.6; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid #f1f3f5; }
    .cv-eq { margin:0 0 16px; }
    .cv-eq h4 { margin:0 0 4px; font-size:14px; }
    .cv-interv { font-size:12.5px; margin:0 0 6px; }
    .cv-cons { font-size:12.5px; margin:0 0 6px; }
    .cv-cons ul { margin:4px 0 0; padding-left:18px; }
    .cv-table { width:100%; border-collapse:collapse; font-size:12.5px; }
    .cv-table th, .cv-table td { padding:5px 6px; border-bottom:1px solid #f1f3f5; text-align:left; }
    .cv-table .num { text-align:right; }
    .cv-muted { color:var(--fg-3,#6b7280); font-style:italic; font-size:12.5px; }
    .cv-tot { margin-top:8px; max-width:280px; margin-left:auto; font-size:13px; }
    .cv-tot > div { display:flex; justify-content:space-between; padding:3px 0; }
    .cv-tot-total { border-top:1px solid var(--border-default,#d1d5db); margin-top:4px; padding-top:6px; font-weight:700; }

    @media print {
      body.co-previewing > *:not(.co-preview-ov) { display:none !important; }
      .co-preview-ov { position:static; background:#fff; padding:0; }
      .co-preview-card { box-shadow:none; width:100%; }
      .co-preview-head .btn { display:none; }
    }
  </style>

  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>

  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../js/core/modulos.js"></script>
  <script src="../js/core/layout.js?v=cc5"></script>
  <script defer src="../js/ui/toast.js"></script>
  <script defer src="../js/ui/modal.js"></script>
  <script defer src="../js/services/ordenesService.js"></script>
  <script defer src="../js/services/clientesService.js"></script>
  <script defer src="../js/services/modelosService.js"></script>
  <script defer src="../js/services/usuariosService.js"></script>
  <script defer src="../js/services/empresaService.js"></script>
  <script defer src="../js/services/piezasService.js"></script>

</head>
<body>

  <div id="rail-mount"></div>

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="receipt"></i> Cotizar orden',
      back: { label: '<i data-lucide="arrow-left"></i> Órdenes', href: 'index.html' },
      showHome: false, showLogout: true,
    });
  </script>

  <div class="app-body">
    <div id="cotizarMount"></div>
  </div>

  <script src="../js/pages/cotizar-orden.js" defer></script>

  </div> <!-- /cc-app -->

    // Rail Command Center (F5) — espera auth (scripts defer) y pinta el rail del rol efectivo.
    document.addEventListener('DOMContentLoaded', () => Layout.initRail('ordenes'));
