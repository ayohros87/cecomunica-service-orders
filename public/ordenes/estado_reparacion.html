<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Estados de Reparación - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/empresaService.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="/js/vendor/lucide.min.js"></script>

  <script>
    function cerrarSesion() {
      firebase.auth().signOut().then(() => { window.location.href = "login.html"; });
    }

    function esc(v) {
      return String(v == null ? "" : v)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    // Guard de acceso: firebase-init.js inicializa Firebase y redirige a login
    // (preservando el deep-link) si no hay sesión. La lógica de la página corre
    // dentro del callback, ya autenticado. El control por rol real vive en las
    // reglas de Firestore (empresa/* write). Antes esta página no tenía guard.
    document.addEventListener("DOMContentLoaded", () => {
      verificarAccesoYAplicarVisibilidad(async (rol) => {
      const lista = document.getElementById("lista-estados");
      const form = document.getElementById("form-estado");
      const inputEstado = document.getElementById("nombre-estado");
      let editandoId = null;

      async function cargarEstados() {
        lista.innerHTML = "";
        const docSnap = await EmpresaService.getDoc("estado_de_reparacion");
        if (docSnap) {
          const estados = docSnap.list || [];
          if (estados.length === 0) {
            lista.innerHTML = `
              <div class="empty-state-hint">
                <div class="empty-state-hint-icon"><i data-lucide="list"></i></div>
                <p class="title">Sin estados configurados</p>
                <p class="hint">Crea el primer estado con el formulario de arriba.</p>
              </div>`;
            if (typeof lucide !== 'undefined') lucide.createIcons();
            return;
          }
          estados.forEach(nombre => {
            const item = document.createElement("div");
            item.className = "crud-list-item";
            item.innerHTML = `
              <span class="crud-list-item-handle"><i data-lucide="grip-vertical"></i></span>
              <span class="crud-list-item-label">${esc(nombre)}</span>
              <div class="crud-list-item-actions">
                <button class="btn btn-ghost btn-icon btn-sm" onclick="editarEstado('${nombre.replace(/'/g, "\\'")}')" aria-label="Editar"><i data-lucide="pencil"></i></button>
                <button class="btn btn-ghost btn-icon btn-sm" onclick="borrarEstado('${nombre.replace(/'/g, "\\'")}')" aria-label="Eliminar"><i data-lucide="trash-2"></i></button>
              </div>`;
            lista.appendChild(item);
          });
          if (typeof lucide !== 'undefined') lucide.createIcons();
        }
      }

      window.editarEstado = async (id) => {
        inputEstado.value = id;
        editandoId = id;
        inputEstado.focus();
      };

      window.borrarEstado = async (id) => {
        if (confirm(`¿Eliminar estado "${id}"?`)) {
          const snap = await EmpresaService.getDoc("estado_de_reparacion");
          const nuevaLista = ((snap && snap.list) || []).filter(e => e !== id);
          await EmpresaService.setDoc("estado_de_reparacion", { list: nuevaLista });
          await cargarEstados();
        }
      };

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const estado = inputEstado.value.trim();
        if (!estado) return;
        const snap = await EmpresaService.getDoc("estado_de_reparacion");
        let lista = (snap && snap.list) || [];
        if (editandoId && editandoId !== estado) {
          lista = lista.filter(e => e !== editandoId);
        }
        if (!lista.includes(estado)) {
          lista.push(estado);
        }
        await EmpresaService.setDoc("estado_de_reparacion", { list: lista });
        inputEstado.value = "";
        editandoId = null;
        await cargarEstados();
      });

      await cargarEstados();
      }); // fin callback verificarAccesoYAplicarVisibilidad
    });
  </script>
</head>
<body>

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="wrench"></i> Estados de Reparación',
      back: { label: '<i data-lucide="arrow-left"></i> Volver', href: 'config.html' },
      showHome: false, showLogout: true
    });
  </script>

  <div class="app-wrap app-wrap--narrow">

    <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
      <form id="form-estado">
        <div class="form-field">
          <label class="form-label" for="nombre-estado">Nombre del estado</label>
          <div style="display:flex; gap:var(--sp-2);">
            <input class="form-input" type="text" id="nombre-estado" required placeholder="Ej. En proceso" style="flex:1;">
            <button type="submit" class="btn btn-primary"><i data-lucide="plus"></i> Agregar</button>
          </div>
        </div>
      </form>
    </div>

    <p class="form-section-title" style="margin-bottom:var(--sp-3);"><i data-lucide="list"></i> Estados configurados</p>
    <div id="lista-estados" class="crud-list"></div>
  </div>

  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
