<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Firma de Entrega - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <!-- Firebase -->
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-storage-compat.js"></script>
  <script defer src="../js/firebase-init.js"></script>
  <script src="../js/core/layout.js"></script>
  <script defer src="../js/services/mailService.js"></script>
  <script defer src="../js/services/ordenesService.js"></script>
  <script defer src="../js/services/usuariosService.js"></script>
  <script defer src="../js/services/clientesService.js"></script>
  <script defer src="../js/ui/toast.js"></script>
  <script defer src="../js/ui/modal.js"></script>
  <script src="/js/vendor/lucide.min.js"></script>

  <style>
    /* Page-local — canvas de firma con touch */
    #firmaCanvas {
      border: 2px solid var(--border-default);
      border-radius: var(--radius-md);
      width: 100%; height: 200px;
      touch-action: none;
      background: #fff;
      display: block;
    }
  </style>
</head>
<body>

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="pen-tool"></i> Firma de Entrega',
      back: { label: '<i data-lucide="arrow-left"></i> Volver', href: 'index.html' },
      showHome: false, showLogout: true
    });
  </script>

  <div class="app-wrap app-wrap--narrow">

    <!-- Info de la orden -->
    <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-3); font-size:13px;">
        <div><span style="color:var(--fg-3);">Cliente:</span> <strong id="ordenCliente">—</strong></div>
        <div><span style="color:var(--fg-3);">Tipo:</span> <strong id="ordenTipo">—</strong></div>
        <div><span style="color:var(--fg-3);">Técnico:</span> <strong id="ordenTecnico">—</strong></div>
        <div><span style="color:var(--fg-3);">Estado:</span> <strong id="ordenEstado">—</strong></div>
        <div style="grid-column:1/-1;"><span style="color:var(--fg-3);">Cantidad de radios:</span> <strong id="ordenRadios">0</strong></div>
      </div>
    </div>

    <!-- Email del cliente -->
    <div class="form-section-header">
      <h3><i data-lucide="mail"></i> Email del cliente</h3>
    </div>
    <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
      <div class="form-field">
        <label class="form-label" for="clienteEmail">Email</label>
        <div class="form-input-wrap">
          <span class="form-input-prefix"><i data-lucide="mail" style="width:15px;height:15px;"></i></span>
          <input class="form-input" type="email" id="clienteEmail" placeholder="correo@ejemplo.com">
        </div>
      </div>
    </div>

    <!-- Identificación -->
    <div class="form-section-header">
      <h3><i data-lucide="credit-card"></i> Identificación</h3>
    </div>
    <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
      <input type="file" id="fotoIdentificacion" accept="image/*" capture="environment" style="display:none">
      <button type="button" class="btn btn-secondary" onclick="document.getElementById('fotoIdentificacion').click()">
        <i data-lucide="camera"></i> Tomar foto de la identificación
      </button>
      <p id="previewId" class="form-hint" style="margin-top:var(--sp-2);">Aún no se ha tomado foto</p>
    </div>

    <!-- Fecha de entrega (oculta hasta que JS la habilite) -->
    <div id="fechaEntregaSection" style="display:none">
      <div class="form-section-header">
        <h3><i data-lucide="calendar"></i> Fecha de entrega</h3>
      </div>
      <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
        <div class="form-field">
          <label class="form-label" for="fechaEntrega">Fecha</label>
          <input class="form-input" type="date" id="fechaEntrega">
        </div>
      </div>
    </div>

    <!-- Canvas de firma -->
    <div class="form-section-header">
      <h3><i data-lucide="pen-tool"></i> Firma del cliente</h3>
    </div>
    <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
      <canvas id="firmaCanvas"></canvas>

      <div class="form-actions" style="justify-content:center; margin-top:var(--sp-3);">
        <button class="btn btn-secondary" onclick="limpiarFirma()"><i data-lucide="eraser"></i> Limpiar</button>
        <button class="btn btn-primary btn-lg" onclick="guardarFirma()"><i data-lucide="check"></i> Confirmar</button>
        <button class="btn btn-danger-ghost" onclick="window.location.href='index.html'"><i data-lucide="x"></i> Cancelar</button>
      </div>
    </div>

    <p id="mensaje" class="resumen" style="text-align:center; margin-top:var(--sp-3);"></p>

  </div>

  <script src="../js/pages/firmar-entrega.js" defer></script>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
