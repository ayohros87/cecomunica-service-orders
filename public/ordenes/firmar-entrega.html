<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Firma de Entrega - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-storage-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/mailService.js"></script>
  <script src="../js/services/ordenesService.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/services/clientesService.js"></script>
  <script src="../js/ui/toast.js"></script>
  <script src="../js/ui/modal.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    body { margin:0; padding:0; font-family: system-ui, sans-serif; background:#f9fafb; }
    .card { max-width:600px; margin:0 auto; padding:16px; background:#fff; border-radius:var(--radius-lg); }
    canvas { border:2px solid #ccc; border-radius:8px; width:100%; height:200px; touch-action:none; background:#fff; }
    .toolbar { display:flex; gap:8px; margin-top:12px; justify-content:space-between; }
    .btn { flex:1; font-size:18px; padding:12px; }
    h2 { font-size:20px; margin-bottom:12px; text-align:center; }
    .info { margin-bottom:16px; font-size:16px; }
  </style>
</head>
<body>
  <div class="card form">
  <h2 class="form-title center"><i data-lucide="pen-tool"></i> Firma de Entrega</h2>
<div id="infoOrden" class="resumen">
  <p><strong>Cliente:</strong> <span id="ordenCliente">—</span></p>
  <p><strong>Tipo:</strong> <span id="ordenTipo">—</span></p>
  <p><strong>Técnico:</strong> <span id="ordenTecnico">—</span></p>
  <p><strong>Estado:</strong> <span id="ordenEstado">—</span></p>
  <p><strong>Cantidad de Radios:</strong> <span id="ordenRadios">0</span></p>
</div>


<div class="section form">
  <h3 class="form-title"><i data-lucide="mail"></i> Email del cliente</h3>
  <div class="form-field">
    <input type="email" id="clienteEmail" class="form-input" placeholder="correo@ejemplo.com">
  </div>
</div>

<div class="section form">
  <h3 class="form-title"><i data-lucide="credit-card"></i> Identificación</h3>
  <input type="file" id="fotoIdentificacion" accept="image/*" capture="environment" style="display:none">
  <button type="button" class="btn btn-secondary" onclick="document.getElementById('fotoIdentificacion').click()">
    <i data-lucide="camera"></i> Tomar foto de la identificación
  </button>
  <p id="previewId" class="form-hint">Aún no se ha tomado foto</p>
</div>

<div class="section form" id="fechaEntregaSection" style="display:none">
  <h3 class="form-title"><i data-lucide="calendar"></i> Fecha de Entrega</h3>
  <div class="form-field">
    <input type="date" id="fechaEntrega" class="form-input">
  </div>
</div>

  <canvas id="firmaCanvas" class="firma-canvas"></canvas>

  <div class="form-actions center">
    <button class="btn btn-secondary btn-lg" onclick="limpiarFirma()"><i data-lucide="eraser"></i> Limpiar</button>
    <button class="btn btn-primary btn-lg" onclick="guardarFirma()"><i data-lucide="check"></i> Confirmar</button>
    <button class="btn btn-danger" onclick="window.location.href='index.html'"><i data-lucide="x"></i> Cancelar</button>
  </div>

  <p id="mensaje" class="resumen center" style="margin-top:12px;"></p>
</div>

  <script src="../js/pages/firmar-entrega.js" defer></script>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
