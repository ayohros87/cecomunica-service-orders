<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Modelos de Radio - Cecomunica</title>
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <style>
    .form-section, .list-section { max-width: 600px; margin: 20px auto; }
    ul { list-style: none; padding: 0; }
    li {
      background: #f9f9f9;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .actions { display: flex; gap: 6px; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/services/modelosService.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    function cerrarSesion() {
      firebase.auth().signOut().then(() => { window.location.href = "login.html"; });
    }

    firebase.auth().onAuthStateChanged(async function(user) {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      try {
        const doc = await UsuariosService.getUsuario(user.uid);
        if (!doc || doc.rol !== "administrador") {
          window.location.href = "index.html";
        }
      } catch (error) {
        console.error("Error al verificar rol:", error);
        window.location.href = "index.html";
      }
    });

    document.addEventListener("DOMContentLoaded", async () => {
      const lista = document.getElementById("lista-modelos");
      const form = document.getElementById("form-modelo");
      let editandoId = null;

      async function cargarModelos() {
        lista.innerHTML = "";
        const modelos = await ModelosService.getModelos();
        modelos.sort((a, b) => (a.modelo || "").localeCompare(b.modelo || ""));
        modelos.forEach(m => {
          const li = document.createElement("li");
          li.innerHTML = `
            <span><strong>${m.modelo}</strong> - ${m.marca || ''} / ${m.tipo || ''} / ${m.estado || ''}</span>
            <div class="actions">
              <button class="btn sm" onclick="editarModelo('${m.id}')"><i data-lucide="pencil"></i></button>
              <button class="btn sm danger" onclick="borrarModelo('${m.id}')"><i data-lucide="trash-2"></i></button>
            </div>`;
          lista.appendChild(li);
        });
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }

      window.editarModelo = async (id) => {
        const m = await ModelosService.getModelo(id);
        if (!m) return;
        document.getElementById("nombre-modelo").value = m.modelo || "";
        document.getElementById("marca-modelo").value = m.marca || "";
        document.getElementById("tipo-modelo").value = m.tipo || "";
        document.getElementById("estado-modelo").value = m.estado || "";
        editandoId = id;
      };

      window.borrarModelo = async (id) => {
        if (!confirm("¿Eliminar modelo permanentemente?")) return;
        await ModelosService.deleteModelo(id);
        await cargarModelos();
      };

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const modelo = document.getElementById("nombre-modelo").value.trim();
        const marca = document.getElementById("marca-modelo").value.trim();
        const tipo = document.getElementById("tipo-modelo").value.trim();
        const estado = document.getElementById("estado-modelo").value.trim();
        if (!modelo) return;
        if (editandoId) {
          await ModelosService.updateModelo(editandoId, { modelo, marca, tipo, estado });
          editandoId = null;
        } else {
          await ModelosService.addModelo({ modelo, marca, tipo, estado });
        }
        form.reset();
        await cargarModelos();
      });

      await cargarModelos();
    });
  </script>
</head>
<body>
  <div id="topbar-mount"></div>
  <script>Layout.renderTopbar({ title: '<i data-lucide="radio"></i> Modelos de Radio', back: { label: '<i data-lucide="arrow-left"></i> Volver', href: 'config.html' }, showHome: false, showLogout: true });</script>

  <div class="form-section">
    <form id="form-modelo" class="card">
      <div class="form-field">
        <label for="nombre-modelo">Modelo</label>
        <input type="text" id="nombre-modelo" required placeholder="Ej. RDU2020">
      </div>
      <div class="form-field">
        <label for="marca-modelo">Marca</label>
        <input type="text" id="marca-modelo" placeholder="Ej. Motorola">
      </div>
      <div class="form-field">
        <label for="tipo-modelo">Tipo</label>
        <input type="text" id="tipo-modelo" placeholder="Ej. Portátil">
      </div>
      <div class="form-field">
        <label for="estado-modelo">Estado</label>
        <input type="text" id="estado-modelo" placeholder="Ej. Activo">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn primary"><i data-lucide="save"></i> Guardar Modelo</button>
      </div>
    </form>
  </div>

  <div class="list-section">
    <h3 class="cc-h4">Lista de Modelos</h3>
    <ul id="lista-modelos"></ul>
  </div>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
