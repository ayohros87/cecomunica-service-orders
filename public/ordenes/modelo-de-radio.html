<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Modelos de Radio - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <!-- Rediseño Command Center F5: rail lateral (híbrido). PLAN_REDISENO_COMMAND_CENTER.md -->
  <link rel="stylesheet" href="../css/ceco-rail.css?v=cc5">

  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script defer src="../js/firebase-init.js"></script>
  <script defer src="../js/services/usuariosService.js"></script>
  <script defer src="../js/services/modelosService.js"></script>
  <script src="../js/core/modulos.js"></script>
  <script src="../js/core/layout.js?v=cc5"></script>
  <script src="/js/vendor/lucide.min.js"></script>

  <script>
    function cerrarSesion() {
      firebase.auth().signOut().then(() => { window.location.href = "login.html"; });
    }

    // Los scripts de Firebase cargan con defer: registrar tras DOMContentLoaded.
    document.addEventListener('DOMContentLoaded', () => {
    firebase.auth().onAuthStateChanged(async function(user) {
      if (!user) { window.location.href = "login.html"; return; }
      try {
        const doc = await UsuariosService.getUsuario(user.uid);
        if (!doc || doc.rol !== "administrador") { window.location.href = "index.html"; }
      } catch (error) {
        console.error("Error al verificar rol:", error);
        window.location.href = "index.html";
      }
    });
    });

    document.addEventListener("DOMContentLoaded", async () => {
      const lista = document.getElementById("lista-modelos");
      const form = document.getElementById("form-modelo");
      let editandoId = null;

      async function cargarModelos() {
        lista.innerHTML = "";
        const modelos = await ModelosService.getModelos();
        if (!modelos || modelos.length === 0) {
          lista.innerHTML = `
            <div class="empty-state-hint">
              <div class="empty-state-hint-icon"><i data-lucide="radio"></i></div>
              <p class="title">Sin modelos registrados</p>
              <p class="hint">Agrega el primer modelo con el formulario de arriba.</p>
            </div>`;
          if (typeof lucide !== 'undefined') lucide.createIcons();
          return;
        }
        modelos.sort((a, b) => (a.modelo || "").localeCompare(b.modelo || ""));
        modelos.forEach(m => {
          const item = document.createElement("div");
          item.className = "crud-list-item";
          item.innerHTML = `
            <span class="crud-list-item-handle"><i data-lucide="radio"></i></span>
            <span class="crud-list-item-label"><strong>${m.modelo}</strong> <span style="color:var(--fg-3); font-weight:400;">— ${m.marca || ''} / ${m.tipo || ''} / ${m.estado || ''}</span></span>
            <div class="crud-list-item-actions">
              <button class="btn btn-ghost btn-icon btn-sm" onclick="editarModelo('${m.id}')" aria-label="Editar"><i data-lucide="pencil"></i></button>
              <button class="btn btn-ghost btn-icon btn-sm" onclick="borrarModelo('${m.id}')" aria-label="Eliminar"><i data-lucide="trash-2"></i></button>
            </div>`;
          lista.appendChild(item);
        });
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }

      window.editarModelo = async (id) => {
        const m = await ModelosService.getModelo(id);
        if (!m) return;
        document.getElementById("nombre-modelo").value = m.modelo || "";
        document.getElementById("marca-modelo").value = m.marca || "";
        document.getElementById("tipo-modelo").value = m.tipo || "";
        document.getElementById("estado-modelo").value = m.estado || "";
        editandoId = id;
        document.getElementById("nombre-modelo").focus();
      };

      window.borrarModelo = async (id) => {
        if (!confirm("¿Eliminar modelo permanentemente?")) return;
        await ModelosService.deleteModelo(id);
        await cargarModelos();
      };

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const modelo = document.getElementById("nombre-modelo").value.trim();
        const marca = document.getElementById("marca-modelo").value.trim();
        const tipo = document.getElementById("tipo-modelo").value.trim();
        const estado = document.getElementById("estado-modelo").value.trim();
        if (!modelo) return;
        if (editandoId) {
          await ModelosService.updateModelo(editandoId, { modelo, marca, tipo, estado });
          editandoId = null;
        } else {
          await ModelosService.addModelo({ modelo, marca, tipo, estado });
        }
        form.reset();
        await cargarModelos();
      });

      await cargarModelos();
    });
  </script>
</head>
<body>
  <div class="cc-app">
  <div id="rail-mount"></div>
  <div class="cc-work">

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="radio"></i> Modelos de Radio',
      back: { label: '<i data-lucide="arrow-left"></i> Volver', href: 'config.html' },
      showHome: false, showLogout: true
    });
  </script>

  <div class="app-wrap app-wrap--default">

    <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
      <form id="form-modelo">
        <div class="form-grid-2">
          <div class="form-field">
            <label class="form-label" for="nombre-modelo">Modelo <span class="req">*</span></label>
            <input class="form-input" type="text" id="nombre-modelo" required placeholder="Ej. RDU2020">
          </div>
          <div class="form-field">
            <label class="form-label" for="marca-modelo">Marca</label>
            <input class="form-input" type="text" id="marca-modelo" placeholder="Ej. Motorola">
          </div>
          <div class="form-field">
            <label class="form-label" for="tipo-modelo">Tipo</label>
            <input class="form-input" type="text" id="tipo-modelo" placeholder="Ej. Portátil">
          </div>
          <div class="form-field">
            <label class="form-label" for="estado-modelo">Estado</label>
            <input class="form-input" type="text" id="estado-modelo" placeholder="Ej. Activo">
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary"><i data-lucide="save"></i> Guardar modelo</button>
        </div>
      </form>
    </div>

    <p class="form-section-title" style="margin-bottom:var(--sp-3);"><i data-lucide="list"></i> Modelos registrados</p>
    <div id="lista-modelos" class="crud-list"></div>
  </div>

  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
  </div> <!-- /cc-work -->
  </div> <!-- /cc-app -->
  <script>
    // Rail Command Center (F5) — espera auth (scripts defer) y pinta el rail del rol efectivo.
    document.addEventListener('DOMContentLoaded', () => Layout.initRail('ordenes'));
  </script>
</body>
</html>
