<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Reporte de Órdenes Pendientes - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <style>
    /* Page-local — layout para impresión */
    body { background: var(--surface-page); }
    .reporte-wrap { max-width: 1100px; margin: 20px auto; padding: 0 var(--sp-5); }
    .reporte-toolbar { display: flex; gap: var(--sp-2); margin-bottom: var(--sp-4); }
    .reporte-print {
      background: var(--surface-card);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      padding: var(--sp-5);
    }
    .reporte-print table {
      width: 100%; border-collapse: collapse; margin-top: var(--sp-3); font-size: 13px;
    }
    .reporte-print th, .reporte-print td {
      border: 1px solid var(--border-default); padding: 6px 10px; text-align: center;
    }
    .reporte-print th { background: var(--surface-sunken); font-weight: 600; }

    @media print {
      body { background: white; }
      .reporte-toolbar { display: none !important; }
      .reporte-print { box-shadow: none; padding: 0; }
    }
  </style>

  <!-- Firebase -->
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script defer src="../js/firebase-init.js"></script>
  <script defer src="../js/services/ordenesService.js"></script>
  <script src="/js/vendor/lucide.min.js"></script>
</head>
<body>

  <div class="reporte-wrap">

    <div class="reporte-toolbar">
      <h2 style="margin:0; font-family:var(--font-display); flex:1;"><i data-lucide="clock"></i> Reporte de Órdenes Pendientes</h2>
      <button class="btn btn-primary" onclick="window.print()"><i data-lucide="printer"></i> Imprimir</button>
      <button class="btn btn-ghost" onclick="window.close()"><i data-lucide="x"></i> Cerrar</button>
    </div>

    <div id="mensaje" style="margin-bottom:var(--sp-3); font-weight:600;"></div>

    <div class="reporte-print">
      <div id="tablaReporte"></div>
    </div>

  </div>

  <script>
    const tablaDiv = document.getElementById("tablaReporte");
    const mensajeDiv = document.getElementById("mensaje");

    // Los scripts de Firebase cargan con defer: registrar tras DOMContentLoaded.
    document.addEventListener('DOMContentLoaded', () => {
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {
        mensajeDiv.style.color = "var(--status-critical)";
        mensajeDiv.textContent = "Debe iniciar sesión para ver este reporte.";
        return;
      }
      generarReporte();
    });
    });

    async function generarReporte() {
      mensajeDiv.textContent = "Cargando datos…";
      tablaDiv.innerHTML = "";

      try {
        const ordenes = await OrdenesService.filterByStatuses(["POR ASIGNAR", "ASIGNADO"]);

        if (!ordenes.length) {
          mensajeDiv.textContent = "No hay órdenes pendientes.";
          return;
        }

        let tabla = `
          <table>
            <thead>
            <tr>
              <th>N° Orden</th>
              <th>Cliente</th>
              <th>Tipo de servicio</th>
              <th>Estado</th>
              <th>Fecha entrada</th>
              <th>Cant. radios</th>
              <th>Vendedor</th>
            </tr>
            </thead>
            <tbody>
        `;

        let totalRadios = 0;

        for (const data of ordenes) {
          let nombreCliente = data.cliente_nombre || data.cliente || "No disponible";
          let vendedor = data.vendedor_email || "No disponible";

          const equipos = (data.equipos || []).filter(e => !e.eliminado);
          const cantidadRadios = equipos.length;
          totalRadios += cantidadRadios;

          tabla += `
            <tr>
              <td>${data.ordenId}</td>
              <td>${nombreCliente}</td>
              <td>${data.tipo_de_servicio || "-"}</td>
              <td>${data.estado_reparacion || "-"}</td>
              <td>${data.fecha_entrada || "-"}</td>
              <td>${cantidadRadios}</td>
              <td>${vendedor}</td>
            </tr>
          `;
        }

        tabla += `
          <tr>
            <td colspan="5" style="text-align:right; font-weight:700;">TOTAL</td>
            <td style="font-weight:700;">${totalRadios}</td>
            <td></td>
          </tr>
        `;

        tabla += "</tbody></table>";
        tablaDiv.innerHTML = tabla;
        mensajeDiv.textContent = "";

      } catch (e) {
        console.error("Error generando reporte:", e);
        mensajeDiv.style.color = "var(--status-critical)";
        mensajeDiv.textContent = "Error al generar reporte.";
      }
    }
  </script>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
