<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Progreso de Técnicos – Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <!-- Estilos base -->
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/services/usuariosService.js"></script>

  <style>
    .subtle { color: var(--muted); font-size: 12px; }
    .chip-periodo { padding:.25rem .5rem; border-radius: 999px; background: var(--chip); font-size: 12px; }
/* === Tabla centrada completamente === */
.tbl {
  width: 100%;
  border-collapse: collapse;
}

.tbl thead th {
  text-align: center;
  padding: 10px 8px;
  border-bottom: 1px solid var(--line);
  background: #f9fafb;
}

.tbl tbody td {
  text-align: center;
  padding: 8px;
  border-bottom: 1px solid #f1f5f9;
  vertical-align: middle;
}

.tbl tbody tr:hover {
  background: #f9fafb;
}

/* Centrar texto de la columna Técnico */
.tbl tbody td:nth-child(2) {
  text-align: center;
}

.tbl tbody td:nth-child(2) span {
  display: block;
}

/* Medalla y número alineados correctamente */
.rank-medal {
  font-size: 18px;
  vertical-align: middle;
  margin-right: 4px;
}

/* Encabezados uniformes */
.tbl thead th,
.tbl tbody td {
  min-width: 100px;
}


    .pill-ok { background:#bbf7d0; padding:.15rem .5rem; border-radius: 999px; font-weight:600; }
    .pill-warn { background:#fde68a; padding:.15rem .5rem; border-radius: 999px; font-weight:600; }
    .legend { display:flex; gap:8px; align-items:center; font-size: 12px; color:var(--muted); }
    .dot-green { width:8px; height:8px; background:#22c55e; border-radius:999px; display:inline-block }
    .dot-yellow{ width:8px; height:8px; background:#f59e0b; border-radius:999px; display:inline-block }
    .banner { background:#eef2ff; padding:10px 12px; border-radius:12px; margin:8px 0; }
    .self-stats { display:flex; gap:8px; flex-wrap:wrap; }
    .self-card { background:var(--card); padding:10px 12px; border-radius:12px; box-shadow: var(--shadow); }
    .nowrap { white-space: nowrap; }
  </style>
</head>
<body>
  <h2 style="margin:8px 0;">📊 Progreso de Técnicos</h2>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="left">
      <input id="buscarNombre" type="text" placeholder="Buscar técnico por nombre o correo" style="min-width:260px;">
      <button class="btn primary" id="btnBuscar">🔍 Buscar</button>
      <button class="btn secondary" id="btnLimpiar">❌ Limpiar</button>
    </div>
    <div class="right">
      <label class="subtle">Periodo:</label>
      <select id="selPeriodo">
        <option value="mensual" selected>Mensual</option>
        <option value="semanal">Semanal</option>
        <option value="total">Total histórico</option>
      </select>
      <button class="btn" id="btnRefrescar">↻ Refrescar</button>
      <button class="btn" onclick="window.location.href='index.html'">📋 Ir a Órdenes</button>
      <button class="btn" onclick="window.location.href='../index.html'">🏠 Menú</button>
    </div>
  </div>

  <div class="banner">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;">
      <div class="legend">
        <span class="chip-periodo" id="chipPeriodo">Periodo: Mensual</span>
        <span><span class="dot-green"></span> Top 3</span>
        <span><span class="dot-yellow"></span> En progreso</span>
      </div>
      <div class="subtle" id="stamp"></div>
    </div>
  </div>

  <!-- Tus propias estadísticas (si es técnico) -->
  <div id="misStatsWrap" class="self-stats" style="display:none; margin-top:12px;">
    <div class="self-card"><strong>Mi Semanal:</strong> <span id="miSemanal">0</span></div>
    <div class="self-card"><strong>Mi Mensual:</strong> <span id="miMensual">0</span></div>
    <div class="self-card"><strong>Mi Total:</strong> <span id="miTotal">0</span></div>
  </div>

  <!-- Tabla ranking -->
  <div class="table-wrap mt-12">
    <table class="tbl" style="width:100%;">
      <thead>
        <tr>
          <th>#</th>
          <th>Técnico</th>
          <th class="nowrap">Semanal</th>
          <th class="nowrap">Mensual</th>
          <th class="nowrap">Total</th>
          <th class="nowrap">Estado Actual</th>
        </tr>
      </thead>
      <tbody id="tbodyRanking"></tbody>
    </table>
  </div>

  <script src="../js/pages/progreso-tecnicos.js" defer></script>
</body>
</html>
