<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Nueva Orden - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <!-- Rediseño Command Center F5: rail lateral (híbrido). PLAN_REDISENO_COMMAND_CENTER.md -->
  <link rel="stylesheet" href="../css/ceco-rail.css?v=cc5">

  <!-- Firebase Compat Scripts -->
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script defer src="../js/firebase-init.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script src="../js/core/auth.js"></script>
  <script defer src="../js/services/contratosService.js"></script>
  <script defer src="../js/services/mailService.js"></script>
  <script defer src="../js/services/clientesService.js"></script>
  <script defer src="../js/services/usuariosService.js"></script>
  <script defer src="../js/services/empresaService.js"></script>
  <script defer src="../js/services/ordenesService.js"></script>
  <script defer src="../js/ui/toast.js"></script>
  <script defer src="../js/ui/modal.js"></script>
  <script src="../js/core/modulos.js"></script>
  <script src="../js/core/layout.js?v=cc5"></script>
  <script src="/js/vendor/lucide.min.js"></script>

  <script>
    function cerrarSesion() {
      firebase.auth().signOut().then(() => { window.location.href = "login.html"; });
    }
  </script>

  <style>
    /* Page-local — el resto vive en el kit */

    /* Bloque condicional de contrato (highlight) */
    .contrato-block {
      background: var(--accent-soft);
      border: 1px solid var(--accent-line);
      border-radius: var(--radius-md);
      padding: var(--sp-3) var(--sp-4);
      margin-top: var(--sp-2);
    }
    .contrato-hint {
      font-size: 12px; color: var(--navy);
      margin-bottom: var(--sp-2);
      display: flex; align-items: center; gap: 6px;
    }
  </style>
</head>
<body>
  <div class="cc-app">
  <div id="rail-mount"></div>
  <div class="cc-work">

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="clipboard"></i> Nueva Orden de Servicio',
      back: { label: '<i data-lucide="arrow-left"></i> Volver', href: 'index.html' },
      showHome: false, showLogout: true
    });
  </script>

  <div class="app-wrap app-wrap--default">

    <div class="page-header-centered" style="padding-top:var(--sp-6);">
      <div class="page-header-icon"><i data-lucide="clipboard-list"></i></div>
      <h1>Nueva Orden de Servicio</h1>
      <p>Complete los datos para generar una nueva orden en el sistema.</p>
    </div>

    <form id="ordenForm">

      <!-- Información General -->
      <div class="form-section-header">
        <h3><i data-lucide="file-text"></i> Información General</h3>
      </div>
      <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
        <div class="form-grid-2">

          <div class="form-field">
            <label class="form-label" for="numero">Número de orden <span class="req">*</span></label>
            <input class="form-input" type="text" id="numero" readonly style="font-family:var(--font-mono);">
          </div>

          <div class="form-field" style="grid-column:1/-1">
            <label class="form-label" for="cliente">Cliente <span class="req">*</span></label>
            <div style="display:flex; gap:var(--sp-2);">
              <select class="form-select" id="cliente" required style="flex:1;">
                <option value="">Seleccione un cliente</option>
              </select>
              <button type="button" id="crearCliente" class="btn btn-secondary btn-icon" aria-label="Crear cliente"><i data-lucide="plus"></i></button>
            </div>
          </div>

          <div class="form-field">
            <label class="form-label" for="vendedor">Vendedor <span class="req">*</span></label>
            <select class="form-select" id="vendedor" required>
              <option value="">Seleccione vendedor</option>
            </select>
          </div>

          <div class="form-field">
            <label class="form-label" for="tipo">Tipo de servicio <span class="req">*</span></label>
            <select class="form-select" id="tipo" required>
              <option value="">Seleccione tipo de servicio</option>
            </select>
          </div>

          <!-- Bloque de Contrato (solo para PROGRAMACIÓN) -->
          <div id="contratoBlock" class="contrato-block" style="display: none; grid-column: 1 / -1;">
            <div class="contrato-hint">
              <i data-lucide="info" style="width:14px;height:14px;"></i>
              <span><strong>Obligatorio para PROGRAMACIÓN.</strong> Marque "No aplica" solo si corresponde.</span>
            </div>

            <div class="form-field">
              <label class="form-label" id="contratoLabel" for="contratoSelect">Contrato <span class="req">*</span></label>
              <select class="form-select" id="contratoSelect" required>
                <option value="">Seleccione contrato</option>
              </select>
            </div>

            <label class="form-check" style="margin-top:var(--sp-2);">
              <input type="checkbox" id="contratoNoAplica">
              <span><span class="form-check-label">No aplica contrato</span></span>
            </label>

            <div class="form-field" id="contratoMotivoField" style="display: none; margin-top:var(--sp-2);">
              <label class="form-label" for="contratoMotivo">Motivo (no aplica) <span class="req">*</span></label>
              <textarea class="form-input form-textarea" id="contratoMotivo" rows="3" placeholder="Explique por qué no aplica contrato…"></textarea>
            </div>
          </div>

        </div>
      </div>

      <!-- Observaciones -->
      <div class="form-section-header">
        <h3><i data-lucide="file-text"></i> Observaciones</h3>
      </div>
      <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
        <div class="form-field">
          <label class="form-label" for="observaciones"># Contrato / Observaciones</label>
          <textarea class="form-input form-textarea" id="observaciones" rows="4"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-lg"><i data-lucide="save"></i> Guardar orden</button>
        <button type="button" class="btn btn-ghost" onclick="window.location.href='index.html'"><i data-lucide="arrow-left"></i> Cancelar</button>
      </div>

    </form>

    <p id="mensaje" class="resumen"></p>

  </div>

  <script src="../js/pages/nueva-orden.js" defer></script>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
  </div> <!-- /cc-work -->
  </div> <!-- /cc-app -->
  <script>
    // Rail Command Center (F5) — espera auth (scripts defer) y pinta el rail del rol efectivo.
    document.addEventListener('DOMContentLoaded', () => Layout.initRail('ordenes'));
  </script>
</body>
</html>
