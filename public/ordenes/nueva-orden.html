<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nueva Orden - Cecomunica</title>
 <link rel="stylesheet" href="../css/ceco-ui.css">
  <!-- Firebase Compat Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../js/services/contratosService.js"></script>
  <script src="../js/services/mailService.js"></script>
  <script src="../js/services/clientesService.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/services/empresaService.js"></script>
  <script src="../js/services/ordenesService.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
      padding: 24px;
      min-height: 100vh;
    }
    
    .page-header {
      max-width: 900px;
      margin: 0 auto 32px auto;
      text-align: center;
    }
    
    .page-header h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 8px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    
    .page-header p {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }
    
    .form-container {
      max-width: 900px;
      margin: 0 auto;
    }
    
    #ordenForm {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    
    .section.form {
      padding: 32px;
      border-bottom: 2px solid var(--line);
      transition: background 0.2s;
    }
    
    .section.form:hover {
      background: #fafbfc;
    }
    
    .section.form:last-of-type {
      border-bottom: none;
    }
    
    .form-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 24px 0;
      padding-bottom: 12px;
      border-bottom: 3px solid var(--brand);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .form-field label {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .form-field input,
    .form-field select,
    .form-field textarea {
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      transition: all 0.2s;
      background: white;
    }
    
    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      outline: none;
    }
    
    .form-field input[readonly] {
      background: #f3f4f6;
      color: var(--muted);
      cursor: not-allowed;
    }
    
    .input-row {
      display: flex;
      gap: 8px;
    }
    
    .input-row select {
      flex: 1;
    }
    
    .btn-pill {
      width: 44px;
      height: 44px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border-radius: 8px;
    }
    
    .form-actions {
      padding: 24px 32px;
      background: #f8fafc;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      border-top: 2px solid var(--line);
    }
    
    .form-actions .btn {
      font-size: 15px;
      padding: 12px 24px;
      font-weight: 600;
    }
    
    .contrato-block {
      background: #eff6ff;
      border: 2px solid #93c5fd;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }
    
    .contrato-hint {
      font-size: 12px;
      color: #1e40af;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 12px 0;
    }
    
    .checkbox-field input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    
    .checkbox-field label {
      margin: 0;
      cursor: pointer;
      font-weight: 500;
    }
    
    #mensaje {
      max-width: 900px;
      margin: 20px auto;
      padding: 16px 24px;
      border-radius: 12px;
      font-weight: 600;
      text-align: center;
      display: none;
    }
    
    #mensaje:not(:empty) {
      display: block;
    }
    
    .form-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    @media (max-width: 768px) {
      body {
        padding: 12px;
      }
      
      .page-header h1 {
        font-size: 24px;
      }
      
      .section.form {
        padding: 20px;
      }
      
      /* Enhanced mobile form fields */
      .form-field {
        margin-bottom: 20px;
      }
      
      .form-field input,
      .form-field select,
      .form-field textarea {
        min-height: 44px;
        font-size: 16px;
        padding: 14px;
        width: 100%;
        box-sizing: border-box;
      }
      
      .form-field textarea {
        min-height: 100px;
      }
      
      .form-field label {
        font-size: 14px;
        margin-bottom: 10px;
      }
      
      /* Input rows stack on mobile */
      .input-row {
        flex-direction: column;
        gap: 12px;
      }
      
      .btn-pill {
        width: 48px;
        height: 48px;
        font-size: 22px;
      }
      
      /* Mobile actions */
      .form-actions {
        padding: 16px 20px;
        flex-direction: column-reverse;
        gap: 10px;
      }
      
      .form-actions .btn {
        width: 100%;
        min-height: 48px;
        font-size: 16px;
        padding: 14px 24px;
      }
      
      /* Checkbox larger tap target */
      .checkbox-field input[type="checkbox"] {
        width: 22px;
        height: 22px;
      }
      
      .checkbox-field label {
        font-size: 15px;
      }
      
      /* Contrato block spacing */
      .contrato-block {
        padding: 14px;
        margin-top: 12px;
      }
      
      /* Form title */
      .form-title {
        font-size: 16px;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1><span style="font-size: 36px;">📋</span> Crear Nueva Orden de Servicio</h1>
    <p>Complete los datos para generar una nueva orden en el sistema</p>
  </div>
  
  <div class="form-container">

  <form id="ordenForm" class="card form">
  <div class="section form">
    <h3 class="form-title">🧾 Información General</h3>
    <div class="form-grid cols-2">
      <div class="form-field">
        <label class="req">Número de Orden</label>
        <input type="text" id="numero" readonly>
      </div>

      <div class="form-field" style="grid-column:1/-1">
        <label class="req">Cliente</label>
        <div class="input-row">
          <select id="cliente" required>
            <option value="">Seleccione un cliente</option>
          </select>
          <button type="button" id="crearCliente" class="btn btn-pill fit">➕</button>
        </div>
      </div>

<div class="form-field">
  <label class="req">Vendedor</label>
  <select id="vendedor" required>
    <option value="">Seleccione vendedor</option>
  </select>
</div>

      <div class="form-field">
        <label class="req">Tipo de Servicio</label>
        <select id="tipo" required>
          <option value="">Seleccione tipo de servicio</option>
        </select>
      </div>

      <!-- Bloque de Contrato (solo para PROGRAMACION) -->
      <div id="contratoBlock" class="contrato-block" style="display: none; grid-column: 1 / -1;">
        <div class="contrato-hint">
          <span>ℹ️</span>
          <span><strong>Obligatorio para PROGRAMACIÓN.</strong> Marque "No aplica" solo si corresponde.</span>
        </div>
        
        <div class="form-field">
          <label id="contratoLabel" class="req">Contrato</label>
          <select id="contratoSelect" required>
            <option value="">Seleccione contrato</option>
          </select>
        </div>
        
        <div class="checkbox-field">
          <input type="checkbox" id="contratoNoAplica">
          <label for="contratoNoAplica">No aplica contrato</label>
        </div>
        
        <div class="form-field" id="contratoMotivoField" style="display: none;">
          <label class="req">Motivo (No aplica)</label>
          <textarea id="contratoMotivo" rows="3" placeholder="Explique por qué no aplica contrato..."></textarea>
        </div>
      </div>

    </div>
  </div>

  <div class="section form">
    <h3 class="form-title">📝 Observaciones</h3>
    <div class="form-field">
      <label># Contrato / Observaciones</label>
      <textarea id="observaciones" rows="4"></textarea>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn primary">💾 Guardar Orden</button>
    <button type="button" class="btn" onclick="window.location.href='index.html'">⬅️ Cancelar y volver</button>
  </div>

  </form>
  
  <p id="mensaje" class="resumen"></p>
  </div>

  <script src="../js/pages/nueva-orden.js" defer></script>
</body>
</html>
