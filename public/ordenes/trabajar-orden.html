<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Trabajar Orden – Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <link rel="stylesheet" href="../css/ceco-ui.css">



  <!-- XLSX para exportación (sin integrity para evitar bloqueos) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    /* ===== UI base ===== */
    body{ background:#f7f7fb; padding-bottom:76px; } /* espacio para resumen fijo */
    .toolbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center }
    .between{ justify-content:space-between }
    .muted{ color:#6b7280 }
    .chip{ display:inline-block; padding:2px 8px; border:1px solid var(--line); border-radius:999px; font-size:12px; background:#fff }

    /* ===== Encabezado y acciones ===== */
    .header-card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px; margin:8px 0; box-shadow: var(--shadow); }
    .estado-chip{ font-weight:600 }
    .estado-sin{ background:#eef2ff; border-color:#c7d2fe }
    .estado-prog{ background:#fff7ed; border-color:#fed7aa }
    .estado-ok{ background:#dcfce7; border-color:#86efac }

    /* ===== Fila equipo / acordeón ===== */
    .fila-equipo{ border:1px solid var(--line); border-radius:12px; padding:0; margin:10px 0; background:#fff; overflow:hidden }
    .fila-equipo .hdr{ display:flex; justify-content:space-between; align-items:center; padding:12px 12px }
    .fila-equipo .hdr .titulo{ font-weight:600 }
    .fila-equipo .body{ padding:12px; display:block }
    .toggle{ cursor:pointer; border:none; background:transparent; font-size:14px }

    .consumos table{ width:100%; border-collapse:collapse; margin-top:8px; background:#fff }
    .consumos th,.consumos td{ border:1px solid var(--line); padding:6px; text-align:left }
    .total-mini{ font-weight:700; text-align:right; margin-top:6px }

    .badge-tipo{ padding:2px 6px; border-radius:999px; font-size:12px; border:1px solid var(--line) }
    .badge-tipo.cobro{ background:#ecfeff }
    .badge-tipo.garantia{ background:#f0f9ff }
    .badge-tipo.interno{ background:#fff7ed }

    /* ===== Modales ===== */
    .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.35); display:none; align-items:center; justify-content:center; z-index:50 }
    .modal{ background:#fff; padding:16px; border-radius:12px; min-width:320px; max-width:540px; border:1px solid var(--line) }
    .form-field{ display:flex; flex-direction:column; margin:10px 0 }
    .ayuda{ font-size:12px; color:#6b7280 }

    /* Modo lectura (bloqueo) */
    .solo-lectura .sel-tipo,
    .solo-lectura .inp-qty,
    .solo-lectura .inp-nota,
    .solo-lectura .inp-archivo { pointer-events:none; opacity:.6 }
    .solo-lectura button[data-role="agregar-pieza"],
    .solo-lectura button[data-action="eliminar-linea"],
    .solo-lectura button[data-action="editar-precio"]{ display:none }
    .solo-lectura button[onclick^="abrirModal"]{ display:none }

    /* ===== Resumen fijo inferior ===== */
    #resumenWrap{
      position:fixed; left:0; right:0; bottom:0;
      background:#ffffff; border-top:1px solid var(--line);
      padding:8px 14px; z-index:60; display:flex; justify-content:space-between; align-items:center;
    }

    /* Toast guardado */
    #toast{ position:fixed; right:12px; bottom:88px; background:#111; color:#fff; padding:8px 10px; border-radius:8px; font-size:12px; opacity:0; transform:translateY(10px); transition:all .25s; z-index:70 }
    #toast.show{ opacity:1; transform:translateY(0) }
    /* --- Mejora visual de formularios en modales --- */
.form-grid { display:grid; gap:10px; }
.form-grid.cols-2 { grid-template-columns: 1fr 1fr; }
@media (max-width: 720px){
  .form-grid.cols-2 { grid-template-columns: 1fr; }
}

.input, .modal input[type="text"], .modal input[type="number"], .modal select, .modal textarea {
  width: 100%;
  line-height: 1.2;
  font-size: 14px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  outline: none;
}

.modal .form-field label { font-size: 12px; color: #374151; margin-bottom: 6px; }
.modal .acciones .btn { min-height: 36px; }

.form-inline-3 { display:grid; grid-template-columns: 1.2fr .6fr .8fr; gap:10px; }
@media (max-width: 720px){ .form-inline-3 { grid-template-columns: 1fr; } }

.form-inline-4 { display:grid; grid-template-columns: 1.4fr .5fr .8fr .8fr; gap:10px; }
@media (max-width: 720px){ .form-inline-4 { grid-template-columns: 1fr; } }

/* Chips de sugerencias */
.recs-wrap { display:flex; gap:6px; flex-wrap:wrap; margin:8px 0 4px; }
.rec-chip { display:inline-flex; align-items:center; gap:6px; padding:4px 8px; border:1px solid var(--line); border-radius:999px; background:#fff; cursor:pointer; font-size:12px; }
.rec-chip[disabled] { opacity:.5; cursor:not-allowed; }
.rec-chip .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size:11px; opacity:.7; }
.rec-chip .price { font-weight:600; }
.rec-label { font-size:12px; color:#6b7280; margin-top:2px; }
/* --- Alinear correctamente las áreas de texto con los labels --- */
.inp-nota {
  width: 100%;
  min-height: 80px;
  font-size: 14px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  vertical-align: middle;
  box-sizing: border-box;
  resize: vertical;
}

label {
  display: block;
  font-weight: 600;
  color: #111827;
  margin-bottom: 6px;
  line-height: 1.2;
}
/* --- Igualar altura del dropdown a los botones --- */
.sel-filtro-tipo {
  height: 36px;
  border-radius: 8px;
  padding: 0 8px;
  font-size: 14px;
  border: 1px solid var(--line);
  background-color: #fff;
  cursor: pointer;
  vertical-align: middle;
}
.btn {
  min-height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
/* --- Mejor legibilidad de las secciones del equipo --- */
.fila-equipo {
  box-shadow: 0 1px 2px rgba(0,0,0,.05);
  transition: box-shadow .2s;
}
.fila-equipo:hover {
  box-shadow: 0 2px 6px rgba(0,0,0,.08);
}

/* --- Espacio uniforme entre secciones de texto / adjuntos --- */
.mt-8 { margin-top: 16px; }
/* --- Caja visual para notas internas / cliente --- */
.notas-box {
  background: #f9fafb; /* light gray background */
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 12px;
  margin-top: 12px;
}

/* Different subtle tones for each side */
.notas-box .col-int { background: #fefce8; border-radius: 8px; padding: 8px; }
.notas-box .col-cli { background: #ecfeff; border-radius: 8px; padding: 8px; }

@media (max-width:720px){
  .notas-box .col-int, .notas-box .col-cli { padding: 6px; }
}
label { color: #1f2937; }
/* === Alternar color en tarjetas de equipo (zebra) === */
#equiposWrap .fila-equipo { position: relative; }
#equiposWrap .fila-equipo:nth-child(odd)  { background:#ffffff; border-color:#e5e7eb; }
#equiposWrap .fila-equipo:nth-child(even) { background:#f3f9ff; border-color:#dbeafe; }

/* Franja lateral sutil (mejora reconocimiento visual) */
#equiposWrap .fila-equipo::before{
  content:""; position:absolute; inset:0 auto 0 0; width:6px; border-radius:12px 0 0 12px;
}
#equiposWrap .fila-equipo:nth-child(odd)::before  { background:#0ea5a3; } /* teal brand */
#equiposWrap .fila-equipo:nth-child(even)::before { background:#2563eb; } /* blue */

/* Tono suave en encabezado del card según par/impar */
#equiposWrap .fila-equipo:nth-child(odd) .hdr  { background:#f8fafc; }
#equiposWrap .fila-equipo:nth-child(even) .hdr { background:#eef5ff; }

/* Zebra también dentro de las tablas de consumos */
.consumos tbody tr:nth-child(even){ background:#f9fafb; }

/* Mantener contraste de la tabla aun en card azul */
#equiposWrap .fila-equipo:nth-child(even) .consumos table { background:#ffffff; }

.titulo strong:first-child {
  color: #2563eb; /* azul suave */
}
/* === Catálogo de piezas (modal) === */
.cat-wrap { border:1px solid var(--line); border-radius:12px; padding:8px; background:#fff; max-height:320px; overflow:auto; }
.cat-table table{ width:100%; border-collapse:collapse; background:#fff; }
.cat-table th, .cat-table td{ border:1px solid var(--line); padding:6px; text-align:left; font-size:12px; }
.cat-table th{ background:#f8fafc; position:sticky; top:0; z-index:1; }
.cat-table .mono{ font-family: ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size:11px; opacity:.8; }
.cat-table .right{ text-align:right; }
.cat-table .btn.sm{ font-size:12px; padding:4px 8px; }
/* === Extras catálogo: buscador y contador === */
.cat-counter{ font-size:12px; color:var(--muted); }
.cat-table em{ color:var(--muted); }

  </style>
</head>

<body>
  <h2 style="margin:8px 0;">🧰 Trabajar Orden</h2>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-storage-compat.js"></script>

  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/ordenesService.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/services/clientesService.js"></script>
  <script src="../js/services/empresaService.js"></script>
  <script src="../js/services/piezasService.js"></script>
  <script src="../js/services/mailService.js"></script>

   <div class="header-card">
    <div id="infoOrden" class="resumen"></div>

    <div class="toolbar between" style="margin-top:8px;">
      <div class="left">
        <span id="chipTrabajo" class="chip estado-chip estado-sin">SIN INICIAR</span>
        <span id="chipUsuario" class="chip" title="Usuario actual">—</span>
      </div>
      <div class="right">
        <button class="btn" title="Imprimir cotización" onclick="window.open('cotizar-orden-formal.html?id='+ordenId,'_blank')">🧾</button>
        <button class="btn" id="btnExport" title="Exportar a Excel" onclick="exportarCotizacion()">⬇️</button>
        <button class="btn ok" id="btnCompletarCot" title="Completar cotización" onclick="completarCotizacion()">✅</button>
        <button class="btn" id="btnDesbloquearCot" title="Desbloquear edición" onclick="desbloquearCotizacion()" style="display:none;">🔓</button>
        <button class="btn" title="Volver" onclick="history.back()">⬅️</button>
      </div>
    </div>
  </div>

  <div id="equiposWrap"></div>
 <!-- Resumen fijo inferior -->
  <div id="resumenWrap">
    <div><strong>Resumen (líneas a cobrar)</strong> · <span id="resumenTxt" class="muted">—</span></div>
    <div id="accionesRapidas" class="toolbar">
      <!-- lugar para acciones futuras -->
    </div>
  </div>
  
  <!-- Toast -->
  <div id="toast">💾 Guardado</div>

<!-- Modal Agregar Pieza -->
<div id="modalPieza" class="overlay">
  <div class="modal">
<h3 style="margin:0 0 8px 0;">Agregar pieza utilizada</h3>

<div class="form-field">
<label>Buscar marca / SKU / descripción / equipo</label>
<input id="buscarPieza" class="input" type="text" placeholder="Ej. Hytera, BL2009, micrófono, Radio-123">
<div id="sugerencias" class="recs-wrap"></div>
<!-- ==== Catálogo de Piezas (ver todas) ==== -->
<div class="cat-toolbar" style="display:flex; gap:8px; align-items:center; margin:6px 0; flex-wrap:wrap;">
  <button id="btnVerCatalogo" class="btn">📚 Ver catálogo</button>

  <!-- Filtros/controles, se muestran al abrir -->
  <input id="catBuscar" class="input" type="text" placeholder="Buscar en catálogo: marca, SKU, descripción o equipo" style="max-width:320px; display:none;">
  <select id="catFiltroMarca" class="input" style="max-width:220px; display:none;"></select>
  <select id="catOrden" class="input" style="max-width:200px; display:none;">
    <option value="marca">Ordenar por Marca</option>
    <option value="sku">Ordenar por SKU</option>
    <option value="precio_venta">Ordenar por Precio</option>
  </select>
  <button id="btnCatRefrescar" class="btn" style="display:none;">🔄 Refrescar catálogo</button>

  <!-- Contador -->
  <span id="catContador" class="cat-counter" style="margin-left:auto; display:none;"></span>
</div>

<div id="catalogoWrap" class="cat-wrap" style="display:none;">
  <div id="catTabla" class="cat-table"></div>
  <div class="toolbar" style="justify-content:flex-end; margin-top:6px;">
    <button id="btnCatMas" class="btn">Cargar más</button>
  </div>
</div>
</div>

<div class="form-inline-3">
  <div class="form-field">
    <label>Cantidad</label>
    <input id="qty" class="input" type="number" min="1" step="1" value="1">
  </div>
  <div class="form-field">
    <label>Tipo</label>
    <select id="tipo" class="input">
      <option value="cobro" selected>Cobrar</option>
      <option value="garantia">Garantía</option>
      <option value="interno">Uso interno</option>
    </select>
  </div>
  <div class="form-field">
    <label>&nbsp;</label>
    <div id="ayudaPieza" class="ayuda">Cantidad: 1</div>
  </div>
</div>

<div class="acciones" style="justify-content:flex-end;margin-top:8px;">
  <button class="btn" onclick="cerrarModal()">Cancelar</button>
  <button class="btn ok" onclick="confirmarAgregar()">Agregar</button>
</div>

  </div>
</div>

<!-- Modal Mano de Obra / Servicio (SEPARADO del modal de pieza) -->
<div id="modalServicio" class="overlay">
  <div class="modal">
 <h3 style="margin:0 0 8px 0;">Agregar mano de obra / servicio</h3>

<div class="form-inline-4">
  <div class="form-field">
    <label>Descripción del servicio</label>
    <input id="serv_desc" class="input" type="text" placeholder="Diagnóstico, Instalación, Configuración, etc.">
  </div>
  <div class="form-field">
    <label>Cantidad</label>
    <input id="serv_qty" class="input" type="number" min="1" step="1" value="1">
  </div>
  <div class="form-field">
    <label>Precio unitario (USD)</label>
    <input id="serv_precio" class="input" type="number" min="0" step="0.01" placeholder="Ej. 35.00">
  </div>
  <div class="form-field">
    <label>Tipo</label>
    <select id="serv_tipo" class="input">
      <option value="cobro" selected>Cobrar</option>
      <option value="garantia">Garantía</option>
      <option value="interno">Uso interno</option>
    </select>
  </div>
</div>

<div id="ayudaServicio" class="ayuda" style="margin-top:4px;">Cantidad: 1 · Precio: $0.00 · Subtotal: $0.00</div>

<div class="acciones" style="justify-content:flex-end;margin-top:8px;">
  <button class="btn" onclick="cerrarModalServicio()">Cancelar</button>
  <button class="btn ok" onclick="confirmarServicio()">Agregar</button>
</div>

  </div>
</div>
<script src="../js/domain/scoring.js"></script>
<script src="../js/ui/toast.js"></script>
<script src="../js/ui/modal.js"></script>

<script src="../js/pages/trabajar-orden.js" defer></script>

</body>
</html>
