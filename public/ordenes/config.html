<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Configuración - Cecomunica</title>
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <!-- Firebase desde CDN + configuración centralizada -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/layout.js"></script>

<script>
  firebase.auth().onAuthStateChanged(function(user) {
    if (!user) {
      window.location.href = "login.html";
    }
  });

  function cerrarSesion() {
    firebase.auth().signOut().then(() => {
      window.location.href = "login.html";
    });
  }
</script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="topbar-mount"></div>
  <script>Layout.renderTopbar({ title: '<i data-lucide="settings"></i> Configuración del Sistema', back: { label: '<i data-lucide="arrow-left"></i> Volver', href: './index.html' }, showHome: false, showLogout: true });</script>


  <div class="card" style="max-width:700px; margin:16px auto;">
  <div class="form-grid cols-2">
    <button class="btn w-100" onclick="window.location.href='importar-exportar.html'"><i data-lucide="package"></i> Importar / Exportar Datos</button>
  </div>
</div>

<script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
