<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Importar / Exportar Datos - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/ordenesService.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="../js/ui/toast.js"></script>
  <script src="../js/ui/modal.js"></script>
  <script src="../js/pages/importar-exportar.js" defer></script>
  <script src="../js/core/layout.js"></script>
  <script src="https://unpkg.com/lucide@1.23.0/dist/umd/lucide.min.js"></script>

  <script>
    function cerrarSesion() {
      firebase.auth().signOut().then(() => { window.location.href = "login.html"; });
    }
  </script>
</head>
<body>

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="package"></i> Importar / Exportar Datos',
      back: { label: '<i data-lucide="arrow-left"></i> Volver', href: 'config.html' },
      showHome: false, showLogout: true
    });
  </script>

  <div class="app-wrap app-wrap--narrow">

    <!-- Exportar a Excel -->
    <div class="form-section-header">
      <h3><i data-lucide="download"></i> Exportar a Excel</h3>
    </div>
    <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
      <div style="display:flex; flex-direction:column; gap:var(--sp-2);">
        <button id="exportar-ordenes-btn" class="btn btn-secondary"><i data-lucide="file-text"></i> Exportar órdenes</button>
        <button id="exportar-equipos-btn" class="btn btn-secondary"><i data-lucide="clipboard"></i> Exportar equipos</button>
        <button id="descargar-ejemplo-btn" class="btn btn-ghost"><i data-lucide="download"></i> Descargar plantilla de ejemplo</button>
      </div>
    </div>

    <!-- Importar desde Excel -->
    <div class="form-section-header">
      <h3><i data-lucide="upload"></i> Importar desde Excel</h3>
    </div>
    <div class="ds-card ds-card-padded">
      <label class="form-file-zone" for="importar-xlsx-input">
        <span class="form-file-zone-icon"><i data-lucide="upload-cloud" style="width:32px;height:32px;"></i></span>
        <p><strong>Selecciona un archivo</strong> o arrástralo aquí</p>
        <span>Formato .xlsx</span>
        <input type="file" id="importar-xlsx-input" accept=".xlsx">
      </label>

      <div class="form-actions">
        <button id="importar-xlsx-btn" class="btn btn-primary"><i data-lucide="upload"></i> Importar archivo</button>
      </div>

      <div id="mensaje-status" style="margin-top:var(--sp-3); font-weight:600; text-align:center;"></div>
    </div>

  </div>

  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
