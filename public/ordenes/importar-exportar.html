<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Importar / Exportar Datos - Cecomunica</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
    }
    .section {
      max-width: 600px;
      margin: auto;
      margin-bottom: 30px;
    }
    .section label, .section input, .section button {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      font-size: 14px;
    }
    button {
      padding: 10px;
      cursor: pointer;
    }
    #mensaje-status {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/ordenesService.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  
  <script src="../js/pages/importar-exportar.js" defer></script>
</head>
<body>
  <h2>📦 Importar / Exportar Datos</h2>
  <div style="max-width: 600px; margin: auto; margin-bottom: 20px;">
    <button onclick="window.location.href='config.html'">⬅️ Volver</button>
  </div>
  <div class="section">
    <h3>⬇️ Exportar a Excel:</h3>
    <button id="exportar-ordenes-btn">📄 Exportar Órdenes</button>
    <button id="exportar-equipos-btn">📋 Exportar Equipos</button>
    <button id="descargar-ejemplo-btn">📥 Descargar Plantilla de Ejemplo</button>
  </div>

  <div class="section">
    <h3>📥 Importar desde Excel (.xlsx):</h3>
    <label for="importar-xlsx-input">Selecciona archivo Excel:</label>
    <input type="file" id="importar-xlsx-input" accept=".xlsx">
    <button id="importar-xlsx-btn">📤 Importar Archivo</button>
    <div id="mensaje-status"></div>
  </div>
</body>
</html>
