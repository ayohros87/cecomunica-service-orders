<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Importar / Exportar Datos - Cecomunica</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
    }
    .section {
      max-width: 600px;
      margin: auto;
      margin-bottom: 30px;
    }
    .section label, .section input, .section button {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      font-size: 14px;
    }
    button {
      padding: 10px;
      cursor: pointer;
    }
    #mensaje-status {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/ordenesService.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="../js/ui/toast.js"></script>
  <script src="../js/ui/modal.js"></script>

  <script src="../js/pages/importar-exportar.js" defer></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <h2><i data-lucide="package"></i> Importar / Exportar Datos</h2>
  <div style="max-width: 600px; margin: auto; margin-bottom: 20px;">
    <button onclick="window.location.href='config.html'"><i data-lucide="arrow-left"></i> Volver</button>
  </div>
  <div class="section">
    <h3><i data-lucide="download"></i> Exportar a Excel:</h3>
    <button id="exportar-ordenes-btn"><i data-lucide="file-text"></i> Exportar Órdenes</button>
    <button id="exportar-equipos-btn"><i data-lucide="clipboard"></i> Exportar Equipos</button>
    <button id="descargar-ejemplo-btn"><i data-lucide="download"></i> Descargar Plantilla de Ejemplo</button>
  </div>

  <div class="section">
    <h3><i data-lucide="upload"></i> Importar desde Excel (.xlsx):</h3>
    <label for="importar-xlsx-input">Selecciona archivo Excel:</label>
    <input type="file" id="importar-xlsx-input" accept=".xlsx">
    <button id="importar-xlsx-btn"><i data-lucide="upload"></i> Importar Archivo</button>
    <div id="mensaje-status"></div>
  </div>
<script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
