<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Equipos por Cliente - Cecomunica</title>
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <link rel="stylesheet" href="../css/admin-equipos-cliente.css">

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/clientesService.js"></script>
  <script src="../js/services/empresaService.js"></script>
  <script src="../js/services/usuariosService.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="../js/admin-equipos-cliente.js" defer></script>
  <script src="https://unpkg.com/lucide@1.23.0/dist/umd/lucide.min.js"></script>

  <script>
    function cerrarSesion() {
      firebase.auth().signOut().then(() => { window.location.href = "login.html"; });
    }
  </script>
</head>
<body>

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="shield"></i> Equipos por Cliente (Admin)',
      back: { label: '<i data-lucide="arrow-left"></i> Volver a órdenes', href: 'index.html' },
      showHome: false, showLogout: true
    });
  </script>

  <div class="app-wrap app-wrap--wide" id="adminToolRoot">

    <!-- Acceso denegado -->
    <div id="accesoDenegado" class="alert-banner alert-error" style="display:none;">
      <span class="alert-banner-icon"><i data-lucide="shield-x"></i></span>
      <div class="alert-banner-body">
        <strong>Sin acceso</strong>
        Esta herramienta está disponible solo para usuarios con rol administrador.
      </div>
    </div>

    <!-- Panel de búsqueda -->
    <div class="ds-card ds-card-padded" id="panelBusqueda" style="display:none; margin-bottom:var(--sp-3);">

      <div class="form-grid-2">
        <div class="form-field">
          <label class="form-label" for="filtroClienteAdmin">Cliente <span class="req">*</span></label>
          <input class="form-input" type="text" id="filtroClienteAdmin" placeholder="Nombre del cliente (requerido)">
        </div>
        <div class="form-field">
          <label class="form-label" for="filtroTipoOrdenAdmin">Tipo de orden</label>
          <select class="form-select" id="filtroTipoOrdenAdmin">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" for="filtroEstadoOrdenAdmin">Estado</label>
          <select class="form-select" id="filtroEstadoOrdenAdmin">
            <option value="">Todos</option>
            <option value="POR ASIGNAR">POR ASIGNAR</option>
            <option value="ASIGNADO">ASIGNADO</option>
            <option value="COMPLETADO (EN OFICINA)">COMPLETADO (EN OFICINA)</option>
            <option value="ENTREGADO AL CLIENTE">ENTREGADO AL CLIENTE</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" for="sortByAdmin">Ordenar por</label>
          <select class="form-select" id="sortByAdmin">
            <option value="cliente">Cliente</option>
            <option value="ordenId">Orden</option>
            <option value="serial">Serial</option>
            <option value="modelo">Modelo</option>
          </select>
        </div>
      </div>

      <div style="display:flex; gap:var(--sp-3); flex-wrap:wrap; margin-top:var(--sp-3);">
        <label class="form-check">
          <input type="checkbox" id="soloConSerial">
          <span><span class="form-check-label">Solo equipos con serial</span></span>
        </label>
        <label class="form-check">
          <input type="checkbox" id="incluirEquiposEliminados">
          <span><span class="form-check-label">Incluir equipos eliminados</span></span>
        </label>
      </div>

      <div class="form-actions" style="margin-top:var(--sp-3);">
        <button class="btn btn-primary" id="btnBuscarAdmin"><i data-lucide="search"></i> Buscar</button>
        <button class="btn btn-secondary" id="btnExportarExcelAdmin" disabled><i data-lucide="download"></i> Exportar Excel</button>
        <button class="btn btn-ghost" id="btnLimpiarAdmin"><i data-lucide="rotate-ccw"></i> Limpiar</button>
      </div>
    </div>

    <!-- Resultados -->
    <div class="ds-card" id="panelResultados" style="display:none;">
      <div class="app-table-footer" style="border-top:0; padding:var(--sp-3) var(--sp-4);">
        <div id="resumenAdmin" class="resumen" style="margin:0;">Sin resultados</div>
      </div>
      <div class="app-table-wrap" style="border:none; box-shadow:none; border-radius:0;">
        <table class="orders-table admin-table app-table">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Orden</th>
              <th>Tipo</th>
              <th>Estado</th>
              <th>Serial</th>
              <th>Modelo</th>
              <th>Descripción</th>
            </tr>
          </thead>
          <tbody id="adminResultsBody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
