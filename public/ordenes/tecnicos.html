<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <title>Técnicos - Cecomunica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <!-- Rediseño Command Center F5: rail lateral (híbrido). PLAN_REDISENO_COMMAND_CENTER.md -->
  <link rel="stylesheet" href="../css/ceco-rail.css?v=cc5">

  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script defer src="../js/firebase-init.js"></script>
  <script defer src="../js/services/empresaService.js"></script>
  <script src="../js/core/modulos.js"></script>
  <script src="../js/core/layout.js?v=cc5"></script>
  <script src="/js/vendor/lucide.min.js"></script>

  <script>
    function cerrarSesion() {
      firebase.auth().signOut().then(() => { window.location.href = "login.html"; });
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const lista = document.getElementById("lista-tecnicos");
      const form = document.getElementById("form-tecnico");
      const inputNombre = document.getElementById("nombre-tecnico");
      let editandoId = null;

      async function cargarTecnicos() {
        lista.innerHTML = "";
        const docSnap = await EmpresaService.getDoc("tecnicos");
        if (docSnap) {
          const listaTecnicos = docSnap.list || [];
          if (listaTecnicos.length === 0) {
            lista.innerHTML = `
              <div class="empty-state-hint">
                <div class="empty-state-hint-icon"><i data-lucide="users"></i></div>
                <p class="title">Sin técnicos registrados</p>
                <p class="hint">Agrega el primer técnico con el formulario de arriba.</p>
              </div>`;
            if (typeof lucide !== 'undefined') lucide.createIcons();
            return;
          }
          listaTecnicos.forEach(nombre => {
            const item = document.createElement("div");
            item.className = "crud-list-item";
            item.innerHTML = `
              <span class="crud-list-item-handle"><i data-lucide="grip-vertical"></i></span>
              <span class="crud-list-item-label">${nombre}</span>
              <div class="crud-list-item-actions">
                <button class="btn btn-ghost btn-icon btn-sm" onclick="editarTecnico('${nombre.replace(/'/g, "\\'")}')" aria-label="Editar"><i data-lucide="pencil"></i></button>
                <button class="btn btn-ghost btn-icon btn-sm" onclick="borrarTecnico('${nombre.replace(/'/g, "\\'")}')" aria-label="Eliminar"><i data-lucide="trash-2"></i></button>
              </div>`;
            lista.appendChild(item);
          });
          if (typeof lucide !== 'undefined') lucide.createIcons();
        }
      }

      window.editarTecnico = async (id) => {
        inputNombre.value = id;
        editandoId = id;
        inputNombre.focus();
      };

      window.borrarTecnico = async (id) => {
        if (!confirm(`¿Eliminar técnico "${id}"?`)) return;
        const docSnap = await EmpresaService.getDoc("tecnicos");
        const nuevaLista = ((docSnap && docSnap.list) || []).filter(n => n !== id);
        await EmpresaService.setDoc("tecnicos", { list: nuevaLista });
        await cargarTecnicos();
      };

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const nombre = inputNombre.value.trim();
        if (!nombre) return;
        const docSnap = await EmpresaService.getDoc("tecnicos");
        let lista = (docSnap && docSnap.list) || [];
        if (editandoId && editandoId !== nombre) {
          lista = lista.filter(n => n !== editandoId);
        }
        if (!lista.includes(nombre)) {
          lista.push(nombre);
        }
        await EmpresaService.setDoc("tecnicos", { list: lista });
        inputNombre.value = "";
        editandoId = null;
        await cargarTecnicos();
      });

      await cargarTecnicos();
    });
  </script>
</head>
<body>
  <div class="cc-app">
  <div id="rail-mount"></div>
  <div class="cc-work">

  <div id="topbar-mount"></div>
  <script>
    Layout.renderTopbar({
      title: '<i data-lucide="users"></i> Técnicos',
      back: { label: '<i data-lucide="arrow-left"></i> Volver', href: 'config.html' },
      showHome: false, showLogout: true
    });
  </script>

  <div class="app-wrap app-wrap--narrow">

    <div class="ds-card ds-card-padded" style="margin-bottom:var(--sp-4);">
      <form id="form-tecnico">
        <div class="form-field">
          <label class="form-label" for="nombre-tecnico">Nombre del técnico</label>
          <div style="display:flex; gap:var(--sp-2);">
            <input class="form-input" type="text" id="nombre-tecnico" required placeholder="Ej. Juan Pérez" style="flex:1;">
            <button type="submit" class="btn btn-primary"><i data-lucide="plus"></i> Agregar</button>
          </div>
        </div>
      </form>
    </div>

    <p class="form-section-title" style="margin-bottom:var(--sp-3);"><i data-lucide="users"></i> Técnicos registrados</p>
    <div id="lista-tecnicos" class="crud-list"></div>
  </div>

  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
  </div> <!-- /cc-work -->
  </div> <!-- /cc-app -->
  <script>
    // Rail Command Center (F5) — espera auth (scripts defer) y pinta el rail del rol efectivo.
    document.addEventListener('DOMContentLoaded', () => Layout.initRail('ordenes'));
  </script>
</body>
</html>
