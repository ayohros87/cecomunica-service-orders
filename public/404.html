<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página no encontrada — Cecomunica</title>
  <link rel="stylesheet" href="css/ceco-ui.css">
  <script src="/js/vendor/lucide.min.js"></script>

  <style>
    body { background: var(--surface-page); display: grid; place-items: center; min-height: 100vh; padding: var(--sp-5); }
    .nf-wrap { max-width: 460px; width: 100%; text-align: center; }
    .nf-icon {
      width: 80px; height: 80px;
      display: inline-grid; place-items: center;
      border-radius: 50%;
      background: var(--surface-sunken);
      margin-bottom: var(--sp-4);
    }
    .nf-icon svg { width: 40px; height: 40px; color: var(--fg-4); }
    .nf-code {
      font-family: var(--font-display);
      font-size: 64px; font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin: 0;
    }
    .nf-title {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 700;
      color: var(--fg-1);
      margin: var(--sp-3) 0 var(--sp-2);
    }
    .nf-msg {
      font-size: 14px; color: var(--fg-3);
      line-height: 1.6;
      margin: 0 0 var(--sp-5);
    }
  </style>
</head>
<body>

  <div class="nf-wrap">
    <div class="nf-icon"><i data-lucide="search-x"></i></div>
    <p class="nf-code">404</p>
    <h1 class="nf-title">Página no encontrada</h1>
    <p class="nf-msg">
      El archivo solicitado no fue encontrado. Verifica la URL e intenta nuevamente,
      o regresa al inicio para continuar navegando.
    </p>
    <a class="btn btn-primary btn-lg" href="/"><i data-lucide="home"></i> Ir al inicio</a>
  </div>

  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
