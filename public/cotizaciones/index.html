<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotizaciones - Cecomunica</title>
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/core/layout.js"></script>
  <script src="../js/core/roles.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../js/services/cotizacionesService.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="topbar-mount"></div>
  <script>Layout.renderTopbar({ title: '<i data-lucide="receipt"></i> Cotizaciones', actions: [{ label: '<i data-lucide="plus"></i> Nueva Cotización', href: 'nueva-cotizacion.html', cls: 'primary' }], showHome: true, homeHref: '../index.html', showLogout: true });</script>

  <div class="app-wrap app-wrap--wide">

    <div class="app-card">
      <div class="filter-bar">
        <div class="filter-search">
          <span class="search-icon"><i data-lucide="search"></i></span>
          <input id="filtroTexto" type="search" placeholder="Filtrar por cliente o ID…" aria-label="Buscar cotizaciones">
        </div>
        <div class="form-field" style="margin:0; min-width:160px;">
          <select id="filtroEstado" class="form-select">
            <option value="">Todos los estados</option>
            <option value="borrador">Borrador</option>
            <option value="emitida">Emitida</option>
            <option value="enviada">Enviada</option>
            <option value="anulada">Anulada</option>
          </select>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="aplicarFiltros()"><i data-lucide="search"></i> Aplicar</button>
        <button class="btn btn-ghost btn-sm" onclick="limpiarFiltros()">Limpiar</button>
        <div style="flex:1;"></div>
        <label class="toggle-pill">
          <input type="checkbox" id="toggleEliminadas">
          Mostrar eliminadas
        </label>
        <span id="resumenCotizaciones" style="font-size:13px; color:var(--fg-3);"></span>
      </div>

      <!-- Desktop table -->
      <div class="responsive-table-wrap">
        <div class="app-table-wrap" style="border:none; box-shadow:none; border-radius:0;">
          <table class="app-table" aria-label="Cotizaciones">
            <thead>
              <tr>
                <th style="width:140px;">ID</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th style="text-align:right;">Total</th>
                <th style="text-align:right;">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaCotizaciones">
              <tr class="skeleton-row">
                <td colspan="6" style="padding: 0; border: none;">
                  <div class="skeleton-table-row">
                    <div class="skeleton-cell" style="width: 14%;"></div>
                    <div class="skeleton-cell" style="width: 26%;"></div>
                    <div class="skeleton-cell" style="width: 18%;"></div>
                    <div class="skeleton-cell" style="width: 16%;"></div>
                    <div class="skeleton-cell" style="width: 16%;"></div>
                    <div class="skeleton-cell" style="width: 10%;"></div>
                  </div>
                </td>
              </tr>
              <tr class="skeleton-row">
                <td colspan="6" style="padding: 0; border: none;">
                  <div class="skeleton-table-row">
                    <div class="skeleton-cell" style="width: 12%;"></div>
                    <div class="skeleton-cell" style="width: 30%;"></div>
                    <div class="skeleton-cell" style="width: 16%;"></div>
                    <div class="skeleton-cell" style="width: 16%;"></div>
                    <div class="skeleton-cell" style="width: 16%;"></div>
                    <div class="skeleton-cell" style="width: 10%;"></div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Mobile cards fallback (responsive-card del kit) -->
      <div id="listaCotizacionesMovil" class="responsive-cards" style="padding:var(--sp-3);"></div>

      <div class="app-table-footer">
        <button class="btn btn-secondary btn-sm" id="btnCargarMas"><i data-lucide="chevron-down"></i> Cargar más cotizaciones</button>
      </div>
    </div>

  </div>

  <script src="../js/pages/cotizaciones-index.js" defer></script>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
