<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotizaciones - Cecomunica</title>
  <link rel="stylesheet" href="../css/ceco-ui.css">

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-init.js"></script>
  <script src="../js/services/cotizacionesService.js"></script>

  <style>
    html, body { margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%); min-height: 100vh; }

    .topbar {
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      border-bottom: 3px solid var(--brand);
      width: 100%;
      box-sizing: border-box;
    }

    .topbar h1 { display: flex; align-items: center; gap: 12px; color: var(--text); font-size: 1.5rem; margin: 0; }

    .app-wrap { max-width: none; margin: 0 auto; padding: 12px 20px; box-sizing: border-box; }

    .card { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 12px; }

    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .toolbar .left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .toolbar .right { display: flex; align-items: center; gap: 10px; }

    .filters input, .filters select { padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; font-size: 14px; }

    .table-wrap { background: white; border-radius: 8px; padding: 0; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; width: 100%; margin-top: 12px; }
    table { width: 100%; border-collapse: collapse; table-layout: auto; }
    table thead { background: linear-gradient(135deg, #f8fafc, #f1f5f9); }
    table th { font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px; color: var(--text); vertical-align: middle; border-bottom: 2px solid #e2e8f0; }
    table td { padding: 10px 16px; vertical-align: middle; font-size: 16px; }
    table tbody tr { transition: background 0.15s; border-bottom: 1px solid var(--line); }
    table tbody tr:hover { background: #f0f9ff; }

    .btn { padding: 8px 16px; font-size: 14px; font-weight: 600; border-radius: 8px; transition: all 0.2s ease; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .estado-borrador { background: #eef2ff; color: #3730a3; }
    .estado-emitida { background: #dcfce7; color: #166534; }
    .estado-enviada { background: #e0f2fe; color: #0369a1; }
    .estado-anulada { background: #fee2e2; color: #991b1b; }

    .toggle-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }

    .empty-state { padding: 22px; text-align: center; color: #64748b; }
    .empty-state .title { font-weight: 700; margin-bottom: 6px; }
    .empty-state .hint { font-size: 13px; }

    .cards-list { display: none; }
    .card-cotizacion { background: white; border-radius: 10px; padding: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 10px; border: 1px solid var(--line); }
    .card-cotizacion .row { display: flex; justify-content: space-between; gap: 8px; align-items: center; flex-wrap: wrap; }
    .card-cotizacion .t1 { font-weight: 700; font-size: 15px; }
    .card-cotizacion .t2 { color: var(--muted); font-size: 13px; }
    .card-cotizacion .meta { font-size: 13px; color: #475569; margin-top: 6px; }
    .card-cotizacion .acciones { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

    .skeleton-row { background: transparent; }
    .skeleton-table-row { display: flex; gap: 10px; padding: 14px; }
    .skeleton-cell { height: 14px; background: #e5e7eb; border-radius: 6px; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .6; } 50% { opacity: 1; } }

    @media (max-width: 900px) {
      .table-wrap { display: none; }
      .cards-list { display: block; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1 style="margin: 0; font-size: 1.5rem; font-weight: 700;">🧾 Cotizaciones</h1>
    <div style="margin-left:auto; display:flex; gap:10px; align-items: center;">
      <button class="btn primary" onclick="window.location.href='nueva-cotizacion.html'" style="font-size: 14px;">➕ Nueva Cotización</button>
      <button class="btn-top" onclick="window.location.href='../index.html'">🏠 Menú principal</button>
      <button class="btn danger" onclick="cerrarSesion()" style="background: var(--bad); border-color: var(--bad);">🚪 Salir</button>
    </div>
  </div>

  <div class="app-wrap">
    <div class="card">
      <div class="toolbar">
        <div class="left filters">
          <input id="filtroTexto" type="text" placeholder="Filtrar por cliente o ID">
          <select id="filtroEstado">
            <option value="">Todos los estados</option>
            <option value="borrador">Borrador</option>
            <option value="emitida">Emitida</option>
            <option value="enviada">Enviada</option>
            <option value="anulada">Anulada</option>
          </select>
          <button class="btn" onclick="aplicarFiltros()">🔍 Aplicar</button>
          <button class="btn" onclick="limpiarFiltros()">Limpiar</button>
          <label class="toggle-pill">
            <input type="checkbox" id="toggleEliminadas">
            Mostrar eliminadas
          </label>
        </div>
        <div class="right resumen" id="resumenCotizaciones"></div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Total</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaCotizaciones">
          <tr class="skeleton-row">
            <td colspan="6" style="padding: 0; border: none;">
              <div class="skeleton-table-row">
                <div class="skeleton-cell" style="width: 14%;"></div>
                <div class="skeleton-cell" style="width: 26%;"></div>
                <div class="skeleton-cell" style="width: 18%;"></div>
                <div class="skeleton-cell" style="width: 16%;"></div>
                <div class="skeleton-cell" style="width: 16%;"></div>
                <div class="skeleton-cell" style="width: 10%;"></div>
              </div>
            </td>
          </tr>
          <tr class="skeleton-row">
            <td colspan="6" style="padding: 0; border: none;">
              <div class="skeleton-table-row">
                <div class="skeleton-cell" style="width: 12%;"></div>
                <div class="skeleton-cell" style="width: 30%;"></div>
                <div class="skeleton-cell" style="width: 16%;"></div>
                <div class="skeleton-cell" style="width: 16%;"></div>
                <div class="skeleton-cell" style="width: 16%;"></div>
                <div class="skeleton-cell" style="width: 10%;"></div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="listaCotizacionesMovil" class="cards-list"></div>

    <div style="margin:12px 0; text-align:center;">
      <button class="btn" id="btnCargarMas">⬇️ Cargar más cotizaciones</button>
    </div>
  </div>

  <script>
    let cotizaciones = [];
    let lastDoc = null;
    let isLoading = false;

    function cerrarSesion() { firebase.auth().signOut().then(() => location.href = "../login.html"); }

    function estadoBadge(estado) {
      const map = {
        borrador: "estado-borrador",
        emitida: "estado-emitida",
        enviada: "estado-enviada",
        anulada: "estado-anulada"
      };
      return `<span class="badge ${map[estado] || ""}">${estado || ""}</span>`;
    }

    function formatFecha(ts) {
      const d = ts?.toDate?.();
      if (!d) return "";
      return d.toLocaleDateString("es-PA", { day: "2-digit", month: "short", year: "numeric" });
    }

    function formatMoney(n) {
      const v = Number(n || 0);
      return v.toLocaleString("es-PA", { style: "currency", currency: "USD" });
    }

    async function cargarCotizaciones(esInicial = true) {
      if (isLoading) return;
      isLoading = true;
      const btn = document.getElementById("btnCargarMas");
      if (btn) {
        btn.disabled = true;
        btn.textContent = "⏳ Cargando...";
      }

      if (esInicial) {
        cotizaciones = [];
        lastDoc = null;
      }

      const { docs, lastDoc: newCursor } = await CotizacionesService.listCotizaciones({ lastDoc, limit: 30 });

      if (docs.length > 0) {
        lastDoc = newCursor;
        cotizaciones.push(...docs);
      }

      aplicarFiltros();

      if (btn) {
        btn.disabled = false;
        const hasMore = docs.length > 0;
        btn.style.display = hasMore ? "inline-block" : "none";
        const totalVisible = getFilteredCotizaciones().length;
        btn.textContent = `⬇️ Cargar más cotizaciones (${totalVisible})`;
      }
      isLoading = false;
    }

    function getFilteredCotizaciones() {
      const q = (document.getElementById("filtroTexto").value || "").toLowerCase().trim();
      const estado = document.getElementById("filtroEstado").value;
      const mostrarEliminadas = document.getElementById("toggleEliminadas").checked;

      return cotizaciones.filter(c => {
        if (!mostrarEliminadas && c.deleted) return false;
        if (estado && c.estado !== estado) return false;
        if (!q) return true;
        const texto = `${c.cotizacion_id || ""} ${c.cliente_nombre || ""}`.toLowerCase();
        return texto.includes(q);
      });
    }

    function aplicarFiltros() {
      const filtradas = getFilteredCotizaciones();
      renderTabla(filtradas);
      actualizarResumenCotizaciones(filtradas, cotizaciones.length);
      const btn = document.getElementById("btnCargarMas");
      if (btn) btn.textContent = `⬇️ Cargar más cotizaciones (${filtradas.length})`;
    }

    function limpiarFiltros() {
      document.getElementById("filtroTexto").value = "";
      document.getElementById("filtroEstado").value = "";
      aplicarFiltros();
    }

    function renderTabla(lista) {
      const tbody = document.getElementById("tablaCotizaciones");
      const cards = document.getElementById("listaCotizacionesMovil");
      tbody.innerHTML = "";
      if (cards) cards.innerHTML = "";
      if (!lista || lista.length === 0) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td colspan="6">
            <div class="empty-state">
              <div class="title">No hay cotizaciones para mostrar</div>
              <div class="hint">Prueba ajustando los filtros o crea una nueva cotización.</div>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
        if (cards) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.innerHTML = `<div class="title">No hay cotizaciones para mostrar</div><div class="hint">Prueba ajustando los filtros o crea una nueva cotización.</div>`;
          cards.appendChild(empty);
        }
        return;
      }
      lista.forEach(c => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${c.cotizacion_id || ""}</td>
          <td>${c.cliente_nombre || ""}</td>
          <td>${formatFecha(c.fecha_creacion)}</td>
          <td>${estadoBadge(c.estado || "borrador")}</td>
          <td>${formatMoney(c.total)}</td>
          <td></td>
        `;

        const acciones = document.createElement("div");
        acciones.className = "actions";

        const btnEditar = document.createElement("button");
        btnEditar.className = "btn";
        btnEditar.textContent = "✏️ Editar";
        btnEditar.onclick = () => location.href = `editar-cotizacion.html?id=${encodeURIComponent(c.id)}`;
        acciones.appendChild(btnEditar);

        const btnImprimir = document.createElement("button");
        btnImprimir.className = "btn";
        btnImprimir.textContent = "🖨️ Imprimir";
        btnImprimir.onclick = () => window.open(`imprimir-cotizacion.html?id=${encodeURIComponent(c.id)}`, "_blank");
        acciones.appendChild(btnImprimir);

        const btnDuplicar = document.createElement("button");
        btnDuplicar.className = "btn";
        btnDuplicar.textContent = "🧾 Duplicar";
        btnDuplicar.onclick = () => duplicarCotizacion(c.id);
        acciones.appendChild(btnDuplicar);

        const btnAnular = document.createElement("button");
        btnAnular.className = "btn danger";
        btnAnular.textContent = "⛔ Anular";
        btnAnular.onclick = () => anularCotizacion(c.id);
        acciones.appendChild(btnAnular);

        const btnEliminar = document.createElement("button");
        btnEliminar.className = "btn secondary";
        btnEliminar.textContent = "🗑️ Eliminar";
        btnEliminar.onclick = () => eliminarCotizacion(c.id);
        acciones.appendChild(btnEliminar);

        tr.lastElementChild.appendChild(acciones);
        tbody.appendChild(tr);

        if (cards) {
          const card = document.createElement("div");
          card.className = "card-cotizacion";
          card.innerHTML = `
            <div class="row">
              <div class="t1">${c.cotizacion_id || ""}</div>
              <div>${estadoBadge(c.estado || "borrador")}</div>
            </div>
            <div class="t2">${c.cliente_nombre || ""}</div>
            <div class="meta">${formatFecha(c.fecha_creacion)} · ${formatMoney(c.total)}</div>
            <div class="acciones">
              <button class="btn" onclick="location.href='editar-cotizacion.html?id=${encodeURIComponent(c.id)}'">✏️ Editar</button>
              <button class="btn" onclick="window.open('imprimir-cotizacion.html?id=${encodeURIComponent(c.id)}','_blank')">🖨️ Imprimir</button>
              <button class="btn" onclick="duplicarCotizacion('${c.id}')">🧾 Duplicar</button>
              <button class="btn danger" onclick="anularCotizacion('${c.id}')">⛔ Anular</button>
              <button class="btn secondary" onclick="eliminarCotizacion('${c.id}')">🗑️ Eliminar</button>
            </div>
          `;
          cards.appendChild(card);
        }
      });
    }

    function actualizarResumenCotizaciones(lista, total) {
      const el = document.getElementById("resumenCotizaciones");
      if (!el) return;
      const totalVisible = (lista || []).length;
      el.textContent = `Mostrando ${totalVisible} de ${total}`;
    }

    async function generarCotizacionIdSimple() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      const prefix = `COT-${y}${m}${d}-`;

      const start = new Date(y, now.getMonth(), now.getDate(), 0, 0, 0);
      const end = new Date(y, now.getMonth(), now.getDate(), 23, 59, 59, 999);

      const cotizacionesHoy = await CotizacionesService.getCotizacionesPorFecha(start, end);

      let max = 0;
      cotizacionesHoy.forEach(c => {
        const id = c.cotizacion_id || "";
        if (id.startsWith(prefix)) {
          const n = parseInt(id.replace(prefix, ""), 10);
          if (!isNaN(n)) max = Math.max(max, n);
        }
      });
      const next = String(max + 1).padStart(3, "0");
      return `${prefix}${next}`;
    }

    async function duplicarCotizacion(id) {
      if (!confirm("¿Duplicar esta cotización?")) return;
      const d = await CotizacionesService.getCotizacion(id);
      if (!d) return;
      const user = firebase.auth().currentUser;
      const cotizacion_id = await generarCotizacionIdSimple();

      const nuevo = {
        ...d,
        cotizacion_id,
        estado: "borrador",
        deleted: false,
        fecha_creacion: firebase.firestore.FieldValue.serverTimestamp(),
        fecha_modificacion: firebase.firestore.FieldValue.serverTimestamp(),
        creado_por_uid: user?.uid || null,
        creado_por_email: user?.email || null,
        vendedor_uid: user?.uid || null
      };

      await CotizacionesService.addCotizacion(nuevo);
      await cargarCotizaciones();
    }

    async function anularCotizacion(id) {
      if (!confirm("¿Anular esta cotización?")) return;
      await CotizacionesService.updateCotizacion(id, {
        estado: "anulada",
        fecha_modificacion: firebase.firestore.FieldValue.serverTimestamp()
      });
      await cargarCotizaciones();
    }

    async function eliminarCotizacion(id) {
      if (!confirm("¿Eliminar (ocultar) esta cotización?")) return;
      await CotizacionesService.updateCotizacion(id, {
        deleted: true,
        fecha_modificacion: firebase.firestore.FieldValue.serverTimestamp()
      });
      await cargarCotizaciones();
    }

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) { location.href = "../login.html"; return; }
      verificarAccesoYAplicarVisibilidad(async (rol) => {
        const permitidos = ["administrador", "vendedor"];
        if (!permitidos.includes(rol)) {
          alert("Sin acceso");
          location.href = "../index.html";
          return;
        }
        await cargarCotizaciones(true);
      });
    });

    document.getElementById("toggleEliminadas").addEventListener("change", aplicarFiltros);
    document.getElementById("btnCargarMas").addEventListener("click", () => cargarCotizaciones(false));
  </script>
</body>
</html>
