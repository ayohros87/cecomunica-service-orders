<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/brand/cecomunica-monogram.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B2A47">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imprimir cotización - Cecomunica</title>
  <link rel="stylesheet" href="../css/ceco-ui.css">
  <link rel="stylesheet" href="../css/cotizaciones-kit.css">
  <link rel="stylesheet" href="../css/print-cotizacion.css">

  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script defer src="../js/firebase-init.js"></script>
  <script src="../js/core/formatting.js"></script>
  <script defer src="../js/services/cotizacionesService.js"></script>
  <script defer src="../js/services/clientesService.js"></script>
  <script defer src="../js/services/usuariosService.js"></script>
  <script defer src="../js/services/empresaService.js"></script>
  <script defer src="../js/services/modelosService.js"></script>
  <script defer src="../js/services/mailService.js"></script>
  <script src="../js/core/roles.js"></script>
  <script defer src="../js/domain/cotizacionesTotales.js"></script>
  <script defer src="../js/pages/cot-editor-state.js"></script>
  <script src="/js/vendor/lucide.min.js"></script>
</head>
<body>
  <div class="cc-print-toolbar">
    <a href="index.html" class="btn btn-ghost btn-sm"><i data-lucide="arrow-left"></i> Volver</a>
    <span class="cc-pt-title" id="ptTitle">—</span>
    <span id="ptEstado"></span>
    <div style="flex:1;"></div>
    <button class="btn btn-secondary btn-sm" id="btnEditarPt"><i data-lucide="pencil"></i> Editar</button>
    <button class="btn btn-primary btn-sm" onclick="window.print()"><i data-lucide="printer"></i> Imprimir / PDF</button>
  </div>

  <div class="cc-print-stage">
    <div class="cq-page" id="cqPage">
      <p style="padding:48px;">Cargando…</p>
    </div>
  </div>

  <script src="../js/pages/imprimir-cotizacion.js" defer></script>
  <script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
</body>
</html>
