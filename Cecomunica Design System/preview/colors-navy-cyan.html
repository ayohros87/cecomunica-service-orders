<!doctype html>
<html><head><meta charset="utf-8"><title>Navy & cyan</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:var(--font-body);background:var(--surface-card)}
  .row{display:grid;grid-template-columns:repeat(5,1fr)}
  .sw{aspect-ratio:1.6/1;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;color:#fff;font:600 11px/1.2 var(--font-mono)}
  .sw small{display:block;font:500 10px/1 var(--font-body);opacity:.85;margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
  .name{font:600 11px/1 var(--font-body);letter-spacing:.1em;text-transform:uppercase;padding:14px 14px 8px;color:var(--fg-3)}
</style></head>
<body>
<div class="name">Hero navy + cyan accent</div>
<div class="row">
  <div class="sw" style="background:var(--navy-700)">navy-700<small>#0F3A5F</small></div>
  <div class="sw" style="background:var(--navy-800)">navy-800<small>#0A2540 · hero</small></div>
  <div class="sw" style="background:var(--navy-900)">navy-900<small>#061829</small></div>
  <div class="sw" style="background:var(--cyan-500)">cyan-500<small>#1FA0E1 · accent</small></div>
  <div class="sw" style="background:var(--cyan-600)">cyan-600<small>#1880B4</small></div>
</div>
</body></html>
