<!doctype html>
<html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:var(--font-body);background:var(--surface-card)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:0}
  .sw{aspect-ratio:1.6/1;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;color:#fff;font:600 11px/1.2 var(--font-mono)}
  .sw small{display:block;font:500 10px/1 var(--font-body);opacity:.85;margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
  .sw.light{color:var(--fg-1)}
  .name{font:600 11px/1 var(--font-body);letter-spacing:.1em;text-transform:uppercase;padding:14px 14px 8px;color:var(--fg-3)}
</style></head>
<body>
<div class="name">Brand · Blue scale</div>
<div class="row">
  <div class="sw light" style="background:var(--blue-50)">50<small>#E6F4FB</small></div>
  <div class="sw light" style="background:var(--blue-100)">100<small>#CCE9F7</small></div>
  <div class="sw light" style="background:var(--blue-300)">300<small>#66BCE7</small></div>
  <div class="sw" style="background:var(--blue-500);outline:2px solid var(--blue-700);outline-offset:-6px">500<small>#0091D7 · brand</small></div>
  <div class="sw" style="background:var(--blue-700)">700<small>#005781</small></div>
</div>
</body></html>
