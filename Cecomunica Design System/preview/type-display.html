<!doctype html>
<html><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-card);color:var(--fg-1)}
  .wrap{padding:22px 26px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--border-subtle);padding-bottom:8px}
  .row:last-child{border:0}
  .meta{font:500 11px/1 var(--font-mono);color:var(--fg-3);min-width:160px;letter-spacing:.04em}
  .meta b{color:var(--fg-1);font-weight:600}
</style></head>
<body>
<div class="wrap">
  <div class="row"><div class="meta"><b>Display XL</b> · 72 / 700</div><div class="cc-display-xl">Comunicaciones</div></div>
  <div class="row"><div class="meta"><b>Display L</b> · 56 / 700</div><div class="cc-display-l">Misión crítica</div></div>
  <div class="row"><div class="meta"><b>Display M</b> · 44 / 600</div><div class="cc-display-m">Soluciones de radio</div></div>
</div>
</body></html>
