<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-card);color:var(--fg-1);font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;padding:24px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .swatch{width:84px;height:60px;background:var(--blue-500);border:1px solid var(--blue-700)}
  .pill{width:84px;height:32px;background:var(--blue-500);border:1px solid var(--blue-700);border-radius:999px}
  .name{font:600 12px/1 var(--font-body);color:var(--fg-1)}
  .px{font:500 11px/1 var(--font-mono);color:var(--fg-3)}
</style></head>
<body>
<div class="grid">
  <div class="cell"><div class="swatch" style="border-radius:0"></div><div class="name">Sharp</div><div class="px">0 px · bands</div></div>
  <div class="cell"><div class="swatch" style="border-radius:var(--radius-sm)"></div><div class="name">SM</div><div class="px">4 · chips</div></div>
  <div class="cell"><div class="swatch" style="border-radius:var(--radius-md)"></div><div class="name">MD · default</div><div class="px">6 · buttons/inputs</div></div>
  <div class="cell"><div class="swatch" style="border-radius:var(--radius-lg)"></div><div class="name">LG</div><div class="px">10 · cards</div></div>
  <div class="cell"><div class="pill"></div><div class="name">Pill</div><div class="px">999 · status only</div></div>
</div>
</body></html>
