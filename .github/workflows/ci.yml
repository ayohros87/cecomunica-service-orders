name: CI

# Valida antes de merge/deploy: lint + unit tests de las Cloud Functions, y
# compilación de reglas + test de integración del contador contra el emulador
# de Firestore (evita repetir el deploy accidental de reglas rotas).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # El frontend es vanilla sin build step: un paréntesis roto no truena
      # hasta que un usuario abre la página. node --check lo atrapa aquí.
      - name: Sintaxis del frontend (public/js) y functions
        run: |
          set -e
          find public/js functions/src functions/index.js functions/test functions/test-emulator \
            -name '*.js' -not -path '*/node_modules/*' -print0 |
          while IFS= read -r -d '' f; do
            node --check "$f" || { echo "::error file=$f::Sintaxis rota"; exit 1; }
          done
          echo "Sintaxis OK"

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      # Un export roto en index.js tumba el deploy COMPLETO de functions.
      - name: functions/index.js carga (exports completos)
        run: node -e "require('./functions/index.js'); console.log('index.js OK')"

      - name: Lint functions
        working-directory: functions
        run: npm run lint

      - name: Unit tests
        working-directory: functions
        run: npm test

      - name: Set up Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Rules + counter integration (emulator)
        # Proyecto demo-* → el emulador corre sin credenciales. Arrancar el emulador
        # compila las reglas (falla si son inválidas); luego se ejercitan contra
        # Firestore real: recomputarContadorTx (contador, incl. concurrencia) y el
        # scoping por rol de las reglas (permitido/denegado por colección).
        run: firebase emulators:exec --only firestore --project demo-ci "node functions/test-emulator/recompute.js && node functions/test-emulator/rules.js"
