name: CI

# Valida antes de merge/deploy: lint + unit tests de las Cloud Functions, y
# compilación de reglas + test de integración del contador contra el emulador
# de Firestore (evita repetir el deploy accidental de reglas rotas).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      - name: Lint functions
        working-directory: functions
        run: npm run lint

      - name: Unit tests
        working-directory: functions
        run: npm test

      - name: Set up Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Rules compile + counter integration (emulator)
        # Proyecto demo-* → el emulador corre sin credenciales. Arrancar el emulador
        # compila las reglas (falla si son inválidas); el script de integración
        # ejercita recomputarContadorTx (incl. concurrencia) contra Firestore real.
        run: firebase emulators:exec --only firestore --project demo-ci "node functions/test-emulator/recompute.js"
