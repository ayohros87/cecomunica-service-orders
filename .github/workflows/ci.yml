name: CI

# Valida antes de merge/deploy: lint de las Cloud Functions (atrapa bugs como
# referencias no definidas) y compilación de las reglas de Firestore en el
# emulador (evita repetir el deploy accidental de reglas rotas).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      - name: Lint functions
        working-directory: functions
        run: npm run lint

      - name: Set up Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Validate Firestore rules compile
        # Proyecto demo-* → el emulador corre sin credenciales. Compila las reglas
        # al arrancar; si son inválidas, el comando falla.
        run: firebase emulators:exec --only firestore --project demo-ci "echo rules-ok"
